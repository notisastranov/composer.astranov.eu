function _validPhone(p){return /^\+\d{7,15}$/.test(String(p||'').trim())}
function _applySession(j,displayName,phone){
  state.sbToken=j.access_token||j.token||null;
  if(state.sbToken)localStorage.astranovSbToken=state.sbToken;
  const u=j.user||j;

/* ── GPS locate + zoom to user ── */
function locateMe(){
  if(!('geolocation' in navigator)){toast('GPS not supported');return}
  toast('Locating you…',1500);
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    state.geo={lat,lng,ts:Date.now()};
    let nearest=null,bestD=Infinity,bestCountry=null;
    countries.forEach(co=>co.cities.forEach(ci=>{const d=Math.hypot(ci.lat-lat,ci.lng-lng);if(d<bestD){bestD=d;nearest=ci;bestCountry=co}}));
    const co=bestCountry||countries.find(x=>Math.hypot(x.lat-lat,x.lng-lng)<6)||countries[0];
    const targetZ=15;
    state.country=co;
    /* If city map already open: fly smoothly to GPS coords */
    if(state.cityMap&&state.level==='personal'){
      state.city={id:'gps',name:'My location',lat,lng,z:targetZ};
      state.cityMap.flyTo([lat,lng],targetZ,{animate:true,duration:2.2});
      drawCity();toast('You are here',1800);return;
    }
    /* Otherwise: open city at country zoom, then fly in */
    const entry={id:'gps-'+Date.now(),name:'My location',lat,lng,z:6};
    openCity(entry);
    setTimeout(()=>{
      if(state.cityMap)state.cityMap.flyTo([lat,lng],targetZ,{animate:true,duration:2.5});
    },320);
  },err=>{
    toast('GPS denied: '+(err.message||'permission denied'),3000);
  },{enableHighAccuracy:true,timeout:10000,maximumAge:30000});
}
async function doLogin(email,password,phone){
  const err=$('lErr');if(err)err.textContent='';
  email=String(email||'').trim();phone=String(phone||'').trim();password=String(password||'');
  if(!email&&!phone){if(err)err.textContent='Email or phone required';return}
  if(phone&&!_validPhone(phone)){if(err)err.textContent='Phone must be international, no spaces (e.g. +306971930225)';return}
  if(!password){if(err)err.textContent='Password required';return}
  if(err)err.textContent='Signing in…';
  try{
    const body=email?{email,password}:{phone,password};
    const r=await sbFetch('/auth/v1/token?grant_type=password',{method:'POST',
      body:JSON.stringify(body),signal:AbortSignal.timeout(10000)});
    if(r.ok){_applySession(await r.json(),null,phone);return}
    const j=await r.json().catch(()=>({}));
    if(err)err.textContent=j.error_description||j.msg||j.error||'Login failed.';
  }catch(e){
    if(err)err.textContent='Network error. Try again.';
  }
}
async function doRegister(name,email,phone,password){
  const err=$('lErr');if(err)err.textContent='';
  name=String(name||'').trim();email=String(email||'').trim();phone=String(phone||'').trim();password=String(password||'');
  if(!name){if(err)err.textContent='Full name required';return}
  if(!email&&!phone){if(err)err.textContent='Email or phone required';return}
  if(phone&&!_validPhone(phone)){if(err)err.textContent='Phone must be international, no spaces (e.g. +306971930225)';return}
  if(!password||password.length<6){if(err)err.textContent='Password ≥ 6 characters';return}
  if(err)err.textContent='Creating account…';
  try{
    const body=email?{email,password,data:{display_name:name,phone}}:{phone,password,data:{display_name:name}};
    const r=await sbFetch('/auth/v1/signup',{method:'POST',
      body:JSON.stringify(body),signal:AbortSignal.timeout(12000)});
    if(r.ok){_applySession(await r.json(),name,phone);return}
    const j=await r.json().catch(()=>({}));
    if(err)err.textContent=j.error_description||j.msg||j.error||'Registration failed.';
  }catch(e){if(err)err.textContent='Network error. Try again.'}
}

function captureMedia(channel,mode){
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept=mode==='video'?'video/*':'image/*';
  inp.setAttribute('capture','environment');
  inp.onchange=()=>{
    const f=inp.files&&inp.files[0];if(!f)return;
    const url=URL.createObjectURL(f);
    showMediaPreview(url,mode,channel);
  };
  inp.click();
}

/* ── AI — cloud router with intelligent local intelligence ── */
async function aiAsk(text){
  const ctx={text,level:state.level,country:state.country?.name||null,city:state.city?.name||null,vendor:state.vendor?.name||null,ts:Date.now(),owner:state.ownerAuthed};
  try{
    const ac=new AbortController();const tm=setTimeout(()=>ac.abort(),10000);
    const r=await sbFn('ai-router',ctx,ac.signal);
    clearTimeout(tm);
    if(r.ok){const j=await r.json();if(j&&typeof j==='object'&&(j.text||j.action))return j}
  }catch(e){}
  return localAI(text);
}
function localAI(text){
  const lo=text.toLowerCase().trim();
  if(!lo)return{text:'How can I help you?'};
  /* greetings */
  if(/^(hello|hi|hey|sup|yo)\b/.test(lo))return{text:'Hey! I\'m your AstranoV AI — built into the app. I can navigate the globe, find nearby vendors, open chat circles, check your balance, manage orders, and more. What do you need?'};
  /* vendor / shop search */
  if(lo.includes('vendor')||lo.includes('shop')||lo.includes('store')||lo.includes('restaurant')||lo.includes('food')||lo.includes('market')){
    const vs=(state.vendors||[]).slice(0,6).map(v=>v.emoji+' '+v.name).join('\n');
    if(vs)return{text:'Here are the vendors near you:\n'+vs+'\n\nTap any pin on the map to open their menu and place an order.'};
    return{text:'No vendors are loaded yet. Navigate into a city first — tap a glowing beacon on the national map.'};
  }
  /* balance / money */
  if(lo.includes('balance')||lo.includes('money')||lo.includes('wallet')||lo.includes('avc')||lo.includes('recharge'))return{text:'Your current balance is '+state.balance.toFixed(2)+' AVC (1 AVC = 1 EUR). Tap your 👤 button → Recharge to add funds.',action:{type:'accounting'}};
  /* orders / delivery */
  if(lo.includes('order')||lo.includes('deliver')||lo.includes('cart'))return{text:'To place an order: go to a city → tap a shop pin on the map → add items to cart → hit Order. Drivers are matched automatically and routes are calculated in real time.'};
  /* navigation help */
  if(lo.includes('where am i')||lo.includes('my location')||lo.includes('locate me')||lo.includes('gps'))return{text:'Tap your 👤 button in the top-left to GPS-locate yourself. Your YOU pin will appear on the map once location is confirmed.'};
  /* circles / chat */
  if(lo.includes('circle')||lo.includes('chat')||lo.includes('message')||lo.includes('community')){return{text:'Opening local channel…',action:{type:'open_channel',channel:'local'}}}
  /* back / navigate */
  if(lo==='back'||lo.startsWith('go back'))return{text:'Going back…',action:{type:'back'}};
  /* help */
  if(lo.includes('help')||lo.includes('what can you')||lo.includes('capabilities'))return{text:'I can:\n• Navigate — say any country or city name\n• Find vendors — "show shops near me"\n• Check balance — "my balance"\n• Open circles — "open chat"\n• Place orders — "order food"\n• Krypteia — owner-only admin panel\n\nJust speak or type naturally.'};
  /* krypteia */
  if(lo.includes('krypteia')||lo.includes('admin'))return{text:'Activating Krypteia…',action:{type:'krypteia'}};
  /* country / city navigation */
  for(const c of countries){
    if(lo.includes(c.name.toLowerCase())){
      const city=c.cities.find(x=>lo.includes(x.name.toLowerCase()));
      if(city)return{text:'Taking you to '+city.name+', '+c.name+'.',action:{type:'navigate',country:c.name,city:city.name}};
      return{text:'Opening '+c.name+' on the map.',action:{type:'navigate',country:c.name}};
    }
  }
  /* weather / time — simple awareness */
  if(lo.includes('time')||lo.includes('clock'))return{text:'Current time: '+new Date().toLocaleTimeString()+'. I\'m embedded in the app — for weather data, navigate to a city and check the local feed.'};
  /* unknown — contextual response */
  const ctx2=state.level==='global'?'You\'re currently on the global view.':state.level==='national'?'You\'re viewing '+state.country?.name+'.':'You\'re in '+state.city?.name+'.';
  return{text:ctx2+'\n\nI didn\'t catch a specific command in "'+text+'". Try: a city name to navigate, "vendors" to find shops, "balance" to check funds, or "help" to see all commands.'};
}

function speak(text){
  if(!text||!('speechSynthesis' in window))return;
  try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=navigator.language||'en-US';u.rate=1.05;speechSynthesis.speak(u)}catch(e){}
}

function execAIAction(act){
  if(!act||!act.type)return;
  switch(act.type){
    case 'navigate':{
      if(act.country){const c=countries.find(x=>x.name.toLowerCase()===String(act.country).toLowerCase());if(c){state.country=c;openNational(c);return}}
      if(act.city)run(act.city);
      break;
    }
    case 'open_channel':if(act.channel)openChannel(act.channel);break;
    case 'open_vendor':if(state.vendors){const vN=String(act.name||'').toLowerCase();const v=state.vendors.find(x=>x.name.toLowerCase().includes(vN));if(v)openVendor(v)}break;
    case 'accounting':accounting();break;
    case 'back':goBack();break;
    case 'capture_video':if(act.channel)captureVideo(act.channel);break;
    case 'add_vendor':if(act.kind)openVendorForm(act.kind);break;
    case 'krypteia':tryKrypteia(openKrypteiaPanel);break;
  }
}

function runHandled(cmd){
  cmd=String(cmd||'').toLowerCase().trim();if(!cmd)return false;
  if(/global channel|open global/.test(cmd)){openChannel('global');return true}
  if(/local channel|open local/.test(cmd)){openChannel('local');return true}
  if(/private channel|open private/.test(cmd)){openChannel('private');return true}
  if(cmd.includes('account')){accounting();return true}
  if(cmd==='back'||cmd.startsWith('go back')){goBack();return true}
  if(cmd.includes('circle')||cmd.includes('chat')){openCircleList();return true}
  if(cmd.includes('login')||cmd.includes('sign in')||cmd.includes('account')){openLoginPanel();return true}
  if(cmd.includes('recharge')||cmd.includes('balance')||cmd.includes('top up')){openRechargePanel();return true}
  for(const c of countries){
    if(cmd.includes(c.name.toLowerCase())){state.country=c;openNational(c);return true}
    const ct=c.cities.find(x=>cmd.includes(x.name.toLowerCase()));
    if(ct){state.country=c;openCity(ct);return true}
  }
  return false;
}

let recognition=null,handsFreeOn=false;
function startHandsFree(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Voice not available');return}
  if(recognition)try{recognition.stop()}catch(e){}
  recognition=new SR();
  recognition.lang=navigator.language||'en-US';
  recognition.continuous=true;recognition.interimResults=false;
  recognition.onstart=()=>{handsFreeOn=true;$('mfMic').classList.add('live');toast('Hands-free on. Speak.')};
  recognition.onend=()=>{if(handsFreeOn){try{recognition.start()}catch(e){}}};
  recognition.onerror=e=>{
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      handsFreeOn=false;$('mfMic').classList.remove('live');
      toast('Microphone blocked — type below');
    }
  };
  recognition.onresult=async e=>{
    const last=e.results[e.results.length-1];if(!last.isFinal)return;
    const text=(last[0].transcript||'').trim();if(!text)return;
    toast('Heard: '+text,2200);
    if(runHandled(text))return;
    const reply=await aiAsk(text);
    if(reply.error){toast(reply.error,4500);speak(reply.error);return}
    if(reply.action)execAIAction(reply.action);
    if(reply.text){speak(reply.text);toast(reply.text,5000)}
  };
  try{recognition.start()}catch(e){toast('Voice could not start')}
}
function stopHandsFree(){handsFreeOn=false;if(recognition)try{recognition.stop()}catch(e){}$('mfMic').classList.remove('live')}
function toggleHandsFree(){handsFreeOn?stopHandsFree():startHandsFree()}

    '</div></div>'+
    '<div id="dicResult" class="card" style="display:none"></div>';
  let dicRec=null;
  $('dicMic').onclick=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){toast('Voice not available');return}
    if(dicRec){try{dicRec.stop()}catch(e){}dicRec=null;$('dicMic').textContent='🎙 Dictate';return}
    dicRec=new SR();dicRec.lang=navigator.language||'en-US';
    dicRec.continuous=true;dicRec.interimResults=true;
    $('dicMic').textContent='⏹ Stop';
    let final=$('dicText').value;
    dicRec.onresult=e=>{
      let interim='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        const t=e.results[i][0].transcript;
        if(e.results[i].isFinal)final+=(final&&!final.endsWith(' ')?' ':'')+t.trim();
        else interim+=t;
      }
      $('dicText').value=final+(interim?' '+interim:'');
    };
    dicRec.onend=()=>{dicRec=null;if($('dicMic'))$('dicMic').textContent='🎙 Dictate'};

  };
  $('dicClear').onclick=()=>{$('dicText').value=''};

      if(reply.action)execAIAction(reply.action);
      if(reply.text)speak(reply.text);

}

/* ── Triangle cascade menu ── */
const triState={timer:null,pressLL:null,suppress:false};
const TRI_R=108;

function triVerts(cx,cy,r){
  cx=Math.max(r+36,Math.min(innerWidth-r-36,cx));
  cy=Math.max(r+40,Math.min(innerHeight-r-40,cy));
  return[
    {x:cx,            y:cy-r},
    {x:cx+r*Math.cos(Math.PI/6), y:cy+r*Math.sin(Math.PI/6)},
    {x:cx-r*Math.cos(Math.PI/6), y:cy+r*Math.sin(Math.PI/6)},
  ]
}

function renderTri(ox,oy,opts,container,depth){
  depth=depth||0;
  const r=Math.max(60,TRI_R*(1-.13*depth));
  const v=triVerts(ox,oy,r);
  const wrap=document.createElement('div');
  wrap.className='triMenu';
  wrap.style.cssText='position:absolute;inset:0;pointer-events:none;transition:opacity .2s';
  /* SVG real equilateral triangle */
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width','100%');svg.setAttribute('height','100%');
  svg.setAttribute('class','triSvg');
  const poly=document.createElementNS(ns,'polygon');
  poly.setAttribute('points',v.map(p=>p.x+','+p.y).join(' '));
  poly.setAttribute('fill','rgba(0,215,255,0.04)');
  poly.setAttribute('stroke','rgba(0,215,255,0.30)');
  poly.setAttribute('stroke-width','1.5');
  poly.setAttribute('stroke-dasharray','7 5');
  svg.appendChild(poly);
  wrap.appendChild(svg);
  opts.forEach((opt,i)=>{
    if(!opt||i>2)return;
    const btn=document.createElement('div');
    btn.className='triOpt'+(opt.gold?' gold':'');
    btn.style.cssText='left:'+v[i].x+'px;top:'+v[i].y+'px;pointer-events:auto';
    btn.innerHTML='<span class="tIco">'+opt.icon+'</span><span class="tLbl">'+esc(opt.label)+'</span>';
    btn.addEventListener('pointerdown',e=>e.stopPropagation());
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      if(opt.sub){
        wrap.style.opacity='.14';
        wrap.style.pointerEvents='none';
        renderTri(v[i].x,v[i].y,opt.sub,container,depth+1);
      }else{
        closeTriMenu();
        if(opt.action)opt.action();
      }
    });
    wrap.appendChild(btn);
  });
  container.appendChild(wrap);
}

function openTriMenu(x,y,opts){
  const ol=$('triOverlay');
  ol.innerHTML='';
  ol.classList.add('on');
  renderTri(x,y,opts,ol,0);
  ol.onclick=e=>{if(e.target===ol)closeTriMenu()};
}
function closeTriMenu(){
  const ol=$('triOverlay');
  ol.classList.remove('on');
  ol.innerHTML='';
}

function triOpts(){
  return[
    {icon:'🎬',label:'VIDEO',sub:[
      {icon:'🌍',label:'GLOBAL', action:()=>captureVideo('global')},
      {icon:'🏙', label:'LOCAL',  action:()=>captureVideo('local')},
      {icon:'🔒',label:'PRIVATE',action:()=>captureVideo('private')},
    ]},
    {icon:'🏪',label:'VENDOR',gold:true,sub:[
      {icon:'🛒',label:'SHOP',      gold:true,action:()=>openShopForm()},
      {icon:'🔧',label:'SERVICE',   gold:true,action:()=>openServiceForm()},
      {icon:'🚐',label:'DELIVERER', gold:true,action:()=>openDelivererForm()},
    ]},
    {icon:'💬',label:'CIRCLES',sub:[
      {icon:'🌍',label:'GLOBAL',  action:()=>openCircle('global')},
      {icon:'🏴', label:'NATIONAL',action:()=>openCircle('nat-'+(state.country?.id||'xx'))},
      {icon:'🏙',label:'LOCAL',   action:()=>{
        if(!state.city){toast('Enter a city first');return}
        openCircle('loc-'+(state.city?.id||'geo'))
      }},
    ]},
  ]
}

function onLongPress(x,y,ll){
  triState.pressLL=ll||null;
  triState.suppress=true;
  setTimeout(()=>{triState.suppress=false},700);
  openTriMenu(x,y,triOpts());
}

function initGlobe(){
  if(!window.Globe){toast('Globe engine unavailable');return}
  state.globe=Globe()($('globeHost'))
    .backgroundColor('rgba(0,0,0,0)')
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .showAtmosphere(true)
    .atmosphereColor('#00d8ff')
    .atmosphereAltitude(.18)
    .pointsData(countries)
    .pointLat('lat').pointLng('lng')
    .pointAltitude(.018).pointRadius(.5)
    .pointColor(d=>d.id==='gr'?'#d7b650':'#00d8ff')
    .pointResolution(24)
    .onPointClick(c=>{state.country=c;openNational(c)})
    .onGlobeClick(async ({lat,lng})=>{
      if(state.level!=='global'||triState.suppress)return;
      toast('Locating…',4000);
      const geo=await reverseGeocode(lat,lng);
      const c=geo?countryFromGeo(geo,lat,lng):findCountry(lat,lng);
      if(c){state.country=c;openNational(c)}
    });
  const ctl=state.globe.controls();
  ctl.autoRotate=true;ctl.autoRotateSpeed=.085;ctl.enableDamping=true;ctl.dampingFactor=.08;ctl.rotateSpeed=.78;ctl.zoomSpeed=.55;ctl.minDistance=160;ctl.maxDistance=620;
  state.globe.pointOfView({lat:20,lng:10,altitude:2.05},0);
  window.addEventListener('resize',()=>state.globe.width(innerWidth).height(innerHeight));
  let pinchStart=0;
  $('globeHost').addEventListener('touchstart',e=>{if(e.touches.length===2){const a=e.touches[0],b=e.touches[1];pinchStart=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)}},{passive:true});
  $('globeHost').addEventListener('touchend',e=>{pinchStart=0},{passive:true});
  $('globeHost').addEventListener('touchmove',e=>{if(e.touches.length!==2||!pinchStart)return;const a=e.touches[0],b=e.touches[1],d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);if(Math.abs(d-pinchStart)>34){pinchStart=0}},{passive:true});
  /* Long press on globe → triangle menu */
  let glLpTimer=null,glLpS=null;
  $('globeHost').addEventListener('pointerdown',e=>{
    if(e.pointerType==='touch'&&e.isPrimary===false)return;
    glLpS={x:e.clientX,y:e.clientY};
    glLpTimer=setTimeout(()=>{glLpS=null;onLongPress(e.clientX,e.clientY,null)},540);
  },{passive:true});
  const glCancel=()=>{clearTimeout(glLpTimer);glLpS=null};
  $('globeHost').addEventListener('pointermove',e=>{if(glLpS&&Math.hypot(e.clientX-glLpS.x,e.clientY-glLpS.y)>9)glCancel()},{passive:true});
  $('globeHost').addEventListener('pointerup',glCancel,{passive:true});
  $('globeHost').addEventListener('pointercancel',glCancel,{passive:true});
}

function openNational(c,_silent){
  if(!_silent)state.navForward=[];
  state.country=c;setLevel('national');
  if(!state.nationalMap){
    state.nationalMap=L.map('nationalMap',{zoomControl:false,attributionControl:false,worldCopyJump:false});
    state.nationalTile=L.tileLayer(TILE.dark,{maxZoom:19,minZoom:2}).addTo(state.nationalMap);
    state.nationalMap.doubleClickZoom.disable();
    state.nationalMap.on('dblclick',()=>setLevel('global'));
    state.nationalMap.on('contextmenu',e=>{e.originalEvent.preventDefault();onLongPress(e.containerPoint.x,e.containerPoint.y,{lat:e.latlng.lat,lng:e.latlng.lng})});
    state.nationalMap.on('click',async e=>{
      const{lat,lng}=e.latlng;
      toast('Locating…',4000);
      const geo=await reverseGeocode(lat,lng);
      if(!geo){toast('Location unavailable');return}
      const cc=(geo.address?.country_code||'xx').toLowerCase();
      if(cc!==state.country.id&&cc!=='xx'){openNational(countryFromGeo(geo,lat,lng))}
      else{openCity(cityFromGeo(geo,lat,lng))}
    });
    let _natPinch=0,_natPinchLocked=false;
    const natEl=$('nationalMap');
    natEl.addEventListener('touchstart',e=>{if(e.touches.length===2){const a=e.touches[0],b=e.touches[1];_natPinch=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);_natPinchLocked=false}},{passive:true});
    natEl.addEventListener('touchmove',e=>{
      if(e.touches.length!==2||!_natPinch||_natPinchLocked)return;
      const a=e.touches[0],b=e.touches[1],d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
      const diff=d-_natPinch;
      if(Math.abs(diff)>22){_natPinchLocked=true;_natPinch=0;if(diff>0)state.nationalMap.zoomIn();else state.nationalMap.zoomOut()}
    },{passive:true});
    natEl.addEventListener('touchend',()=>{_natPinch=0;_natPinchLocked=false},{passive:true});
    state.nationalMap.on('zoomend',()=>{if(state.level==='national'&&state.nationalMap.getZoom()<=2)setLevel('global')});
  }
  if(!c.cities||!c.cities.length)c.cities=[{id:'center',name:c.name,lat:c.lat||c.cities?.[0]?.lat,lng:c.lng||c.cities?.[0]?.lng,z:13}];
  state.nationalMap.eachLayer(l=>{if(l._pin)l.remove()});
  const settle=()=>{
    state.nationalMap.invalidateSize();
    if(c.cities.length>1){
      const b=L.latLngBounds(c.cities.map(x=>[x.lat,x.lng])).pad(.45);
      state.nationalMap.fitBounds(b,{padding:[34,34],maxZoom:7,animate:true,duration:1.1});
      if(state.nationalMap.getZoom()<2)state.nationalMap.setZoom(3);
    }else{
      state.nationalMap.setView([c.cities[0].lat,c.cities[0].lng],5,{animate:true,duration:1.1});
    }
  };
  setTimeout(settle,80);setTimeout(settle,420);
  c.cities.forEach(city=>{
    const m=L.marker([city.lat,city.lng],{icon:L.divIcon({className:'',iconSize:[92,50],iconAnchor:[22,22],html:'<div class="cityPin"><span>'+esc(city.name)+'</span></div>'})})
      .addTo(state.nationalMap).on('click',()=>openCity(city));
    m._pin=true;
  });
  toast(c.name+' national airspace');
}

function openCity(city,_silent){
  if(!_silent)state.navForward=[];
  state.city=city;setLevel('personal');
  if(!state.cityMap){
    state.cityMap=L.map('cityMap',{zoomControl:false,attributionControl:false}).setView([city.lat,city.lng],city.z);
    state.dark=L.tileLayer(TILE.dark,{maxZoom:19}).addTo(state.cityMap);
    state.light=L.tileLayer(TILE.light,{maxZoom:19,opacity:0}).addTo(state.cityMap);
    state.cityMap.doubleClickZoom.disable();
    state.cityMap.on('contextmenu',e=>{e.originalEvent.preventDefault();onLongPress(e.containerPoint.x,e.containerPoint.y,{lat:e.latlng.lat,lng:e.latlng.lng})});
    state.cityMap.on('click',async e=>{if(state.picking){finishPick(e.latlng);return}if($('vendorSheet').classList.contains('on')){$('vendorSheet').classList.add('min');return}const{lat,lng}=e.latlng;toast('Locating…',3000);const geo=await reverseGeocode(lat,lng);showPlaceInfo(lat,lng,geo)});
    state.cityMap.on('dblclick',()=>openNational(state.country));
    let _cityPinch=0,_cityPinchLocked=false;
    const cityEl=$('cityMap');
    cityEl.addEventListener('touchstart',e=>{if(e.touches.length===2){const a=e.touches[0],b=e.touches[1];_cityPinch=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);_cityPinchLocked=false}},{passive:true});
    cityEl.addEventListener('touchmove',e=>{
      if(e.touches.length!==2||!_cityPinch||_cityPinchLocked)return;
      const a=e.touches[0],b=e.touches[1],d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
      const diff=d-_cityPinch;
      if(Math.abs(diff)>22){_cityPinchLocked=true;_cityPinch=0;if(diff>0)state.cityMap.zoomIn();else state.cityMap.zoomOut()}
    },{passive:true});
    cityEl.addEventListener('touchend',()=>{_cityPinch=0;_cityPinchLocked=false},{passive:true});
    state.cityMap.on('zoomend',()=>{if(state.level==='personal'&&state.cityMap.getZoom()<=9)openNational(state.country)});
  }
  state.cityMap.setView([city.lat,city.lng],city.z);
  applyBrightness();drawCity();
  /* Load persisted posts from Supabase for this city */
  sbFetch('/rest/v1/posts?lat=gte.'+(city.lat-.5)+'&lat=lte.'+(city.lat+.5)+'&lng=gte.'+(city.lng-.5)+'&lng=lte.'+(city.lng+.5)+'&select=id,url,mode,channel,lat,lng&limit=100').then(r=>r.json()).then(rows=>{
    if(!Array.isArray(rows))return;
    rows.forEach(p=>{if(!state.videoTiles.find(t=>t.url===p.url&&t.lat===p.lat))state.videoTiles.push({lat:p.lat,lng:p.lng,url:p.url,mode:p.mode,channel:p.channel})});
    drawCity();
  }).catch(()=>{});
  setTimeout(()=>state.cityMap.invalidateSize(),90);
}

function icon(html,size=42){return L.divIcon({className:'',iconSize:[size,size],iconAnchor:[size/2,size/2],html})}

function drawCity(){
  state.markers.forEach(m=>m.remove());state.markers=[];
  state.vendors=vendorsFor(state.city);state.drivers=driversFor(state.city);
  /* YOU pin: only when logged in AND we have GPS coordinates */
  if(state.user&&state.geo){
    state.markers.push(L.marker([state.geo.lat,state.geo.lng],{icon:icon('<div class="mapPin user">YOU</div>',44)}).addTo(state.cityMap).on('click',openYouTriangle));
  }
  const acctLat=state.city.lat+.0015,acctLng=state.city.lng-.0015;
  state.markers.push(L.marker([acctLat,acctLng],{icon:icon('<div class="mapPin acct">⬡</div>',38)}).addTo(state.cityMap).bindTooltip('Accounting Office',{className:'cleanTip'}).on('click',accounting));
  state.vendors.forEach(v=>{state.markers.push(L.marker([v.lat,v.lng],{icon:icon('<div class="mapPin shop">'+v.emoji+'</div>')}).addTo(state.cityMap).bindTooltip(v.name,{className:'cleanTip'}).on('click',()=>openVendor(v)))});
  state.customVendors.filter(cv=>Math.abs(cv.lat-state.city.lat)<.25&&Math.abs(cv.lng-state.city.lng)<.3).forEach(cv=>{
    const items=cv.items.map(it=>({id:it.id,name:it.name,desc:it.desc||'',photo:it.photo||'',price:+it.price||0,kg:Math.max(+it.kg||0,+it.ml||0)||0.1}));
    const merged={id:cv.id,name:cv.name,emoji:cv.emoji,lat:cv.lat,lng:cv.lng,items};
    state.vendors.push(merged);
    state.markers.push(L.marker([cv.lat,cv.lng],{icon:icon('<div class="mapPin shop">'+cv.emoji+'</div>')}).addTo(state.cityMap).bindTooltip(cv.name+' (yours)',{className:'cleanTip'}).on('click',()=>openVendor(merged)));
  });
  state.drivers.forEach(d=>{state.markers.push(L.marker([d.lat,d.lng],{icon:icon('<div class="mapPin driver">'+d.emoji+'</div>',38)}).addTo(state.cityMap).bindTooltip(d.name,{className:'cleanTip'}).on('click',()=>selectDriver(d)))});
  /* ── Video / photo tiles ── */
  state.videoTiles.filter(vt=>Math.abs(vt.lat-state.city.lat)<0.5&&Math.abs(vt.lng-state.city.lng)<0.5).forEach(vt=>{
    const html='<div class="mapVideoTile">'+(vt.mode==='video'?'<video src="'+vt.url+'" muted loop autoplay playsinline></video><div class="tPlay">▶</div>':'<img src="'+vt.url+'">')+'</div>';
    state.markers.push(L.marker([vt.lat,vt.lng],{icon:L.divIcon({className:'',iconSize:[76,54],iconAnchor:[38,54],html})}).addTo(state.cityMap).on('click',()=>openChannel(vt.channel)));
  });
}

function openVendor(v){state.vendor=v;state.cart={};state.destination=null;state.selectedDriver=null;$('vendorTitle').textContent=v.emoji+' '+v.name;renderVendor();$('vendorSheet').classList.add('on');$('vendorSheet').classList.remove('min')}
function closeVendor(){$('vendorSheet').classList.remove('on','min')}

function renderVendor(){
  renderRibbon();
  $('products').innerHTML=state.vendor.items.map(it=>'<div class="product">'+(it.photo?'<img src="'+esc(it.photo)+'" loading="lazy">':'<div style="width:46px;height:46px;border-radius:11px;background:#10223b;flex:0 0 46px;display:flex;align-items:center;justify-content:center;font-size:22px">'+(state.vendor.emoji||'📦')+'</div>')+'<div class="prodInfo"><div class="prodName">'+esc(it.name)+'</div><div class="prodDesc">'+esc(it.desc)+'</div><div class="prodMeta">'+money(it.price)+' · '+it.kg+' kg/L</div></div><div class="qty"><button class="edit" data-edit="'+it.id+'">✎</button><button data-minus="'+it.id+'">−</button><input data-qty="'+it.id+'" value="'+(state.cart[it.id]||0)+'" type="number" min="0"><button data-plus="'+it.id+'">+</button></div></div>').join('');
  $('products').querySelectorAll('[data-plus]').forEach(b=>b.onclick=()=>setQty(b.dataset.plus,(state.cart[b.dataset.plus]||0)+1));
  $('products').querySelectorAll('[data-minus]').forEach(b=>b.onclick=()=>setQty(b.dataset.minus,Math.max(0,(state.cart[b.dataset.minus]||0)-1)));
  $('products').querySelectorAll('[data-qty]').forEach(i=>i.oninput=()=>setQty(i.dataset.qty,Math.max(0,parseInt(i.value||0)||0),false));
  $('products').querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>editItem(b.dataset.edit));
}

function setQty(id,q,rer=true){state.cart[id]=q;if(q<=0)delete state.cart[id];if(rer)renderVendor();else renderRibbon()}
function currentDest(){return state.destination||state.city}

function calc(){
  const items=state.vendor.items.map(it=>({it,q:state.cart[it.id]||0})).filter(x=>x.q>0);
  const basket=items.reduce((s,x)=>s+x.it.price*x.q,0),autoKg=items.reduce((s,x)=>s+x.it.kg*x.q,0),manual=+$('kg')?.value||0,kg=manual>0?manual:autoKg;
  const mode=$('assign')?.value||'auto',dest=currentDest(),dist=mode==='pickup'?0:km(state.vendor.lat,state.vendor.lng,dest.lat,dest.lng),base=mode==='pickup'?0:(dist<=3?3:3+(dist-3));
  const drivers=mode==='pickup'?0:Math.max(1,Math.ceil(Math.max(.01,kg)/13)),load=mode==='pickup'?0:Math.max(0,drivers-1),delivery=+(base+load).toFixed(2),total=+(basket+delivery).toFixed(2),fee=+(total*.03).toFixed(2);
  return{items,basket,kg,mode,dest,dist,drivers,delivery,total,fee};
}

function renderRibbon(){
  const c=state.vendor?calc():{items:[],basket:0,kg:0,mode:'auto',dest:null,dist:0,drivers:0,delivery:0,total:0,fee:0};
  const has=c.items.length;
  const label=has?(c.mode==='pickup'?'PLACE CASH ORDER':'PLACE CASH ORDER · '+c.drivers+' DRIVER'+(c.drivers>1?'S':'')):'↓ ADD ITEMS';
  $('ribbon').innerHTML='<div class="rib action"><button id="place" class="ribAction '+(!has?'need':'')+'" '+(!has?'disabled':'')+'>'+label+'</button></div>'
    +'<div class="rib wide"><label>From</label><div class="val">'+state.vendor.emoji+' '+esc(state.vendor.name)+'</div></div>'
    +'<div class="rib wide"><label>To</label><select id="dest"><option value="user">My location</option><option value="other">Set on map</option></select></div>'
    +'<div class="rib"><label>Km</label><div class="val">'+c.dist.toFixed(1)+'</div></div>'
    +'<div class="rib"><label>Delivery</label><div class="val">'+money(c.delivery)+'</div></div>'
    +'<div class="rib"><label>Basket</label><div class="val">'+money(c.basket)+'</div></div>'
    +'<div class="rib"><label>Kg/L</label><input id="kg" type="number" min="0" step="0.1" value="'+c.kg.toFixed(1)+'"></div>'
    +'<div class="rib"><label>Total COD</label><div class="val">'+money(c.total)+'</div></div>'
    +'<div class="rib wide"><label>Assign</label><select id="assign"><option value="auto">Automatic</option><option value="choose">Choose driver</option><option value="pickup">Self-pickup</option></select></div>'
    +'<div class="rib wide"><label>Driver</label><select id="driver">'+state.drivers.map(d=>'<option value="'+d.id+'">'+d.emoji+' '+d.name+'</option>').join('')+'</select></div>';
  $('place').onclick=placeOrder;
  $('dest').onchange=e=>{if(e.target.value==='other')startPick();else{state.destination=null;renderRibbon()}};
  $('assign').value=c.mode;$('assign').onchange=renderRibbon;
  $('kg').onchange=renderRibbon;

async function routeStreet(from,to){
  const key=[from.lng,from.lat,to.lng,to.lat].map(n=>n.toFixed(5)).join(',');
  if(state.routeCache.has(key))return state.routeCache.get(key);
  const url=OSRM+from.lng+','+from.lat+';'+to.lng+','+to.lat+'?overview=full&geometries=geojson&steps=false';
  try{
    const ctl=new AbortController(),tm=setTimeout(()=>ctl.abort(),9000);
    const r=await fetch(url,{signal:ctl.signal});clearTimeout(tm);
    const j=await r.json();
    if(!r.ok||j.code!=='Ok'||!j.routes?.[0])throw new Error(j.message||j.code||'routing failed');
    const out={coords:j.routes[0].geometry.coordinates.map(p=>[p[1],p[0]]),km:j.routes[0].distance/1000};
    state.routeCache.set(key,out);return out;
  }catch(e){toast('Street routing failed — no route line drawn.',4500);return null}
}

function driversNeeded(n){
  const chosen=[];
  if($('assign')?.value==='choose'&&state.selectedDriver)chosen.push(state.selectedDriver);
  for(const d of state.drivers){if(chosen.length>=n)break;if(!chosen.find(x=>x.id===d.id))chosen.push(d)}
  return chosen.slice(0,n);
}

async function placeOrder(){
  const c=calc();if(!c.items.length){toast('Add items first');return}
  const drivers=c.mode==='pickup'?[]:driversNeeded(c.drivers);
  if(drivers.length<c.drivers){toast('Not enough drivers nearby');return}
  if(c.drivers>1)toast(c.drivers+' drivers required for '+c.kg.toFixed(1)+' kg/L',3000);
  const order={id:'ORD-'+String(state.orders.length+1).padStart(3,'0'),vendor:state.vendor,calc:c,drivers,status:'routing',driverDone:false,clientDone:false,layers:[]};
  state.orders.push(order);
  state.messages[order.id]=[{who:'System',text:'Cash order created. Calculating real street routes.'}];
  openTransaction(order);closeVendor();
  await drawOrder(order);
  if(order.status!=='routing_failed'){order.status='active';state.messages[order.id].push({who:'System',text:'Street route live. Driver and client must both confirm completion.'})}
  openTransaction(order);ledgerFor(order);
}

async function drawOrder(o){
  const add=l=>{o.layers.push(l);return l};
  const v=o.vendor,d=o.calc.dest;
  for(const dr of o.drivers){
    const r1=await routeStreet({lat:dr.lat,lng:dr.lng},{lat:v.lat,lng:v.lng});
    if(r1)add(L.polyline(r1.coords,{color:'#d7b650',weight:5,opacity:.88,className:'routeGold'}).addTo(state.cityMap).on('click',()=>openTransaction(o)));
  }
  const r2=await routeStreet({lat:v.lat,lng:v.lng},{lat:d.lat,lng:d.lng});
  if(!r2){o.status='routing_failed';state.messages[o.id].push({who:'System',text:'Street routing failed. No route line drawn. Order remains open.'});return}
  add(L.polyline(r2.coords,{color:'#00d8ff',weight:6,opacity:.94,className:'routeBlue'}).addTo(state.cityMap).on('click',()=>openTransaction(o)));
  if(o.drivers.length)add(L.polygon([[d.lat,d.lng],[v.lat,v.lng],...o.drivers.map(x=>[x.lat,x.lng])],{color:'#d7b650',weight:3,fillColor:'#d7b650',fillOpacity:.07,className:'polyLive'}).addTo(state.cityMap).on('click',()=>openTransaction(o)));
  const pos=[v.lat+.00055*(state.orders.length||1),v.lng+.00055*(state.orders.length||1)];
  add(L.marker(pos,{icon:L.divIcon({className:'',iconSize:[42,42],iconAnchor:[21,21],html:'<div class="orderBubble">'+o.id.replace('ORD-','')+'</div>'})}).addTo(state.cityMap).on('click',()=>openTransaction(o)));
  const mid=r2.coords[Math.floor(r2.coords.length/2)];
  add(L.marker(mid,{icon:L.divIcon({className:'',iconSize:[120,34],iconAnchor:[60,17],html:'<div class="chatMark">ORDER CHAT</div>'})}).addTo(state.cityMap).on('click',()=>openTransaction(o)));
  state.cityMap.fitBounds(L.latLngBounds(r2.coords),{padding:[70,70],animate:true});
}

/* ── Command router ── */
function run(cmd){
  cmd=String(cmd||'').trim();
  if(!cmd)return;
  const lo=cmd.toLowerCase();
  if(lo.includes('krypteia')||lo.includes('owner')||lo.includes('admin'))return tryKrypteia(openKrypteiaPanel);
  if(lo.includes('vendor login')){state.vendorMode=true;document.body.classList.add('vendorMode');toast('Vendor mode on');if(state.vendor)renderVendor();return}
  if(lo.includes('pizza')&&state.level==='personal'&&state.vendors)return openVendor(state.vendors.find(x=>x.id==='pizza')||state.vendors[0]);
  if(runHandled(lo))return;
  /* Show in mfBody chat */
  if(!state._aiChat)state._aiChat=[];
  state._aiChat.push({role:'user',text:cmd});
  _renderAiChat();
  mfOpen('AstranoV AI');
  aiAsk(cmd).then(reply=>{
    if(reply.error){state._aiChat.push({role:'err',text:reply.error});_renderAiChat();return}
    if(reply.action)execAIAction(reply.action);
    if(reply.text){state._aiChat.push({role:'ai',text:reply.text});speak(reply.text);_renderAiChat()}
  });
}
function _renderAiChat(){
  if(!state._aiChat)return;
  const body=$('mfBody');if(!body)return;
  body.innerHTML='<div style="display:flex;flex-direction:column;gap:8px;padding:10px 0">'+state._aiChat.map(m=>{
    if(m.role==='user')return '<div style="align-self:flex-end;background:rgba(0,215,255,.13);border:1px solid rgba(0,215,255,.22);border-radius:14px;padding:8px 12px;font-size:12px;max-width:80%;text-align:right">'+esc(m.text)+'</div>';
    if(m.role==='err')return '<div style="align-self:center;color:var(--r);font-size:11px;font-style:italic;padding:4px">'+esc(m.text)+'</div>';
    return '<div class="aiBubble" style="align-self:flex-start;max-width:88%">'+esc(m.text)+'</div>';
  }).join('')+'</div>';
  body.scrollTop=body.scrollHeight;
}

const EDGE=22,SWIPE_MIN=70;
let _swStart=null;
document.addEventListener('touchstart',e=>{
  if(e.touches.length!==1)return;
  const t=e.touches[0],fromLeft=t.clientX<EDGE,fromRight=t.clientX>innerWidth-EDGE;
  if(fromLeft||fromRight)_swStart={x:t.clientX,y:t.clientY,fromLeft,fromRight,t:Date.now()};
},{passive:true});
document.addEventListener('touchend',e=>{
  if(!_swStart)return;
  const t=(e.changedTouches[0]||{});const dx=t.clientX-_swStart.x,dy=Math.abs(t.clientY-_swStart.y),dt=Date.now()-_swStart.t;
  const s=_swStart;_swStart=null;
  if(dt>600||dy>60)return;
  if(s.fromLeft&&dx>SWIPE_MIN)navBack();
  else if(s.fromRight&&dx<-SWIPE_MIN)navForward();
},{passive:true});

/* ── Radar: center button = locate / recalibrate GPS ── */
$('radarCenter').onclick=(e)=>{e.stopPropagation();locateMe();toast('Recalibrating GPS…',1500)};
/* Badge click → show nearby events list in mfDrawer */
$('radarBadge').onclick=(e)=>{
  e.stopPropagation();
  mfTall();
  $('mfTitle').textContent='📡 NEARBY EVENTS · '+_radarEvents;
  /* mfBody is populated by the realtime/poll handlers */
};
let _radarEvents=0;
function radarPulse(n){
  _radarEvents+=n;
  const b=$('radarBadge');
  b.textContent=_radarEvents;
  b.classList.toggle('on',_radarEvents>0);
}
/* Poll for events every 18s if user logged in */
setInterval(()=>{
  if(!state.user||!state.sbToken)return;
  sbFetch('/rest/v1/circle_messages?order=created_at.desc&limit=1&select=id,author,text,circle_id',{signal:AbortSignal.timeout(8000)}).then(r=>{
    if(r.ok)return r.json();
  }).then(rows=>{
    if(!rows||!rows[0])return;
    const msg=rows[0];
    if(state._lastMsgId===msg.id)return;
    state._lastMsgId=msg.id;
    /* Don't interrupt if user is already in the drawer */
    const mf=$('mfDrawer');
    const isOpen=mf.classList.contains('mf-panel')||mf.classList.contains('mf-tall')||mf.classList.contains('mf-full');
    radarPulse(1);
    if(!isOpen){
      /* Pop drawer to mf-tall with the message */
      $('mfTitle').textContent='💬 '+esc(msg.circle_id||'Circle');
      $('mfBody').innerHTML='<div class="aiBubble" style="margin:10px 0"><b>'+esc(msg.author||'?')+'</b><br>'+esc(msg.text||'')+'</div>'+
        '<button class="smallBtn" style="width:100%;margin-top:6px" onclick="openCircle(\''+esc(msg.circle_id||'global')+'\')">Open circle →</button>';
      mfTall();
    }
  }).catch(()=>{});
},18000);

/* ── Supabase Realtime for circle_messages ── */
(function initRealtime(){
  try{
    const ws=new WebSocket('wss://kzlabcrlrpbnfiiyrjvl.supabase.co/realtime/v1/websocket?apikey='+SB_KEY+'&vsn=1.0.0');
    ws.onopen=()=>{
      ws.send(JSON.stringify({topic:'realtime:public:circle_messages',event:'phx_join',payload:{},ref:'1'}));
    };
    ws.onmessage=e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.event==='INSERT'&&d.payload?.record){
          const rec=d.payload.record;
          if(rec.author===state.user?.name)return; /* own message */
          const mf=$('mfDrawer');
          const isOpen=mf.classList.contains('mf-panel')||mf.classList.contains('mf-tall')||mf.classList.contains('mf-full');
          radarPulse(1);
          if(!isOpen){
            $('mfTitle').textContent='💬 '+esc(rec.circle_id||'Circle');
            $('mfBody').innerHTML='<div class="aiBubble"><b>'+esc(rec.author||'?')+'</b><br>'+esc(rec.text||'')+'</div>'+
              '<button class="smallBtn" style="width:100%;margin-top:6px" onclick="openCircle(\''+esc(rec.circle_id||'global')+'\')">Open circle →</button>';
            mfTall();
          }
        }
      }catch(ex){}
    };
    ws.onerror=()=>{};
    /* Heartbeat every 30s */
    setInterval(()=>{if(ws.readyState===1)ws.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb'}))},30000);
  }catch(ex){}
})();
initGlobe();
applyBrightness();
_resetFade();
})();
</script></body></html>
