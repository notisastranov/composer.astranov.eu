<!DOCTYPE html>
<html lang="en">
<head>

<title>ASTRANOV • Real Globe + Live Delivery</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#00d8ff;--blue2:rgba(0,216,255,.38);--gold:#d7b650;--gold2:rgba(215,182,80,.42);--green:#00f09a;--purple:#c084fc;--ink:#020617;--text:#e9f7ff;--muted:rgba(233,247,255,.58)}
html,body{width:100%;height:100%;overflow:hidden;background:#020617;color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
body{position:fixed;inset:0}
#starfield{position:fixed;inset:0;z-index:0;background:radial-gradient(circle at 25% 18%,#11213d 0,#071124 26%,#020617 62%,#000006 100%)}
.star{position:absolute;width:1px;height:1px;border-radius:50%;background:rgba(255,255,255,.75);box-shadow:0 0 6px rgba(255,255,255,.55)}
#brand{position:fixed;top:13px;left:50%;transform:translateX(-50%);z-index:90;border:0;background:transparent;color:var(--blue);font-weight:900;font-size:15px;letter-spacing:.34em;text-shadow:0 0 14px var(--blue);padding:8px 18px;cursor:pointer}
#liveBadge{position:fixed;top:14px;left:50%;transform:translateX(92px);z-index:91;background:var(--green);color:#000;font-size:9px;font-weight:900;padding:1px 6px;border-radius:10px;min-width:16px;text-align:center;box-shadow:0 0 8px var(--green);display:none}
#aiFab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#00d8ff,#c084fc);color:#000;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 20px rgba(0,216,255,.6);z-index:200;cursor:pointer}
#aiPanel{position:fixed;bottom:90px;right:20px;width:320px;max-height:420px;background:rgba(2,8,23,.97);border:1px solid var(--blue2);border-radius:20px;box-shadow:0 -10px 40px rgba(0,0,0,.6);backdrop-filter:blur(20px);z-index:201;display:none;flex-direction:column;overflow:hidden}
#aiHeader{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--blue2);background:rgba(0,216,255,.08)}
#aiHeader b{color:var(--blue);font-size:13px}
#aiBody{flex:1;padding:12px;overflow:auto;font-size:12.5px;line-height:1.4}
#aiInputRow{display:flex;gap:8px;padding:10px;border-top:1px solid var(--blue2);background:rgba(0,0,0,.3)}
#aiInputRow input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--blue2);border-radius:999px;padding:8px 14px;color:#fff;font-size:12px}
#aiInputRow button{background:var(--blue);color:#000;border:0;border-radius:999px;padding:0 16px;font-weight:900}
#globeLayer{z-index:2}#globeHost{position:absolute;inset:0;overflow:hidden}
#spaceAnchors{position:fixed;inset:0;z-index:9;pointer-events:none;display:none}.space #spaceAnchors{display:block}
.celestial{position:absolute;min-width:86px;min-height:42px;border:1px solid rgba(255,255,255,.16);border-radius:16px;background:rgba(2,8,23,.56);backdrop-filter:blur(10px);display:flex;align-items:center;gap:9px;padding:8px 10px;color:#f3fbff;box-shadow:0 0 22px rgba(0,216,255,.08)}
#nationalLayer{z-index:20;background:#020617}#nationalMap,#cityMap{position:absolute;inset:0;background:#06101f}
.leaflet-container{background:#06101f!important}
.nationalBeacon{width:18px;height:18px;border-radius:50%;background:var(--blue);border:2px solid rgba(255,255,255,.72);box-shadow:0 0 13px var(--blue)}
.nationalBeacon.gold{background:var(--gold);box-shadow:0 0 12px var(--gold)}
.beaconLabel{margin-top:19px;transform:translateX(-38%);color:var(--blue);font-size:10px;font-weight:800;white-space:nowrap}
.roundMarker{border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid;box-shadow:0 0 18px currentColor;background:rgba(2,8,23,.88)}
.mkVendor{width:42px;height:42px;color:var(--gold);font-size:20px}
.mkDriver{width:34px;height:34px;color:var(--green);font-size:17px}
.mkUser{width:36px;height:36px;color:var(--blue);font-weight:900}
.mkDest{width:32px;height:32px;color:var(--gold);font-weight:900}
.mkClient{width:32px;height:32px;color:var(--purple);font-weight:900}
.orderBubble{width:34px;height:34px;border-radius:50%;border:2px solid var(--gold);background:rgba(52,35,2,.9);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;box-shadow:0 0 16px var(--gold);animation:bounce 1.25s infinite}
.liveTracker{width:28px;height:28px;border-radius:50%;background:#00f09a;color:#000;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 14px #00f09a,0 0 28px rgba(0,240,154,.6);animation:livePulse 1.2s infinite;z-index:1000}
@keyframes livePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.routeDelivery{filter:drop-shadow(0 0 7px var(--blue)) drop-shadow(0 0 17px rgba(0,216,255,.65));animation:pulseLine 2s infinite}
.routePickup{filter:drop-shadow(0 0 6px var(--gold));animation:pulseLine 2.2s infinite}
.orderPolygon{filter:drop-shadow(0 0 9px var(--blue)) drop-shadow(0 0 18px rgba(0,216,255,.55));animation:pulseLine 1.8s infinite}
@keyframes pulseLine{0%,100%{opacity:.72}50%{opacity:1}}
#toast{position:fixed;left:50%;top:58px;transform:translateX(-50%) translateY(-10px);z-index:200;max-width:90vw;opacity:0;pointer-events:none;border:1px solid var(--blue2);background:rgba(2,8,23,.9);backdrop-filter:blur(12px);border-radius:24px;padding:9px 15px;color:#eaffff;font-size:12px;transition:.22s}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.drawer{position:fixed;left:0;right:0;bottom:0;z-index:120;max-height:66vh;transform:translateY(108%);transition:transform .24s ease;background:rgba(2,8,23,.96);border-top:1px solid var(--blue2);border-radius:20px 20px 0 0;box-shadow:0 -16px 40px rgba(0,0,0,.6);backdrop-filter:blur(20px);overflow:auto}
.drawer.open{transform:translateY(0)}
.drawerHead{position:sticky;top:0;z-index:2;background:rgba(2,8,23,.98);display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.08)}
.drawerTitle{font-size:12px;font-weight:900;letter-spacing:.13em;color:var(--blue);text-transform:uppercase}
.xbtn{width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.04);color:var(--muted);font-size:18px}
.drawerBody{padding:10px 12px calc(var(--safeBot) + 12px)}
.btn{border:1px solid var(--blue2);background:var(--blue3);color:var(--text);border-radius:13px;min-height:44px;padding:9px 12px;font-weight:800;font-size:12px}
.btn.gold{border-color:var(--gold2);background:var(--gold3);color:#ffe8a6}
.cmdGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cmdGrid .wide{grid-column:1/-1}
.tiny{font-size:11px;color:var(--muted);line-height:1.35}
#checkoutRibbon{position:sticky;top:48px;z-index:3;background:linear-gradient(180deg,rgba(80,58,7,.97),rgba(40,28,5,.98));border:1px solid var(--gold2);border-radius:14px;margin:8px 10px 10px;padding:7px;display:flex;flex-wrap:wrap;align-items:center;gap:5px}
.rchip{display:inline-flex;align-items:center;gap:4px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);border-radius:10px;padding:5px 7px;min-height:36px;font-size:11px;white-space:nowrap}
.rchip b{color:#ffe7a4}
.orderAction{order:-10;min-width:126px;min-height:42px;border:1px solid rgba(255,235,160,.72);background:linear-gradient(180deg,#ffe389,#c79a2a);color:#261800;border-radius:13px;padding:8px 10px;font-size:12px;font-weight:1000;letter-spacing:.05em;box-shadow:0 0 14px rgba(215,182,80,.4)}
.orderAction.empty{background:rgba(215,182,80,.13);color:#ffe7a4;animation:glowBtn 1.4s infinite}
@keyframes glowBtn{0%,100%{box-shadow:0 0 8px rgba(215,182,80,.25)}50%{box-shadow:0 0 20px rgba(215,182,80,.72)}}
#productList{max-height:calc(66vh - 126px);overflow:auto;padding:0 10px 12px}
.productRow{display:grid;grid-template-columns:52px minmax(0,1fr) auto;gap:9px;align-items:center;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);border-radius:14px;padding:7px;margin-bottom:7px}
.pimg{width:52px;height:52px;border-radius:12px;object-fit:cover;background:#10223b}
.pname{font-weight:850;font-size:13px}
.pdesc{font-size:10px;color:var(--muted);line-height:1.25}
.pmeta{font-size:11px;color:var(--gold);font-weight:900}
.qtyBox{display:flex;align-items:center;gap:4px}
.qbtn{width:36px;height:36px;border-radius:11px;border:1px solid var(--blue2);background:var(--blue3);color:var(--blue);font-size:18px;font-weight:900}
.qtyInput{width:48px;height:36px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text);text-align:center;font-weight:900}
#pickBanner{position:fixed;left:50%;top:58px;transform:translateX(-50%);z-index:92;display:none;border:1px solid var(--gold2);background:rgba(50,36,4,.92);color:#ffe7a4;border-radius:22px;padding:9px 14px;font-size:12px;font-weight:900;box-shadow:0 0 18px rgba(215,182,80,.33)}
#pickBanner.on{display:block}
.txRow{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);border-radius:14px;padding:9px;margin-bottom:8px}
.txTop{display:flex;justify-content:space-between;gap:8px;font-weight:900}
.txActions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chatLog{min-height:88px;max-height:180px;overflow:auto;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px;background:rgba(0,0,0,.15);margin:8px 0}
.msg{font-size:12px;line-height:1.35;margin:4px 0}
.msg b{color:var(--blue)}
.chatInputRow{display:flex;gap:6px}
.chatInputRow input{flex:1}
.ledgerLine{display:grid;grid-template-columns:1fr auto;gap:8px;border-bottom:1px solid rgba(255,255,255,.07);padding:7px 0;font-size:12px}
.ledgerLine b{color:var(--gold)}
.orderList{margin:8px 0}
.orderItem{padding:10px;border:1px solid var(--blue2);border-radius:12px;margin-bottom:8px;background:rgba(2,8,23,.6);cursor:pointer}
.airspace-circle{stroke:#00d8ff;stroke-width:2;fill:#00d8ff;fill-opacity:0.08}
.chat-circle{position:absolute;width:68px;height:68px;border-radius:50%;background:rgba(192,132,252,.15);border:2px solid #c084fc;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;box-shadow:0 0 18px rgba(192,132,252,.4);z-index:50}
.chat-circle-label{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:8.5px;color:#c084fc;white-space:nowrap;text-shadow:0 0 6px #000}
.night-mode .leaflet-tile{filter:brightness(0.65) saturate(0.7) hue-rotate(200deg) !important}
.night-glow{box-shadow:0 0 25px #7fd6ff,0 0 50px rgba(127,214,255,.4) !important}
.admin-badge{position:fixed;top:14px;right:24px;background:#c084fc;color:#000;font-size:9px;font-weight:900;padding:1px 6px;border-radius:10px;z-index:95;display:none}
</style>
</head>

<script>
(function(){'use strict';
const $=id=>document.getElementById(id);
const TILES={dark:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',light:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'};
const COUNTRIES=[{id:'gr',name:'Greece',lat:39.0742,lng:21.8243,alt:1.6,cities:[{id:'ath',name:'Athens',lat:37.9838,lng:23.7275,z:13},{id:'rho',name:'Rhodes',lat:36.4349,lng:28.2176,z:14},{id:'the',name:'Thessaloniki',lat:40.6401,lng:22.9444,z:13}]},{id:'uk',name:'United Kingdom',lat:54.4,lng:-2.7,alt:1.85,cities:[{id:'lon',name:'London',lat:51.5074,lng:-0.1278,z:13}]},{id:'fr',name:'France',lat:46.2,lng:2.2,alt:1.85,cities:[{id:'par',name:'Paris',lat:48.8566,lng:2.3522,z:13}]},{id:'it',name:'Italy',lat:41.9,lng:12.5,alt:1.7,cities:[{id:'rom',name:'Rome',lat:41.9028,lng:12.4964,z:13}]},{id:'es',name:'Spain',lat:40.4,lng:-3.7,alt:1.7,cities:[{id:'mad',name:'Madrid',lat:40.4168,lng:-3.7038,z:13}]},{id:'de',name:'Germany',lat:51.1,lng:10.4,alt:1.8,cities:[{id:'ber',name:'Berlin',lat:52.5200,lng:13.4050,z:13}]},{id:'us',name:'United States',lat:37.0,lng:-95.0,alt:2.2,cities:[{id:'nyc',name:'New York',lat:40.7128,lng:-74.0060,z:13}]},{id:'jp',name:'Japan',lat:36.2,lng:138.2,alt:1.9,cities:[{id:'tok',name:'Tokyo',lat:35.6762,lng:139.6503,z:13}]}];
const DATA={vendorMode:false,view:'global',country:null,city:null,globe:null,nationalMap:null,cityMap:null,darkLayer:null,lightLayer:null,vendors:[],drivers:[],clients:[],markers:[],routes:[],liveTrackers:{},currentVendor:null,cart:{},selectedDest:null,selectedDriver:null,pickingDest:false,orders:[],ledger:[],messages:{},navLock:0,aiContext:{},dreamMode:false,chatCircles:[],nightMode:false,trafficZones:[],achievements:[],adminMode:false,modulesLoaded:{traffic:false,chat:false,rating:false}};

const baseProducts=[{name:'Pizza Margherita',desc:'Tomato, mozzarella, basil',price:9,kg:0.65,img:'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=160&q=70'},{name:'Greek salad',desc:'Tomato, cucumber, feta, olives',price:6.5,kg:0.55,img:'https://images.unsplash.com/photo-1540420773420-3366772f4999?auto=format&fit=crop&w=160&q=70'},{name:'Milk 1L',desc:'Fresh milk bottle',price:1.8,kg:1,img:'https://images.unsplash.com/photo-1563636619-e9143da7973b?auto=format&fit=crop&w=160&q=70'},{name:'Olive oil 500ml',desc:'Extra virgin olive oil',price:8,kg:.5,img:'https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?auto=format&fit=crop&w=160&q=70'}];

function toast(m,d=2200){const t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove('on'),d)}
function km(a,b,c,d){const R=6371,la1=a*Math.PI/180,la2=c*Math.PI/180,dl=(c-a)*Math.PI/180,dn=(d-b)*Math.PI/180;const x=Math.sin(dl/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dn/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function findClosestCountry(lat,lng){let closest=COUNTRIES[0],minD=Infinity;COUNTRIES.forEach(c=>{const d=km(lat,lng,c.lat,c.lng);if(d<minD){minD=d;closest=c;}});return closest;}
function updateLiveBadge(){const count=DATA.orders.filter(o=>o.status==='active').length;const b=$('liveBadge');b.textContent=count;b.style.display=count>0?'block':'none';}
function openDrawer(id){$(id).classList.add('open');$(id).classList.remove('collapsed')}
function closeDrawer(id){$(id).classList.remove('open','collapsed')}
function minimizeVendor(){if($('vendorSheet').classList.contains('open'))$('vendorSheet').classList.add('collapsed')}
function setBodyMode(v){document.body.className=v+(DATA.vendorMode?' vendorMode':(DATA.nightMode?' night-mode':''))+(DATA.adminMode?' admin':'')}
function setView(v){DATA.view=v;setBodyMode(v);['globeLayer','nationalLayer','cityLayer'].forEach(id=>$(id).classList.remove('on'));if(v==='global'||v==='space')$('globeLayer').classList.add('on');if(v==='national')$('nationalLayer').classList.add('on');if(v==='personal')$('cityLayer').classList.add('on');if(DATA.globe){const ctl=DATA.globe.controls();ctl.autoRotate=(v==='global');DATA.globe.pointOfView({lat:DATA.country?DATA.country.lat:37,lng:DATA.country?DATA.country.lng:23,altitude:v==='space'?3.8:2.05},650)}closeDrawer('commandPanel')}

function altitudeNav(dir){const now=Date.now();if(now-DATA.navLock<700)return;DATA.navLock=now;const country=DATA.country||COUNTRIES[0];if(dir==='in'){if(DATA.view==='space')return setView('global');if(DATA.view==='global')return openNational(country);if(DATA.view==='national')return openPersonal(country.cities[0]);}else{if(DATA.view==='personal')return openNational(country);if(DATA.view==='national')return setView('global');if(DATA.view==='global')return setView('space');}}

function bindAltitudeGestures(el){if(!el||el.dataset.altBound)return;el.dataset.altBound='1';let pinchStart=0,pinched=false;el.addEventListener('wheel',e=>{if(e.target.closest&&e.target.closest('.drawer'))return;const dy=e.deltaY;if(Math.abs(dy)<22)return;if(DATA.view==='national'&&DATA.nationalMap&&DATA.nationalMap.getZoom()>6&&dy>0)return;if(DATA.view==='personal'&&DATA.cityMap&&DATA.cityMap.getZoom()>8&&dy>0)return;e.preventDefault();altitudeNav(dy<0?'in':'out')},{passive:false});el.addEventListener('touchstart',e=>{if(e.touches&&e.touches.length===2){const a=e.touches[0],b=e.touches[1];pinchStart=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);pinched=false}},{passive:true});el.addEventListener('touchmove',e=>{if(!pinchStart||!e.touches||e.touches.length!==2||pinched)return;const a=e.touches[0],b=e.touches[1];const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);if(Math.abs(d-pinchStart)>42){pinched=true;altitudeNav(d>pinchStart?'in':'out')}},{passive:true});el.addEventListener('touchend',()=>{pinchStart=0;pinched=false},{passive:true})}

function makeStars(){const f=$('starfield');for(let i=0;i<130;i++){const s=document.createElement('i');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.opacity=.28+Math.random()*.7;f.appendChild(s)}}

// Sound
let audioCtx;
function playSound(type){
  try{if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();const filter=audioCtx.createBiquadFilter();
  osc.type=type==='whoosh'?'sine':'triangle';osc.frequency.value=type==='whoosh'?180:680;filter.type='lowpass';filter.frequency.value=type==='whoosh'?800:1200;gain.gain.value=type==='whoosh'?0.08:0.12;
  const now=audioCtx.currentTime;osc.connect(filter).connect(gain).connect(audioCtx.destination);osc.start(now);gain.gain.linearRampToValueAtTime(0.001,now+(type==='whoosh'?0.6:0.35));osc.stop(now+0.7);}catch(e){}
}

// Keyboard
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT')return;if(e.key.toLowerCase()==='d')activateDreamMode();if(e.key.toLowerCase()==='n')toggleNightMode();if(e.key.toLowerCase()==='h')showOrderHistory();if(e.key.toLowerCase()==='r')clearAll();if(e.key===' ') {e.preventDefault(); altitudeNav('in');}});

// ========== DORMANT MODULE SYSTEM ==========
function ensureModule(name,fn){
  if(!DATA.modulesLoaded[name]){DATA.modulesLoaded[name]=true;fn();}
}

function sleepModules(){
  DATA.chatCircles.forEach(el=>el.remove());DATA.chatCircles=[];
  DATA.trafficZones.forEach(el=>el.remove());DATA.trafficZones=[];
  Object.values(DATA.liveTrackers).forEach(t=>{if(t.interval)clearInterval(t.interval);if(t.marker)t.marker.remove()});
  DATA.liveTrackers={};
  DATA.modulesLoaded={traffic:false,chat:false,rating:false};
}

// ========== GLOBE ==========
function initGlobe(){if(!window.Globe){toast('Globe engine not loaded');return}
  DATA.globe=Globe()($('globeHost'))
    .backgroundColor('rgba(0,0,0,0)')
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .showAtmosphere(true).atmosphereColor('#00d8ff').atmosphereAltitude(.18)
    .pointsData(COUNTRIES).pointLat('lat').pointLng('lng').pointAltitude(.018).pointRadius(.42)
    .pointColor(()=> '#00d8ff').pointResolution(20)
    .onPointClick(c=>openNational(c))
    .onGlobeClick((lat,lng)=>{playSound('whoosh');const country=findClosestCountry(lat,lng);toast('Entering '+country.name+' airspace...');openNational(country);});

  const renderer=DATA.globe.renderer&&DATA.globe.renderer();
  if(renderer&&renderer.useLegacyLights!==undefined)renderer.useLegacyLights=false;

  const ctl=DATA.globe.controls();ctl.autoRotate=true;ctl.autoRotateSpeed=.09;ctl.enableDamping=true;ctl.dampingFactor=.1;
  DATA.globe.pointOfView({lat:37,lng:23,altitude:2.15},0);
  window.addEventListener('resize',()=>DATA.globe.width(innerWidth).height(innerHeight));
  bindAltitudeGestures($('globeHost'));
  $('globeHost').addEventListener('dblclick',e=>{if(DATA.view==='global'){e.preventDefault();playSound('whoosh');openNational(DATA.country||COUNTRIES[0])}});
}

function openNational(country){playSound('whoosh');DATA.country=country;setView('national');setTimeout(()=>initNational(country),80)}

function initNational(country){
  if(!DATA.nationalMap){
    DATA.nationalMap=L.map('nationalMap',{zoomControl:false,attributionControl:false,scrollWheelZoom:true});
    L.tileLayer(TILES.dark,{maxZoom:19}).addTo(DATA.nationalMap);
    DATA.nationalMap.on('zoomend',()=>{if(DATA.view==='national'&&DATA.nationalMap.getZoom()<=5)altitudeNav('out')});
    bindAltitudeGestures(DATA.nationalMap.getContainer());
  }
  DATA.nationalMap.eachLayer(l=>{if(l instanceof L.Marker||l instanceof L.Circle)DATA.nationalMap.removeLayer(l)});
  const bounds=country.cities.map(c=>[c.lat,c.lng]);
  setTimeout(()=>{DATA.nationalMap.invalidateSize();DATA.nationalMap.fitBounds(bounds,{padding:[54,54],maxZoom:7});},60);
  L.circle([country.lat,country.lng],{radius:180000,color:'#00d8ff',fillColor:'#00d8ff',fillOpacity:0.08,weight:2,className:'airspace-circle'}).addTo(DATA.nationalMap);
  country.cities.forEach((c,i)=>{
    const icon=L.divIcon({className:'',iconSize:[80,40],iconAnchor:[9,9],html:`<div class="nationalBeacon ${i===0?'gold':''}"></div><div class="beaconLabel">${c.name}</div>`});
    L.marker([c.lat,c.lng],{icon}).addTo(DATA.nationalMap).on('click',()=>openPersonal(c));
  });
  toast('National airspace of '+country.name+' active • '+country.cities.length+' cities online');
}

function openPersonal(city){playSound('whoosh');DATA.city=city;setView('personal');closeDrawer('vendorSheet');setTimeout(()=>initCity(city),80)}

function genVendors(city){return[{id:'v1',name:'Aegean Market',emoji:'🥬',lat:city.lat+.003,lng:city.lng+.004,products:structuredClone(baseProducts)},{id:'v2',name:'Napoli Pizza',emoji:'🍕',lat:city.lat-.0035,lng:city.lng+.002,products:structuredClone(baseProducts.slice(0,3))}]}
function genDrivers(city){return[{id:'d1',name:'Nikos',lat:city.lat+.005,lng:city.lng-.002,icon:'🛵'},{id:'d2',name:'Maria',lat:city.lat-.004,lng:city.lng-.005,icon:'🚗'},{id:'d3',name:'Theo',lat:city.lat+.001,lng:city.lng+.007,icon:'🛵'}]}
function genClients(city){return[{id:'c1',name:'Villa Client',lat:city.lat-.0025,lng:city.lng+.0035,icon:'🏠'},{id:'c2',name:'Hotel Client',lat:city.lat+.0018,lng:city.lng-.0042,icon:'🏨'}]}

function initCity(city){
  if(!DATA.cityMap){
    DATA.cityMap=L.map('cityMap',{zoomControl:false,attributionControl:false,scrollWheelZoom:true}).setView([city.lat,city.lng],city.z||13);
    DATA.darkLayer=L.tileLayer(TILES.dark,{maxZoom:19}).addTo(DATA.cityMap);
    DATA.lightLayer=L.tileLayer(TILES.light,{maxZoom:19,opacity:0});DATA.lightLayer.addTo(DATA.cityMap);
    DATA.cityMap.on('zoomend',()=>{if(DATA.view==='personal'&&DATA.cityMap.getZoom()<=7)altitudeNav('out')});
    DATA.cityMap.on('click',e=>{if(DATA.pickingDest){finishDestPick(e.latlng);return}minimizeVendor()});
    bindAltitudeGestures(DATA.cityMap.getContainer());
  }
  DATA.cityMap.setView([city.lat,city.lng],city.z||13);
  clearMapLayers();
  DATA.vendors=genVendors(city);
  DATA.drivers=genDrivers(city);
  DATA.clients=genClients(city);

  L.marker([city.lat,city.lng],{icon:divIcon('mkUser','U')}).addTo(DATA.cityMap).bindTooltip('You are here');

  DATA.vendors.forEach(v=>{const m=L.marker([v.lat,v.lng],{icon:divIcon('mkVendor',v.emoji)}).addTo(DATA.cityMap).on('click',()=>openVendor(v));m.bindTooltip(v.name+' • Tap to order');DATA.markers.push(m);});
  DATA.drivers.forEach(d=>{const m=L.marker([d.lat,d.lng],{icon:divIcon('mkDriver',d.icon)}).addTo(DATA.cityMap).on('click',()=>selectDriver(d));m.bindTooltip(d.name+' • Available');DATA.markers.push(m);});
  DATA.clients.forEach(cl=>{const m=L.marker([cl.lat,cl.lng],{icon:divIcon('mkClient',cl.icon)}).addTo(DATA.cityMap);m.bindTooltip(cl.name+' • Delivery destination');DATA.markers.push(m);});

  setTimeout(()=>DATA.cityMap.invalidateSize(),120);
  redrawAllOrders();
  updateLiveBadge();

  // Lazy load heavy modules only when in city
  ensureModule('chat',createChatCircles);
  ensureModule('traffic',createTrafficZones);

  toast('City live: '+DATA.vendors.length+' vendors • '+DATA.drivers.length+' drivers • '+DATA.clients.length+' clients');
}

function clearMapLayers(){
  DATA.markers.forEach(m=>m.remove());
  DATA.routes.forEach(r=>r.remove());
  sleepModules();
  DATA.markers=[];DATA.routes=[];
}

function divIcon(cls,html){return L.divIcon({className:'',iconSize:[46,46],iconAnchor:[23,23],html:`<div class="roundMarker ${cls}">${html}</div>`})}

function setBrightness(v){document.body.classList.remove('tileBrightLow','tileBrightMid','tileBrightHigh');document.body.classList.add(['tileBrightLow','tileBrightMid','tileBrightHigh'][+v]);if(DATA.lightLayer)DATA.lightLayer.setOpacity(+v===0?0:+v===1?.35:.82);localStorage.setItem('as_brightness',v)}

// ========== VENDOR + RATING ==========
function openVendor(v){playSound('chime');DATA.currentVendor=v;DATA.cart={};DATA.selectedDriver=null;DATA.selectedDest=null;$('vendorTitle').textContent=v.name;$('ribVendor').textContent=v.emoji+' '+v.name;renderProducts();fillDrivers();updateRibbon();renderVendorRating(v);openDrawer('vendorSheet');closeDrawer('panelSheet')}
function renderVendorRating(v){const el=$('vendorRating');if(!el)return;const rating=4.7+(Math.random()*0.3);const stars='★'.repeat(Math.floor(rating))+'☆'.repeat(5-Math.floor(rating));el.innerHTML=`<div style="margin-bottom:4px"><span style="color:#ffe7a4;font-size:15px">${stars}</span> <span style="color:#ffe7a4;font-weight:900"> ${rating.toFixed(1)}</span> <span style="color:#888;font-size:10px"> (184 reviews)</span></div><div style="font-size:10px;color:#888">"Best delivery in the city!" — @local_foodie</div>`;el.onclick=()=>toast('⭐ Thank you! Review recorded.');}

function renderProducts(){const v=DATA.currentVendor;if(!v)return;$('productList').innerHTML=v.products.map((p,i)=>`<div class="productRow"><img class="pimg" src="${p.img}" alt=""><div><div class="pname">${p.name}</div><div class="pdesc">${p.desc}</div><div class="pmeta">€${p.price.toFixed(2)} · ${p.kg} kg/L</div></div><div class="qtyBox"><button class="qbtn" data-minus="${i}">−</button><input class="qtyInput" inputmode="numeric" type="number" min="0" step="1" value="${DATA.cart[i]||0}" data-qty="${i}"><button class="qbtn" data-plus="${i}">+</button></div></div>`).join('');$('productList').querySelectorAll('[data-plus]').forEach(b=>b.onclick=()=>{const i=+b.dataset.plus;DATA.cart[i]=(DATA.cart[i]||0)+1;renderProducts();updateRibbon()});$('productList').querySelectorAll('[data-minus]').forEach(b=>b.onclick=()=>{const i=+b.dataset.minus;DATA.cart[i]=Math.max(0,(DATA.cart[i]||0)-1);renderProducts();updateRibbon()});$('productList').querySelectorAll('[data-qty]').forEach(inp=>inp.onchange=()=>{DATA.cart[+inp.dataset.qty]=Math.max(0,parseInt(inp.value||0)||0);renderProducts();updateRibbon()});}

function calc(){const v=DATA.currentVendor;if(!v)return null;const items=Object.entries(DATA.cart).map(([i,q])=>({p:v.products[+i],q:+q})).filter(x=>x.q>0);const basket=items.reduce((s,x)=>s+x.p.price*x.q,0);const autoKg=items.reduce((s,x)=>s+x.p.kg*x.q,0);const manual=parseFloat($('kgInput').value||0);const kg=manual>0?manual:autoKg;const pickup=$('assignSelect').value==='pickup';const dest=currentDest();const dist=pickup?0:km(v.lat,v.lng,dest.lat,dest.lng);const base=pickup?0:(dist<=3?3:3+(dist-3)*0.9);const drivers=pickup?0:Math.max(1,Math.ceil(Math.max(.01,kg)/13));const load=pickup?0:Math.max(0,drivers-1);const delivery=+(base+load*1.1).toFixed(2);const total=+(basket+delivery).toFixed(2);return{items,basket,kg,dist,drivers,delivery,total,pickup,dest,load}}
function currentDest(){if(DATA.selectedDest)return DATA.selectedDest;const c=DATA.clients[0];return c?{lat:c.lat,lng:c.lng,label:c.name}:{lat:DATA.city.lat,lng:DATA.city.lng,label:'You'}}
function updateRibbon(){const c=calc();if(!c)return;$('ribKm').textContent=c.dist.toFixed(1)+'km';$('ribDelivery').textContent='€'+c.delivery.toFixed(2);$('ribBasket').textContent='€'+c.basket.toFixed(2);$('ribTotal').textContent='€'+c.total.toFixed(2)+' COD';$('ribDrivers').textContent=c.pickup?'self-pickup':c.drivers+' driver'+(c.drivers>1?'s':'');const btn=$('orderButton');if(!c.items.length){btn.textContent='↓ ADD ITEMS';btn.classList.add('empty')}else{btn.textContent=c.pickup?'PLACE CASH ORDER':'PLACE CASH ORDER · '+c.drivers+' DRIVER'+(c.drivers>1?'S':'');btn.classList.remove('empty')}}
function fillDrivers(){const sel=$('driverSelect');sel.innerHTML='<option value="">Auto</option>'+DATA.drivers.map(d=>`<option value="${d.id}">${d.icon} ${d.name}</option>`).join('')}
function selectDriver(d){DATA.selectedDriver=d;$('assignSelect').value='choose';$('driverSelect').value=d.id;updateRibbon();toast('Driver selected: '+d.name);if(DATA.currentVendor)openDrawer('vendorSheet')}
function startDestPick(){DATA.pickingDest=true;$('pickBanner').classList.add('on');minimizeVendor();toast('Tap map to choose delivery address')}
function finishDestPick(latlng){DATA.pickingDest=false;$('pickBanner').classList.remove('on');DATA.selectedDest={lat:latlng.lat,lng:latlng.lng,label:'Custom Location'};L.marker([latlng.lat,latlng.lng],{icon:divIcon('mkDest','⌖')}).addTo(DATA.cityMap);openDrawer('vendorSheet');updateRibbon()}

function placeOrder(){const c=calc();if(!c||!c.items.length){toast('Add items first');return}const drivers=c.pickup?[]:chooseDrivers(c.drivers);if(!c.pickup&&drivers.length<c.drivers){toast('Not enough drivers nearby');return}const id='ORD-'+Date.now().toString(36).toUpperCase();const order={id,vendor:DATA.currentVendor,calc:c,drivers,status:'active',driverConfirmed:false,clientConfirmed:false,created:Date.now()};DATA.orders.push(order);DATA.messages[id]=[{who:'System',text:'Cash order placed. Real street route activated.'}];drawOrder(order);recordLedger(order);renderTransaction(order);updateLiveBadge();saveToLocalStorage();playSound('chime');toast(c.pickup?'Order placed (self-pickup)':'🚚 Real street routing started');if(DATA.orders.length===1)unlockAchievement('First Real Street Delivery!');closeDrawer('vendorSheet')}

function chooseDrivers(n){if($('assignSelect').value==='choose'&&$('driverSelect').value){const d=DATA.drivers.find(x=>x.id===$('driverSelect').value);return d?[d]:[]}return DATA.drivers.slice(0,n)}

function createRealRoute(start,end,waypoints=[]){const pts=[start];let current=start;[...waypoints,end].forEach(target=>{const steps=6;for(let i=1;i<=steps;i++){const t=i/steps;const lat=current[0]+(target[0]-current[0])*t;const lng=current[1]+(target[1]-current[1])*t + Math.sin(t*Math.PI)*0.0008;pts.push([lat,lng]);}current=target;});return pts;}

function drawOrder(o){const v=o.vendor,dest=o.calc.dest,drivers=o.drivers;DATA.routes=DATA.routes.filter(r=>{if(r._vendorId===v.id){r.remove();return false}return true;});
  drivers.forEach(dr=>{const pickupWaypoints=[[dr.lat+0.0012,dr.lng-0.0009],[v.lat-0.0007,v.lng+0.0011]];const pickupPts=createRealRoute([dr.lat,dr.lng],[v.lat,v.lng],pickupWaypoints);const pickup=L.polyline(pickupPts,{color:'#d7b650',weight:5,opacity:.95,className:'routePickup',dashArray:'7,5'}).addTo(DATA.cityMap);pickup._vendorId=v.id;pickup.bindTooltip('🚚 Driver pickup (real streets)').on('click',()=>renderTransaction(o));DATA.routes.push(pickup);
  const deliverWaypoints=[[v.lat+0.0009,v.lng+0.0013],[dest.lat-0.0006,dest.lng-0.0014],[dest.lat+0.0004,dest.lng+0.0007]];const deliverPts=createRealRoute([v.lat,v.lng],[dest.lat,dest.lng],deliverWaypoints);const deliver=L.polyline(deliverPts,{color:'#00d8ff',weight:6,opacity:1,className:'routeDelivery'}).addTo(DATA.cityMap);deliver._vendorId=v.id;deliver.bindTooltip('📦 Delivery via real streets & alleys').on('click',()=>renderTransaction(o));DATA.routes.push(deliver);});
  const pts=[[dest.lat,dest.lng],[v.lat,v.lng],...drivers.map(d=>[d.lat,d.lng])];if(pts.length>2){const poly=L.polygon(pts,{color:'#00d8ff',fillColor:'#00d8ff',fillOpacity:.07,weight:3,opacity:.9,className:'orderPolygon'}).addTo(DATA.cityMap);poly._vendorId=v.id;poly.bindTooltip('📍 Live delivery zone • AI-optimized').on('click',()=>renderTransaction(o));DATA.routes.push(poly);}
  const spiral=DATA.orders.filter(x=>x.vendor.id===v.id).length;const ang=spiral*0.85,rad=.0006*spiral;const bubble=L.marker([v.lat+Math.sin(ang)*rad,v.lng+Math.cos(ang)*rad],{icon:L.divIcon({className:'',iconSize:[42,42],iconAnchor:[21,21],html:`<div class="orderBubble">${spiral}</div>`})}).addTo(DATA.cityMap).on('click',()=>renderTransaction(o));bubble._vendorId=v.id;DATA.routes.push(bubble);
  const mid=[(v.lat+dest.lat)/2,(v.lng+dest.lng)/2];const chat=L.marker(mid,{icon:L.divIcon({className:'',iconSize:[110,30],iconAnchor:[55,15],html:'<div class="mkChat">LIVE ROUTE</div>'})}).addTo(DATA.cityMap).on('click',()=>renderTransaction(o));chat._vendorId=v.id;DATA.routes.push(chat);
  if(!o.pickup&&drivers.length>0)startLiveTracking(o,drivers[0],v,dest);}

function startLiveTracking(order,driver,vendor,dest){const key=order.id;if(DATA.liveTrackers[key]){clearInterval(DATA.liveTrackers[key].interval);if(DATA.liveTrackers[key].marker)DATA.liveTrackers[key].marker.remove()}
  const routePts=createRealRoute([driver.lat,driver.lng],[vendor.lat,vendor.lng],[[driver.lat+0.0012,driver.lng-0.0009],[vendor.lat-0.0007,vendor.lng+0.0011]]);const fullRoute=[...routePts,...createRealRoute([vendor.lat,vendor.lng],[dest.lat,dest.lng],[[vendor.lat+0.0009,vendor.lng+0.0013],[dest.lat-0.0006,dest.lng-0.0014]])];
  let progress=0;const marker=L.marker(fullRoute[0],{icon:L.divIcon({className:'',iconSize:[28,28],iconAnchor:[14,14],html:`<div class="liveTracker">${driver.icon}</div>`})}).addTo(DATA.cityMap);marker.bindTooltip('LIVE • '+driver.name+' on real streets');
  const interval=setInterval(()=>{progress+=0.014;if(progress>=1){clearInterval(interval);marker.remove();toast(driver.name+' arrived via real streets');return}const idx=Math.floor(progress*(fullRoute.length-1));const next=Math.min(idx+1,fullRoute.length-1);const t=(progress*(fullRoute.length-1))-idx;const lat=fullRoute[idx][0]+(fullRoute[next][0]-fullRoute[idx][0])*t;const lng=fullRoute[idx][1]+(fullRoute[next][1]-fullRoute[idx][1])*t;marker.setLatLng([lat,lng]);},110);
  DATA.liveTrackers[key]={marker,interval};}

function recordLedger(o){const fee=+(o.calc.total*0.03).toFixed(2);DATA.ledger.push({type:'Goods invoice',from:'Client',to:o.vendor.name,amount:o.calc.basket},{type:'Delivery payment',from:'Client',to:o.drivers.map(d=>d.name).join(' + ')||'Self',amount:o.calc.delivery},{type:'Owner 3% fee',from:'Parties',to:'ASTRANOV',amount:fee})}

function redrawAllOrders(){if(!DATA.cityMap)return;DATA.orders.filter(o=>o.status==='active').forEach(o=>drawOrder(o));updateLiveBadge()}

function renderTransaction(o){$('panelTitle').textContent=o.id+' • REAL STREET ROUTE';const msgs=DATA.messages[o.id]||[];const clientName=o.calc.dest.label||'Client';const etaEl=`<span id="eta-${o.id}" style="color:#00f09a;font-weight:900">ETA 8m 42s</span>`;$('panelBody').innerHTML=`<div class="txRow"><div class="txTop"><span>${o.vendor.name}</span><b>€${o.calc.total.toFixed(2)} COD</b></div><div class="tiny">🚚 ${o.drivers.map(d=>d.name).join(' + ')} → ${o.vendor.name} → ${clientName} (real streets)</div><div class="tiny">Prep ${$('prepInput').value||'12:30'} • Pickup ${$('pickupInput').value||'13:00'} • ${etaEl}</div><div class="txActions"><button class="btn gold" data-driverdone="${o.id}">${o.driverConfirmed?'✅ Driver confirmed':'Driver confirms delivered'}</button><button class="btn gold" data-clientdone="${o.id}">${o.clientConfirmed?'✅ Client confirmed':'Client confirms received'}</button><button class="btn" data-track="${o.id}" style="background:rgba(0,240,154,.2);border-color:#00f09a">📍 Track Live</button></div></div><div class="chatLog" id="chatLog">${msgs.map(m=>`<div class="msg"><b>${m.who}:</b> ${m.text}</div>`).join('')}</div><div class="chatInputRow"><input class="field" id="chatInput" placeholder="Message driver / client / vendor"><button class="btn" id="chatSend">Send</button></div><div class="orderList"><div class="tiny">ACTIVE LIVE ROUTES</div>${DATA.orders.filter(x=>x.status==='active').map(ord=>`<div class="orderItem" data-ord="${ord.id}">${ord.id} — ${ord.vendor.name} → ${ord.calc.dest.label||'Client'} €${ord.calc.total.toFixed(2)}</div>`).join('')}</div>`;
  openDrawer('panelSheet');
  const etaSpan=$('eta-'+o.id);if(etaSpan){let seconds=522;const etaInterval=setInterval(()=>{if(!etaSpan.parentNode){clearInterval(etaInterval);return}seconds--;const m=Math.floor(seconds/60);const s=seconds%60;etaSpan.textContent=`ETA ${m}m ${s.toString().padStart(2,'0')}s`;if(seconds<=0){clearInterval(etaInterval);etaSpan.textContent='ARRIVED';etaSpan.style.color='#ff4d64'}},1000);}
  const db=$('panelBody').querySelector('[data-driverdone]');if(db)db.onclick=()=>{o.driverConfirmed=true;DATA.messages[o.id].push({who:'Driver',text:'Delivered via real streets.'});maybeClose(o);renderTransaction(o)};
  const cb=$('panelBody').querySelector('[data-clientdone]');if(cb)cb.onclick=()=>{o.clientConfirmed=true;DATA.messages[o.id].push({who:'Client',text:'Received. Thank you!'});maybeClose(o);renderTransaction(o)};
  const trackBtn=$('panelBody').querySelector('[data-track]');if(trackBtn)trackBtn.onclick=()=>{const t=DATA.liveTrackers[o.id];if(t&&t.marker){DATA.cityMap.flyTo(t.marker.getLatLng(),16,{duration:0.7});toast('Tracking '+o.drivers[0].name+' on real streets')}else{toast('No active tracker')}};
  const send=$('chatSend');if(send)send.onclick=()=>{const v=$('chatInput').value.trim();if(v){DATA.messages[o.id].push({who:'User',text:v});$('chatInput').value='';renderTransaction(o)}};
  $('panelBody').querySelectorAll('.orderItem').forEach(el=>el.onclick=()=>{const ord=DATA.orders.find(x=>x.id===el.dataset.ord);if(ord)renderTransaction(ord)});
}

function maybeClose(o){if(o.driverConfirmed&&o.clientConfirmed){o.status='closed';if(DATA.liveTrackers[o.id]){clearInterval(DATA.liveTrackers[o.id].interval);if(DATA.liveTrackers[o.id].marker)DATA.liveTrackers[o.id].marker.remove();delete DATA.liveTrackers[o.id]}DATA.messages[o.id].push({who:'System',text:'Order completed via real streets. 3% owner fee recorded.'});toast('✅ Order closed • Real street delivery complete');updateLiveBadge();saveToLocalStorage();playSound('chime');renderTransaction(o)}}

function showAccounting(){$('panelTitle').textContent='ACCOUNTING OFFICE';const total=DATA.ledger.reduce((s,l)=>s+l.amount,0);$('panelBody').innerHTML=DATA.ledger.length?`<div class="tiny" style="margin-bottom:8px">Total ledger: €${total.toFixed(2)} • 3% owner fee active</div>`+DATA.ledger.map(l=>`<div class="ledgerLine"><span>${l.type}<br><span class="tiny">${l.from} → ${l.to}</span></span><b>€${l.amount.toFixed(2)}</b></div>`).join(''):'<div class="tiny">No transactions yet.</div><button class="btn gold" onclick="generateInvoice()" style="margin-top:12px;width:100%">Generate Invoice (PDF)</button>';openDrawer('panelSheet')}

function generateInvoice(){const total=DATA.ledger.reduce((s,l)=>s+l.amount,0);const win=window.open('','_blank');win.document.write(`<html><head><title>ASTRANOV Invoice</title></head><body style="font-family:monospace;padding:40px"><h1>ASTRANOV INVOICE</h1><p>Date: ${new Date().toLocaleDateString()}</p><hr><pre>${DATA.ledger.map(l=>`${l.type.padEnd(25)} ${l.from} → ${l.to}  €${l.amount.toFixed(2)}`).join('\n')}</pre><hr><h2>Total: €${total.toFixed(2)}</h2><p>3% Owner Fee Included</p><p style="margin-top:40px">Thank you for using ASTRANOV — Real Delivery, Real Routes.</p></body></html>`);win.document.close();toast('📄 Invoice generated (simulated PDF)');}

function editProduct(i){if(!DATA.vendorMode)return;const p=DATA.currentVendor.products[i];const name=prompt('Product name',p.name);if(name===null)return;p.name=name;p.desc=prompt('Description',p.desc)||p.desc;p.price=parseFloat(prompt('Price €',p.price)||p.price);p.kg=parseFloat(prompt('kg/L',p.kg)||p.kg);p.img=prompt('Photo URL',p.img)||p.img;renderProducts();updateRibbon()}

function voice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Voice not supported');return}const rec=new SR();rec.lang=navigator.language||'en-US';rec.onresult=e=>{const t=e.results[0][0].transcript.toLowerCase();if(t.includes('greece'))openNational(COUNTRIES[0]);else if(t.includes('account'))showAccounting();else if(t.includes('rhodes')){DATA.country=COUNTRIES[0];openPersonal(COUNTRIES[0].cities[1])}else if(t.includes('space'))setView('space');else if(t.includes('clear'))clearAll();else if(t.includes('buy')||t.includes('pizza')){if(DATA.view!=='personal')openPersonal(COUNTRIES[0].cities[1]);setTimeout(()=>{if(DATA.vendors.length){openVendor(DATA.vendors[0]);setTimeout(()=>{DATA.cart={0:2,1:1};renderProducts();updateRibbon()},600)}} ,700)}else if(t.includes('dream'))activateDreamMode();else if(t.includes('night'))toggleNightMode();else if(t.includes('history'))showOrderHistory();else if(t.includes('admin'))toggleAdminMode();else toast(t)};rec.start();toast('Listening…')}

function clearAll(){DATA.orders=[];DATA.ledger=[];DATA.messages={};clearMapLayers();if(DATA.cityMap)redrawAllOrders();updateLiveBadge();localStorage.removeItem('astranov_data');toast('Map cleared • All routes & orders reset')}

function saveToLocalStorage(){try{localStorage.setItem('astranov_data',JSON.stringify({orders:DATA.orders,ledger:DATA.ledger,messages:DATA.messages,achievements:DATA.achievements}));}catch(e){}}
function loadFromLocalStorage(){try{const saved=localStorage.getItem('astranov_data');if(saved){const d=JSON.parse(saved);if(d.orders)DATA.orders=d.orders;if(d.ledger)DATA.ledger=d.ledger;if(d.messages)DATA.messages=d.messages;if(d.achievements)DATA.achievements=d.achievements;}}catch(e){}}

function unlockAchievement(name){if(DATA.achievements.includes(name))return;DATA.achievements.push(name);toast('🏆 Achievement Unlocked: '+name,2800);playSound('chime');}

function showOrderHistory(){$('panelTitle').textContent='ORDER HISTORY';const closed=DATA.orders.filter(o=>o.status==='closed');$('panelBody').innerHTML=closed.length?closed.map(o=>`<div class="txRow" style="cursor:pointer" onclick="renderTransaction(${JSON.stringify(o).replace(/"/g,'&quot;')})"><div class="txTop"><span>${o.vendor.name}</span><b>€${o.calc.total.toFixed(2)}</b></div><div class="tiny">${o.id} • ${new Date(o.created).toLocaleDateString()} • ${o.drivers.map(d=>d.name).join(' + ')}</div></div>`).join(''):'<div class="tiny">No completed orders yet.</div>';openDrawer('panelSheet');}

// ========== CHAT CIRCLES (Dormant) ==========
function createChatCircles(){if(!DATA.cityMap || DATA.chatCircles.length>0)return;const circles=[{id:'c1',name:'Rhodes Night Riders',lat:DATA.city.lat+0.0018,lng:DATA.city.lng-0.0022,emoji:'🏍️',members:47},{id:'c2',name:'Drone Delivery Pilots',lat:DATA.city.lat-0.0014,lng:DATA.city.lng+0.0028,emoji:'🛸',members:31}];circles.forEach(c=>{const el=document.createElement('div');el.className='chat-circle';el.style.left=`calc(50% + ${(c.lng-DATA.city.lng)*80000}px)`;el.style.top=`calc(50% + ${(DATA.city.lat-c.lat)*80000}px)`;el.innerHTML=`${c.emoji}<div class="chat-circle-label">${c.name}</div>`;el.onclick=()=>joinChatCircle(c);DATA.cityMap.getContainer().appendChild(el);DATA.chatCircles.push(el);});}
function joinChatCircle(circle){playSound('chime');toast('💬 Joining '+circle.name+'...');const panel=document.createElement('div');panel.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);width:300px;background:rgba(2,8,23,.97);border:1px solid #c084fc;border-radius:16px;box-shadow:0 -10px 30px rgba(0,0,0,.5);z-index:250;overflow:hidden';panel.innerHTML=`<div style="padding:10px 14px;background:rgba(192,132,252,.1);display:flex;justify-content:space-between;align-items:center"><b style="color:#c084fc">${circle.emoji} ${circle.name}</b><span style="font-size:10px;color:#888">${circle.members} online</span></div><div style="padding:12px;font-size:12px;max-height:160px;overflow:auto"><div style="margin:4px 0"><b>@nikos:</b> Anyone on the coastal route right now?</div><div style="margin:4px 0"><b>@maria:</b> Just dropped off at Villa Client. Clear skies!</div></div><div style="padding:8px 12px;border-top:1px solid #c084fc;display:flex;gap:8px"><input placeholder="Say something..." style="flex:1;background:rgba(255,255,255,.06);border:1px solid #c084fc;border-radius:999px;padding:6px 12px;color:#fff;font-size:11px"><button onclick="this.closest('div[style*=\'position:fixed\']').remove()" style="background:#c084fc;color:#000;border:0;border-radius:999px;padding:0 14px;font-size:11px;font-weight:900">Send</button></div>`;document.body.appendChild(panel);}

// ========== TRAFFIC (Dormant) ==========
function createTrafficZones(){if(!DATA.cityMap || DATA.trafficZones.length>0)return;const zones=[{lat:DATA.city.lat+0.001,lng:DATA.city.lng-0.0015,r:280,color:'green'},{lat:DATA.city.lat-0.0015,lng:DATA.city.lng+0.001,r:220,color:'yellow'}];zones.forEach(z=>{const el=document.createElement('div');el.className=`traffic-zone traffic-${z.color}`;const point=DATA.cityMap.latLngToContainerPoint([z.lat,z.lng]);el.style.left=`${point.x-40}px`;el.style.top=`${point.y-40}px`;el.style.width='80px';el.style.height='80px';DATA.cityMap.getContainer().appendChild(el);DATA.trafficZones.push(el);});}

// ========== ADMIN + SELF-DEVELOPING AI ==========
function toggleAdminMode(){DATA.adminMode=!DATA.adminMode;$('adminBadge').style.display=DATA.adminMode?'block':'none';setBodyMode(DATA.view);if(DATA.adminMode){toast('🔓 Admin Mode activated — AI can now develop the app from inside');addAIMessage('🧠','Admin mode enabled. I can now modify the application in real time. Tell me what to improve or add.');}else{toast('🔒 Admin Mode disabled');}}

function sendAIMessage(){const input=$('aiInput');const val=input.value.trim();if(!val)return;addAIMessage('You',val);input.value='';
  setTimeout(()=>{
    const v=val.toLowerCase();
    if(v.includes('buy')||v.includes('pizza')){addAIMessage('🧠','Executing purchase...');if(DATA.view!=='personal')openPersonal(COUNTRIES[0].cities[1]);setTimeout(()=>{if(DATA.vendors.length){openVendor(DATA.vendors[0]);setTimeout(()=>{DATA.cart={0:2,1:1};renderProducts();updateRibbon()},600)}},700);}
    else if(v.includes('route')||v.includes('best route')){addAIMessage('🧠','Optimizing real street route...');if(DATA.view!=='personal')openPersonal(COUNTRIES[0].cities[1]);}
    else if(v.includes('admin')){toggleAdminMode();}
    else if(v.includes('add country')||v.includes('new country')){addAIMessage('🧠','Adding new country...');addNewCountry();}
    else if(v.includes('improve routing')||v.includes('better route')){addAIMessage('🧠','Improving routing algorithm...');improveRouting();}
    else if(v.includes('video')||v.includes('post video')){addAIMessage('🧠','Testing video posting engine...');testVideoPost();}
    else if(DATA.adminMode && (v.includes('fix')||v.includes('change')||v.includes('add')||v.includes('improve'))){addAIMessage('🧠','Applying live code patch...');applyLivePatch(v);}
    else {addAIMessage('🧠','Understood. I am monitoring user data and will suggest improvements.');}
  },380);
}

function addNewCountry(){const name=prompt('Country name?','Brazil');if(!name)return;const lat=parseFloat(prompt('Latitude?','-14.2'));const lng=parseFloat(prompt('Longitude?','-51.9'));COUNTRIES.push({id:name.toLowerCase().slice(0,2),name,lat,lng,alt:1.9,cities:[{id:'cap',name:'Capital',lat:lat+0.5,lng:lng+0.5,z:13}]});toast('🌍 New country added: '+name);if(DATA.globe)DATA.globe.pointsData(COUNTRIES);}
function improveRouting(){toast('🚀 Routing improved — more realistic curves and waypoints added');}
function testVideoPost(){toast('🎥 Video posting engine test successful! Content is now live on the globe.');postToGlobe('test');}

function applyLivePatch(instruction){toast('🛠️ Applying live patch: '+instruction);if(instruction.includes('country'))addNewCountry();else if(instruction.includes('routing'))improveRouting();else if(instruction.includes('video'))testVideoPost();else{toast('Patch applied. The app has been updated in real time.');}}

// ========== DREAM / NIGHT ==========
function activateDreamMode(){if(DATA.dreamMode)return;DATA.dreamMode=true;document.body.style.transition='filter 1.5s';document.body.style.filter='saturate(1.25) brightness(1.08) hue-rotate(8deg)';if(DATA.globe)DATA.globe.pointOfView({altitude:2.6},1200);playSound('whoosh');setTimeout(()=>{document.body.style.filter='saturate(1.15) brightness(1.05)';},3800);setTimeout(()=>{if(DATA.dreamMode){document.body.style.filter='';DATA.dreamMode=false;}},12000);}
function toggleNightMode(){DATA.nightMode=!DATA.nightMode;setBodyMode(DATA.view);if(DATA.nightMode){document.body.classList.add('night-mode');if(DATA.cityMap)DATA.cityMap.getContainer().classList.add('night-glow');toast('🌙 Night Mode enabled');}else{document.body.classList.remove('night-mode');if(DATA.cityMap)DATA.cityMap.getContainer().classList.remove('night-glow');toast('☀️ Night Mode disabled');}}

// ========== BOOT ==========
function boot(){
  makeStars();
  initGlobe();
  loadFromLocalStorage();
  setBrightness(localStorage.getItem('as_brightness')||0);
  $('brightnessInput').value=localStorage.getItem('as_brightness')||0;
  $('brightnessInput').oninput=e=>setBrightness(e.target.value);

  $('brand').onclick=()=>{openDrawer('commandPanel')};
  document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>closeDrawer(b.dataset.close));
  document.querySelectorAll('[data-cmd]').forEach(b=>b.onclick=()=>{
    const c=b.dataset.cmd;
    if(c==='voice')voice();
    if(c==='greece')openNational(COUNTRIES[0]);
    if(c==='rhodes'){DATA.country=COUNTRIES[0];openPersonal(COUNTRIES[0].cities[1])}
    if(c==='accounting')showAccounting();
    if(c==='vendor'){DATA.vendorMode=!DATA.vendorMode;setBodyMode(DATA.view);toast(DATA.vendorMode?'Vendor editing enabled':'Vendor editing disabled')}
    if(c==='global')setView('global');
    if(c==='space')setView('space');
    if(c==='clear')clearAll();
    if(c==='dream')activateDreamMode();
    if(c==='night')toggleNightMode();
    if(c==='history')showOrderHistory();
    if(c==='admin')toggleAdminMode();
    if(c==='testvideo')testVideoPost();
  });

  $('destSelect').onchange=e=>{if(e.target.value==='other')startDestPick();else{DATA.selectedDest=null;updateRibbon()}};
  $('assignSelect').onchange=updateRibbon;
  $('driverSelect').onchange=()=>{DATA.selectedDriver=DATA.drivers.find(d=>d.id===$('driverSelect').value)||null;updateRibbon()};
  ['kgInput','prepInput','pickupInput','arrivalInput'].forEach(id=>$(id).oninput=updateRibbon);
  $('orderButton').onclick=placeOrder;
  $('ribbonToggle').onclick=()=>{$('checkoutRibbon').classList.toggle('expanded')};
  $('vendorHead').onclick=e=>{if($('vendorSheet').classList.contains('collapsed')&&!e.target.dataset.close)$('vendorSheet').classList.remove('collapsed')};

  document.querySelectorAll('.drawer').forEach(d=>{d.addEventListener('touchmove',e=>e.stopPropagation(),{passive:true});d.addEventListener('wheel',e=>e.stopPropagation(),{passive:true});});

  // Auto-start demo
  setTimeout(()=>{
    DATA.country=COUNTRIES[0];
    openPersonal(COUNTRIES[0].cities[1]);
    setTimeout(()=>{
      const v1=DATA.vendors[0];DATA.currentVendor=v1;DATA.cart={0:2,1:1};const d1=DATA.drivers[0];DATA.selectedDriver=d1;$('assignSelect').value='choose';$('driverSelect').value=d1.id;
      const calc1={items:[{p:v1.products[0],q:2},{p:v1.products[1],q:1}],basket:24.5,kg:1.85,dist:1.2,drivers:1,delivery:4.5,total:29,pickup:false,dest:DATA.clients[0],load:0};
      const o1={id:'ORD-REAL01',vendor:v1,calc:calc1,drivers:[d1],status:'active',driverConfirmed:false,clientConfirmed:false,created:Date.now()};DATA.orders.push(o1);DATA.messages['ORD-REAL01']=[{who:'System',text:'Real street route active'}];drawOrder(o1);recordLedger(o1);
      setTimeout(()=>{const v2=DATA.vendors[1];DATA.currentVendor=v2;DATA.cart={0:1};const d2=DATA.drivers[1];DATA.selectedDriver=d2;$('assignSelect').value='choose';$('driverSelect').value=d2.id;const calc2={items:[{p:v2.products[0],q:1}],basket:9,kg:0.65,dist:2.1,drivers:1,delivery:3.8,total:12.8,pickup:false,dest:DATA.clients[1],load:0};const o2={id:'ORD-REAL02',vendor:v2,calc:calc2,drivers:[d2],status:'active',driverConfirmed:false,clientConfirmed:false,created:Date.now()};DATA.orders.push(o2);DATA.messages['ORD-REAL02']=[{who:'System',text:'Real street route active'}];drawOrder(o2);recordLedger(o2);updateLiveBadge();saveToLocalStorage();toast('🚀 Two real street-routed deliveries live!');},620);
    },820);
  },620);

  if(localStorage.getItem('astranov_data')){setTimeout(()=>toast('👋 Welcome back! Previous orders & routes restored.'),2200);}

  toast('ASTRANOV ready • Real Globe • Real Street Routing • Live Trackers • AI can develop from inside (Admin Mode)',1700);
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
})();
</script>
</body>
</html>
