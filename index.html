    // AI-like procedural generation: layered noise blobs for realistic clouds

    return {
      x: -(r * Math.sin(phi) * Math.cos(theta)),

  update() {

    if (this.atmosphere) {

      const eff = this.activeEffects[i];
      const posAttr = eff.points.geometry.attributes.position;
      const arr = posAttr.array;

      eff.life--;
      const alpha = eff.life / eff.maxLife;

      for (let j = 0; j < arr.length; j += 3) {
        const vidx = j / 3;
        arr[j] += eff.velocities[vidx * 3] * alpha;

        scene.remove(eff.points);
        eff.points.geometry.dispose();
        eff.points.material.dispose();
        this.activeEffects.splice(i, 1);
      }
    }
  }
};

        if (t < 0.5) p = this._greatCircle(start, via, t * 2);
        else p = this._greatCircle(via, end, (t - 0.5) * 2);
      } else if (provider === 'coastalDetour') {
        const bias = Math.sin(t * Math.PI) * 3.5;
        p = latLngToPos(
          startLat + (endLat - startLat) * t + bias,
          startLng + (endLng - startLng) * t
        );
      } else { // wideSafeArc
        const arc = 4.5 * Math.sin(t * Math.PI * 1.2);
        p = latLngToPos(
          startLat + (endLat - startLat) * t + arc,
          startLng + (endLng - startLng) * t - arc * 0.6
        );
      }

      points.push(p);

      // Safety check vs users/drivers positions
      userPositions.forEach(up => {
        if (p.distanceTo(up) < 0.12) riskLevel += 0.6;
      });
    }

    if (riskLevel > maxRisk) {
      console.log('%c[RoutingEngine] ⚠️ Κίνδυνος για users/drivers! Fallback cycling...', 'color:#ff4444');
      this.cycleProvider();
      return this.computeRoute(startLat, startLng, endLat, endLng, userPositions, maxRisk);
    }

    return {
      points: points,
      provider: provider,
      etaSim: Math.round(steps * 2.5) + 'ms',
      safetyScore: (10 - riskLevel).toFixed(1)
    };
  },

  _greatCircle(a, b, t) {
    const dot = a.dot(b);
    const omega = Math.acos(Math.min(Math.max(dot, -1), 1));
    if (omega < 0.0001) return a.clone();
    const sinO = Math.sin(omega);
    const aa = Math.sin((1 - t) * omega) / sinO;
    const bb = Math.sin(t * omega) / sinO;
    return a.clone().multiplyScalar(aa).add(b.clone().multiplyScalar(bb));
  }
};

      console.log('%c[Drone Arrival - Πιλότος ΤΗΛΕΜΑΧΟΣ] Pitogyra, μπίρες & τσιγάρα παραδόθηκαν! Καλή απόλαυση αξά <3 (safe routing used)', 'color:#44ff88');
    }

}

function showPilotTelemachos() {
  // Εμφάνισε τον Πιλότο ΤΗΛΕΜΑΧΟΣ (drone pilot) - πιο έντονα, σαν μικρό πλοιάριο
  if (window._pilot && window._pilot.parent) window._pilot.parent.remove(window._pilot);
  
  const pos = latLngToPos(36.2, 28.1, 1.04);
  
  // Pilot group for better visual - bigger ship-like
  const pilotGroup = new THREE.Group();
  
  // Body (bigger orb)
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.028, 10, 10),
    new THREE.MeshBasicMaterial({ color: 0x00ccff, transparent: true, opacity: 0.95 })
  );
  pilotGroup.add(body);
  
  // Cockpit / nose (larger)
  const cockpit = new THREE.Mesh(
    new THREE.ConeGeometry(0.014, 0.032, 4),
    new THREE.MeshBasicMaterial({ color: 0x00ff99 })
  );
  cockpit.rotation.x = Math.PI / 2;
  cockpit.position.z = 0.02;
  pilotGroup.add(cockpit);
  
  // Add small "wing" or stabilizer for ship look
  const wing = new THREE.Mesh(
    new THREE.BoxGeometry(0.05, 0.005, 0.01),
    new THREE.MeshBasicMaterial({ color: 0x0088ff })
  );
  wing.position.z = 0.005;
  pilotGroup.add(wing);

  // Extra AI core glow ring (advanced gaming detail, no model)
  const core = new THREE.Mesh(
    new THREE.SphereGeometry(0.008, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 })
  );
  pilotGroup.add(core);

  // Thrusters - gaming ship style (back engines)
  const thruster1 = new THREE.Mesh(
    new THREE.ConeGeometry(0.006, 0.018, 4),
    new THREE.MeshBasicMaterial({ color: 0xff4400, transparent: true, opacity: 0.7 })
  );
  thruster1.rotation.x = Math.PI / 2;
  thruster1.position.set(0.015, 0, -0.02);
  pilotGroup.add(thruster1);

  const thruster2 = thruster1.clone();
  thruster2.position.set(-0.015, 0, -0.02);
  pilotGroup.add(thruster2);

  // Store thrusters for animation
  pilotGroup.userData.thrusters = [thruster1, thruster2];
  
  pilotGroup.position.set(pos.x, pos.y, pos.z);
  pilotGroup.userData = { type: 'pilot', name: 'ΤΗΛΕΜΑΧΟΣ' };
  scene.add(pilotGroup);
  window._pilot = pilotGroup;

  // Advanced AI Graphics: spawn particle aura around pilot (gaming effect)
  AIGraphics.spawnEffect(pilotGroup.position, 0x00ff99, 18, 55);
  
  console.log('%c[Πιλότος ΤΗΛΕΜΑΧΟΣ] Αναλαμβάνω την παράδοση με drone! Pitogyra + μπίρες + τσιγάρα on the way. Aksako <3', 'color:#00ddff');
}

function animate() {
  requestAnimationFrame(animate);
  if (!drag) {
    earth.rotation.y += idleRoll;
  }
  // pilot pulse to make it alive
  if (window._pilot) {
    const t = Date.now() / 600;
    const s = 1 + Math.sin(t) * 0.12;
    window._pilot.scale.set(s, s, s);

    // Advanced thruster animation (gaming engine glow)
    if (window._pilot.userData.thrusters) {
      const thrustScale = 0.7 + Math.sin(t * 2) * 0.4;
      window._pilot.userData.thrusters.forEach(t => {
        t.scale.set(1, thrustScale, 1);
        t.material.opacity = 0.5 + Math.sin(t * 3) * 0.3;
      });
    }

    // Occasional thruster particle bursts (when pilot active)
    if (Date.now() % 380 < 30 && window._pilot) {
      AIGraphics.spawnEffect(window._pilot.position, 0xff5500, 5, 18);
    }
  }

  // ASTRANOV AI Graphics Engine tick
  AIGraphics.update();
  updateOrbital();

  if (window.AstranovCollectiveIntelligence) {
    ACI.tick();
    ACI.neurons.forEach(n => {
      if (!n.userData) return;
      const t = Date.now() / 700;
      const s = 1 + Math.sin(t + (n.userData.id ? n.userData.id.length : 0)) * 0.07 * Math.min(1.8, n.userData.strength || 1);
      n.scale.set(s, s, s);
    });
  }

  renderer.render(scene, camera);
}
animate();
