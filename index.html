<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" onerror="var s=document.createElement('script');s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';document.head.appendChild(s)"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none}
#globe-el{width:100%;height:100%;position:absolute;top:0;left:0;background:radial-gradient(ellipse at 50% 60%,#0a1a3a 0%,#000510 100%)}
#map-el{width:100%;height:100%;position:absolute;top:0;left:0;display:none}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.12);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:9999;white-space:nowrap}
#back-btn{position:fixed;top:16px;left:80px;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.55);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:20px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:200}
/* Splash screen */
#splash{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:18px;transition:opacity .35s ease}
#splash.fade{opacity:0;pointer-events:none}
#splash.done{display:none}
#splash-name{font-size:24px;font-weight:200;letter-spacing:8px;color:rgba(255,255,255,.88);text-transform:uppercase}
#splash-bar{width:110px;height:1px;background:rgba(255,255,255,.1);border-radius:1px;overflow:hidden}
#splash-prog{height:100%;width:5%;background:#0a84ff;border-radius:1px;transition:width .25s ease;animation:splashload 1.1s ease-out forwards}
@keyframes splashload{0%{width:5%}100%{width:100%}}
/* Drag handle shared */
.wdh{font-size:13px;color:rgba(255,255,255,.2);cursor:move;touch-action:none;user-select:none;-webkit-user-select:none;line-height:1;align-self:stretch;display:flex;align-items:center;justify-content:center;padding:0 2px;border-radius:4px}
.wdh:hover{color:rgba(255,255,255,.5)}
/* Wallet widget — top left */
#wallet-widget{position:fixed;top:16px;left:16px;z-index:200;display:flex;flex-direction:row;align-items:center;gap:6px;background:rgba(0,0,0,.55);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:7px 10px 7px 6px;transition:background .2s;min-width:54px}
#wallet-widget:active{background:rgba(255,255,255,.08)}
#wallet-icon{font-size:18px;line-height:1;cursor:pointer}
#wallet-bal{font-size:9px;color:rgba(255,255,255,.5);white-space:nowrap;letter-spacing:.2px;cursor:pointer}
/* Radar widget — top right */
#radar-widget{position:fixed;top:16px;right:16px;z-index:200;display:flex;flex-direction:row;align-items:center;gap:6px;background:rgba(0,0,0,.55);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:7px 10px 7px 6px;transition:all .2s;min-width:54px}
#radar-widget:active{background:rgba(255,255,255,.08)}
#radar-widget.radar-active{border-color:rgba(255,59,48,.55);box-shadow:0 0 10px rgba(255,59,48,.2)}
#radar-icon{font-size:18px;line-height:1;cursor:pointer}
#radar-count{font-size:9px;color:rgba(255,255,255,.5);white-space:nowrap;letter-spacing:.2px;cursor:pointer}
/* Unified multi-window panel */
#multi{position:fixed;bottom:0;left:0;right:0;height:55vh;background:rgba(10,10,18,.96);backdrop-filter:blur(30px);border-top:1px solid rgba(255,255,255,.08);z-index:300;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1);display:flex;flex-direction:column;overflow:hidden}
#multi.open{transform:translateY(0)}
#multi-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:10px auto 4px;flex-shrink:0;cursor:ns-resize;touch-action:none}
#multi-order-ribbon{flex-shrink:0;background:rgba(255,200,0,.07);border-bottom:1px solid rgba(255,200,0,.15);padding:7px 14px;font-size:11px;color:rgba(255,200,0,.9);display:none;white-space:nowrap;overflow-x:auto}
#multi-order-ribbon.visible{display:block}
#multi-zoom-bar{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:4px 12px 5px;border-bottom:1px solid rgba(255,255,255,.06)}
.multi-zoom-btn{background:rgba(255,255,255,.07);border:none;color:rgba(255,255,255,.55);width:26px;height:26px;border-radius:7px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;padding:0;transition:background .15s}
.multi-zoom-btn:active{background:rgba(255,255,255,.15)}
#multi-zoom-txt{font-size:11px;color:rgba(255,255,255,.35)}
#multi-content{flex:1;overflow-y:auto;transform-origin:top left}
#lvl-label{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.85);padding:6px 16px;border-radius:20px;font-size:13px;pointer-events:none;z-index:200;display:none;white-space:nowrap}
.panel{position:fixed;bottom:0;left:0;right:0;max-height:100vh;overflow-y:auto;background:rgba(10,10,18,.96);backdrop-filter:blur(30px);border-top:1px solid rgba(255,255,255,.08);z-index:300;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1)}
.panel.open{transform:translateY(0)}
.ph{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:12px auto 0}
.ptitle{font-size:17px;font-weight:600;padding:14px 20px 8px;letter-spacing:-.3px}
.psect{padding:0 20px 16px}
.row{display:flex;align-items:center;padding:13px 20px;border-bottom:1px solid rgba(255,255,255,.05);gap:12px;cursor:pointer}
.row:active{background:rgba(255,255,255,.04)}
.ri{font-size:22px;min-width:30px;text-align:center}
.rm{flex:1;min-width:0}
.rt{font-size:15px;font-weight:500}
.rs{font-size:12px;color:rgba(255,255,255,.45);margin-top:2px}
.rr{font-size:13px;color:rgba(255,255,255,.45);white-space:nowrap}
.chev{color:rgba(255,255,255,.25);font-size:15px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 18px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.bp{background:#0a84ff;color:#fff}.bp:active{background:#0070d8}
.bs{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.12)}.bs:active{background:rgba(255,255,255,.15)}
.bd{background:#ff3b30;color:#fff}.bd:active{background:#d42f25}
.bsm{padding:7px 14px;font-size:13px;border-radius:9px}
.bblk{width:100%}
.brow{display:flex;gap:10px;padding:12px 20px 20px}
.inp{width:100%;padding:12px 14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:15px;outline:none;font-family:inherit}
.inp:focus{border-color:rgba(10,132,255,.5);background:rgba(10,132,255,.06)}
.inp::placeholder{color:rgba(255,255,255,.3)}
textarea.inp{resize:none;line-height:1.5}
select.inp option{background:#1a1a2e;color:#fff}
.ilabel{font-size:11px;color:rgba(255,255,255,.45);padding:8px 20px 4px;text-transform:uppercase;letter-spacing:.6px}
.igrp{padding:0 20px 12px}
.map-pin{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid rgba(255,255,255,.25);cursor:pointer;transition:transform .15s}
.map-pin:active{transform:scale(1.2)}
.pin-shop{background:rgba(10,132,255,.65)}
.pin-city{background:rgba(255,200,0,.12);border-color:rgba(255,200,0,.35)}
.item-row{display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.04)}
.ie{font-size:20px;width:30px;text-align:center}
.ii{flex:1;margin-left:10px}
.iname{font-size:14px;font-weight:500}
.iprice{font-size:12px;color:rgba(255,255,255,.45);margin-top:2px}
.qc{display:flex;align-items:center;gap:8px}
.qb{width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.qb:active{background:rgba(255,255,255,.2)}
.qn{width:20px;text-align:center;font-size:14px;font-weight:600}
.bbar{position:sticky;bottom:0;background:rgba(8,8,16,.97);padding:12px 20px 16px;border-top:1px solid rgba(255,255,255,.07)}
.bline{display:flex;justify-content:space-between;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:4px}
.btotal{display:flex;justify-content:space-between;font-size:15px;font-weight:600;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.08)}
.cmsg{padding:8px 12px;border-radius:14px;max-width:82%;margin:3px 16px;font-size:14px;line-height:1.4}
.cai{background:rgba(255,255,255,.09);align-self:flex-start;border-bottom-left-radius:4px}
.cme{background:#0a84ff;align-self:flex-end;border-bottom-right-radius:4px}
.csys{background:rgba(255,200,0,.1);color:rgba(255,200,0,.9);font-size:12px;text-align:center;border-radius:8px;padding:5px 12px;margin:3px 16px}
.cwrap{display:flex;flex-direction:column;padding:8px 0;min-height:180px;max-height:320px;overflow-y:auto;gap:2px}
.kg{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px 16px}
.kb{padding:15px;border-radius:13px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;cursor:pointer;text-align:left;font-size:13px;line-height:1.3;font-family:inherit}
.ki{font-size:22px;display:block;margin-bottom:5px}
.kb:active{background:rgba(255,255,255,.09)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.bg{background:rgba(52,199,89,.2);color:#34c759}
.br{background:rgba(255,59,48,.2);color:#ff3b30}
.bb{background:rgba(10,132,255,.2);color:#0a84ff}
.by{background:rgba(255,200,0,.15);color:#ffc800}
.sep{height:1px;background:rgba(255,255,255,.05);margin:4px 0}
.muted{color:rgba(255,255,255,.38);font-size:13px}
.center{text-align:center}
pre.mono{font-family:monospace;font-size:12px;color:rgba(255,255,255,.65);white-space:pre-wrap;word-break:break-all;background:rgba(255,255,255,.04);padding:12px;border-radius:8px;margin:0}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px 16px}
.stat-box{background:rgba(255,255,255,.05);border-radius:12px;padding:14px}
.stat-label{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.stat-val{font-size:16px;font-weight:600}
.leaflet-container{background:#08080f}
.leaflet-tile-pane{filter:brightness(.75) saturate(1.1)}
.cleanTip{background:rgba(0,0,0,.75)!important;border:1px solid rgba(255,255,255,.12)!important;color:#fff!important;border-radius:8px!important;padding:4px 9px!important;font-size:12px!important;box-shadow:none!important}
.leaflet-popup-content-wrapper{background:rgba(10,10,20,.97)!important;border:1px solid rgba(255,255,255,.1)!important;color:#fff!important;border-radius:14px!important;box-shadow:0 8px 30px rgba(0,0,0,.6)!important}
.leaflet-popup-tip{background:rgba(10,10,20,.97)!important}
/* ── COLLECTIVE INTELLIGENCE CYCLE ──────────────── */
#cic-float{position:fixed;bottom:28px;right:16px;z-index:200;display:flex;flex-direction:column;align-items:flex-end}
#cic-drag{position:absolute;top:-12px;right:0;font-size:11px;color:rgba(255,255,255,.18);cursor:move;touch-action:none;user-select:none;-webkit-user-select:none;padding:2px 4px}
#cic-drag:hover{color:rgba(255,255,255,.5)}
#cic-orders-dot{position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:#ff3b30;color:#fff;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center;z-index:3;border:2px solid #000}
#cic-model-label{position:absolute;bottom:calc(100% + 4px);right:0;background:rgba(0,0,0,.82);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.13);color:rgba(255,255,255,.92);padding:4px 10px;border-radius:9px;font-size:10px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .35s,transform .35s;transform:translateY(4px);z-index:500}
#cic-model-label.cic-show{opacity:1;transform:translateY(0)}
.cic-ring{position:relative;width:60px;height:60px;flex-shrink:0;cursor:pointer}
.cic-svg{position:absolute;top:0;left:0;pointer-events:none}
.cic-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.1);color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:all .2s;padding:0}
.cic-center.hf-on{background:rgba(255,200,0,.3)!important;border-color:rgba(255,200,0,.7)!important;box-shadow:0 0 10px rgba(255,200,0,.4)}
@keyframes cic-ring-pulse{0%,100%{stroke:rgba(255,200,0,.12)}50%{stroke:rgba(255,200,0,.4)}}
#cic-ring-base{animation:cic-ring-pulse 2.6s ease-in-out infinite}
/* CIC provider chips — always visible below ring */
#cic-node-chips{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap;justify-content:flex-end;max-width:170px}
.cic-chip{font-size:9px;padding:3px 7px;border-radius:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit}
.cic-chip:active{transform:scale(.92)}
.cic-chip.cic-chip-active{color:var(--cc,#fff);border-color:var(--cc,#fff);background:rgba(255,255,255,.1);font-weight:600}
.cic-chip.cic-chip-locked{outline:1px solid #ffc800;outline-offset:1px}
.cic-lbl-wrap{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:.4px;margin-top:3px;line-height:1;white-space:nowrap;text-align:right}
.cic-lbl-wrap span{color:rgba(255,255,255,.5)}
@keyframes cic-think{0%,100%{opacity:.3}50%{opacity:1}}
.cic-thinking .cic-chip{animation:cic-think .75s ease-in-out infinite}
@keyframes cic-spin{from{stroke-dashoffset:145}to{stroke-dashoffset:0}}
</style>
</head>

<div id="globe-el"></div>
<div id="map-el"></div>
<div id="toast"></div>
<div id="back-btn" onclick="goBack()">&#8592;</div>
<div id="lvl-label"></div>
<div id="splash"><div id="splash-name">ASTRANOV</div><div id="splash-bar"><div id="splash-prog"></div></div></div>
<!-- Top-left wallet widget -->
<div id="wallet-widget">
  <div class="wdh" title="Drag to move">&#8942;</div>
  <div id="wallet-icon" onclick="openAccounting()">&#128176;</div>
  <div id="wallet-bal" onclick="openAccounting()">Wallet</div>
</div>
<!-- Top-right radar widget -->
<div id="radar-widget">
  <div class="wdh" title="Drag to move">&#8942;</div>
  <div id="radar-icon" onclick="openRadar()">&#128225;</div>
  <span id="radar-count" onclick="openRadar()">Radar</span>
</div>
<!-- CIC ring — always floating bottom-right, the OS heartbeat -->
<div id="cic-float">
  <div id="cic-drag" title="Drag to move">&#8942;</div>
  <div id="cic-model-label"></div>
  <div class="cic-ring" id="cic-ring" onclick="openAIChat()">
    <svg class="cic-svg" width="60" height="60" viewBox="0 0 60 60">
      <circle id="cic-ring-base" cx="30" cy="30" r="21" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="1.5"/>
      <circle id="cic-arc" cx="30" cy="30" r="21" fill="none" stroke="rgba(255,200,0,.6)" stroke-width="2"
        stroke-dasharray="0 132" stroke-linecap="round" transform="rotate(-90 30 30)" opacity="0"
        style="transition:stroke-dasharray .4s"/>
    </svg>
    <button class="cic-center" id="cic-mic" onclick="event.stopPropagation();toggleHF()">&#127908;</button>
    <div id="cic-orders-dot"></div>
  </div>
  <div id="cic-node-chips"></div>
  <div class="cic-lbl-wrap">C.I. <span id="cic-mode-txt">Auto</span></div>
</div>
<!-- Unified multi-window panel — the only bottom panel in the OS -->
<div id="multi">
  <div id="multi-handle"></div>
  <div id="multi-order-ribbon"></div>
  <div id="multi-zoom-bar">
    <button class="multi-zoom-btn" onclick="multiZoom(-1)">&#8722;</button>
    <span id="multi-zoom-txt">100%</span>
    <button class="multi-zoom-btn" onclick="multiZoom(1)">&#43;</button>
    <button class="multi-zoom-btn" style="margin-left:auto" onclick="closeMulti()">&#10005;</button>
  </div>
  <div id="multi-content"></div>
</div>
<div id="ui"></div>

// ── UTILS ──────────────────────────────────────────
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function money(n) { return (+(n||0)).toFixed(2) + ' AVC' }
function uid() { return Math.random().toString(36).slice(2,10) }
function nowMs() { return Date.now() }

function km(a, b) {
  var R = 6371
  var dLat = (b.lat - a.lat) * Math.PI / 180
  var dLng = (b.lng - a.lng) * Math.PI / 180
  var x = Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(a.lat * Math.PI/180) * Math.cos(b.lat * Math.PI/180) *
    Math.sin(dLng/2) * Math.sin(dLng/2)
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x))
}

var _toastTimer
function toast(msg, ms) {
  var el = document.getElementById('toast')
  el.textContent = msg
  el.style.opacity = '1'
  clearTimeout(_toastTimer)

}

var _panelJustOpened = false

function openPanel(id, html) {
  _panelJustOpened = true
  setTimeout(function() { _panelJustOpened = false }, 0)

  if (content) {

  if (!_multiH) _multiH = Math.round(window.innerHeight * 0.55)
  multi.style.height = _multiH + 'px'

  updateMultiOrderRibbon()
  return multi
}

  if (_panelJustOpened) return
  closeMulti()
}

  closeMulti()
}

function closeMulti() {
  var multi = document.getElementById('multi')
  if (multi) multi.classList.remove('open')

function multiZoom(dir) {
  _multiZoom = Math.max(0.5, Math.min(2.0, _multiZoom + dir * 0.15))
  var content = document.getElementById('multi-content')
  if (content) content.style.zoom = _multiZoom
  var txt = document.getElementById('multi-zoom-txt')

function updateMultiOrderRibbon() {
  var ribbon = document.getElementById('multi-order-ribbon')
  if (!ribbon) return
  var active = Object.values(S.orders).filter(function(o) { return o.status === 'active' })
  if (!active.length) { ribbon.classList.remove('visible'); return }
  ribbon.innerHTML = active.map(function(o) {
    return '<span style="cursor:pointer;margin-right:14px" onclick="openOrder(' + JSON.stringify(o.id) + ')">' +
      '&#128225; ' + esc(o.vendor ? o.vendor.name : 'Order') +
      (o.driver ? ' · ' + esc(o.driver.name) : '') + ' — ' + esc(o.status) + '</span>'
  }).join('')
  ribbon.classList.add('visible')
}

function initMultiResize() {
  var handle = document.getElementById('multi-handle')
  if (!handle) return
  var startY = 0, startH = 0
  function onStart(y) {
    startY = y
    startH = parseInt(document.getElementById('multi').style.height) || Math.round(window.innerHeight * 0.55)
  }
  function onMove(y) {
    var newH = Math.max(100, Math.min(window.innerHeight - 60, startH + (startY - y)))
    _multiH = newH
    document.getElementById('multi').style.height = newH + 'px'
  }
  function onEnd(y) {
    if (startY - y < -80) closeMulti()
  }
  handle.addEventListener('touchstart', function(e) { onStart(e.touches[0].clientY) }, {passive:true})
  handle.addEventListener('touchmove', function(e) { onMove(e.touches[0].clientY) }, {passive:true})
  handle.addEventListener('touchend', function(e) { onEnd(e.changedTouches[0].clientY) }, {passive:true})
  handle.addEventListener('mousedown', function(e) {
    onStart(e.clientY)
    function mm(ev) { onMove(ev.clientY) }
    function mu(ev) { onEnd(ev.clientY); document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu) }
    document.addEventListener('mousemove', mm)
    document.addEventListener('mouseup', mu)
    e.preventDefault()
  })
}

// ── GLOBE ──────────────────────────────────────────
function initGlobe() {
  if (typeof Globe === 'undefined') {
    _globeCdnWait++
    if (_globeCdnWait === 1) window._dbg && _dbg('globe', { step: 'waiting_for_cdn', attempt: _globeCdnWait })
    if (_globeCdnWait > 60) {
      window._dbg && _dbg('globe', { step: 'cdn_timeout', attempts: _globeCdnWait })
      showGlobeFallback(); return
    }
    setTimeout(initGlobe, 250)
    return
  }
  window._dbg && _dbg('globe', { step: 'cdn_loaded', Globe_type: typeof Globe })
  var el = document.getElementById('globe-el')

  function nearestCountry(lat, lng) {
    var best = null, bestD = Infinity
    COUNTRIES.forEach(function(c) {
      var d = km({lat:lat,lng:lng}, {lat:c.lat,lng:c.lng})
      if (d < bestD) { bestD = d; best = c }
    })
    return bestD < 2500 ? best : null
  }

  var g
  try {
    window._dbg && _dbg('globe', { step: 'constructor_start' })
    g = Globe()(el)
      .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-night.jpg')
      .bumpImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png')
      .backgroundImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/night-sky.png')
      .width(window.innerWidth)
      .height(window.innerHeight)
      .onGlobeReady(function() {
        window._dbg && _dbg('globe', { step: 'onGlobeReady_fired' })
        setTimeout(splashDone, 300)
      })
      .onGlobeClick(function(ev) {
        var c = nearestCountry(ev.lat, ev.lng)
        if (c) openNational(c)
      })
    window._dbg && _dbg('globe', { step: 'constructor_done', has_onGlobeReady: typeof g.onGlobeReady })
  } catch(e) {
    console.error('Globe init error:', e)
    window._dbg && _dbg('globe', { step: 'constructor_threw', error: e.message, stack: (e.stack||'').slice(0,300) })
    _globeInitTries++
    if (_globeInitTries < 4) { setTimeout(initGlobe, 1200); return }
    showGlobeFallback()
    return
  }

  var arcs = []
  for (var i = 0; i < COUNTRIES.length; i++) {
    var a = COUNTRIES[i]
    var b = COUNTRIES[(i + 4) % COUNTRIES.length]
    arcs.push({sLat:a.lat, sLng:a.lng, eLat:b.lat, eLng:b.lng,
      col:['rgba(10,132,255,.5)', 'rgba(52,199,89,.5)']})
  }

  g.arcsData(arcs)
    .arcStartLat('sLat').arcStartLng('sLng')
    .arcEndLat('eLat').arcEndLng('eLng')
    .arcColor('col')
    .arcAltitude(.2)
    .arcStroke(.5)
    .arcDashLength(.4)
    .arcDashGap(.4)
    .arcDashAnimateTime(3500)

  g.labelsData(COUNTRIES)
    .labelLat('lat').labelLng('lng')
    .labelText('name')
    .labelSize(1.1)
    .labelColor(function() { return 'rgba(255,255,255,.8)' })
    .labelDotRadius(.35)
    .onLabelClick(function(c) { openNational(c) })

  g.atmosphereColor('#1a6aff').atmosphereAltitude(.14)
  g.controls().autoRotate = true
  g.controls().autoRotateSpeed = .35

  S.globe = g
  window.addEventListener('resize', function() {
    g.width(window.innerWidth).height(window.innerHeight)
  })
}

function openCity(city) {
  S.city = city
  setLevel('city')
  S.vendors = []
  var el = document.getElementById('map-el')
  el.innerHTML = ''
  var map = L.map(el, {zoomControl:false, attributionControl:false}).setView([city.lat, city.lng], 13)
  L.tileLayer(TILE, {attribution:TILE_ATTR, maxZoom:18}).addTo(map)
  S.cityMap = map

  // Demo vendors seeded near city centre
  DEMO_VENDORS.forEach(function(dv, i) {
    var v = {
      id: dv.id, name: dv.name, emoji: dv.emoji, items: dv.items,
      lat: city.lat + (i * .005 - .007),
      lng: city.lng + (i * .007 - .01),
      reserveBalance: 100, owner_id: null
    }
    addVendorMarker(v)
  })

  // Load real vendors from Supabase
  var dlat = .3, dlng = .4
  sbFetch('/rest/v1/vendors?lat=gte.' + (city.lat - dlat) + '&lat=lte.' + (city.lat + dlat) +
    '&lng=gte.' + (city.lng - dlng) + '&lng=lte.' + (city.lng + dlng) + '&select=*&limit=50')
    .then(function(r) { return r.json() })
    .then(function(rows) {
      if (!Array.isArray(rows)) return
      rows.forEach(function(row) {
        addVendorMarker({
          id: row.id, name: row.name || '(vendor)', emoji: row.emoji || '🎪',
          lat: +row.lat, lng: +row.lng,
          items: Array.isArray(row.items) ? row.items : [],
          reserveBalance: +(row.reserve_balance || 0), owner_id: row.owner_id
        })
      })
    }).catch(function() {})

  map.on('click', function(e) {
    if (e.originalEvent && e.originalEvent._av) return
    showPlaceInfo(e.latlng.lat, e.latlng.lng)
  })

  trackEvent('navigate', {level:'city', city:city.name, country: S.country ? S.country.name : null})
}

function addVendorMarker(v) {
  if (S.vendors.some(function(x) { return x.id === v.id })) return
  S.vendors.push(v)
  if (!S.cityMap) return
  var pin = mkIcon('<div class="map-pin pin-shop">' + (v.emoji || '🎪') + '</div>')
  var m = L.marker([v.lat, v.lng], {icon:pin})
    .addTo(S.cityMap)
    .bindTooltip(v.name, {className:'cleanTip'})
    .on('click', (function(vendor) {
      return function(e) {
        if (e.originalEvent) e.originalEvent._av = true
        openVendorById(vendor.id)
      }
    })(v))
  S.markers.push(m)
}

// ── DELIVERY CALC ──────────────────────────────────
function calcDelivery(distKm, weightUnits, cond) {
  var base = distKm <= 3 ? 3 : 3 + (distKm - 3)
  var extra = Math.max(0, Math.ceil(weightUnits / 13) - 1)
  var condCount = Object.values(cond).filter(Boolean).length
  return +((base + extra * base) * (1 + condCount * 0.13)).toFixed(2)
}

function calcOrder(vendor, items) {
  var subtotal = items.reduce(function(s, it) { return s + it.price * (it.qty || 1) }, 0)
  var origin = S.city ? {lat:S.city.lat,lng:S.city.lng} : {lat:vendor.lat,lng:vendor.lng}
  var dist = Math.max(.5, km(origin, {lat:vendor.lat,lng:vendor.lng}))
  var weight = items.reduce(function(s, it) { return s + (it.qty || 1) }, 0)
  var h = new Date().getHours()
  if (h >= 22 || h < 6) S.conditions.night = true
  var driverCost = calcDelivery(dist, weight, S.conditions)
  var reserve30 = +(subtotal * 0.30).toFixed(2)
  var clientFee = +(subtotal * 0.03).toFixed(2)
  var vendorFee = +(subtotal * 0.03).toFixed(2)
  var clientTotal = +(subtotal + clientFee).toFixed(2)
  var vendorNet = +(subtotal - reserve30 - vendorFee).toFixed(2)
  return {subtotal:+subtotal.toFixed(2), dist:+dist.toFixed(2),
    driverCost:driverCost, reserve30:reserve30, clientFee:clientFee,
    vendorFee:vendorFee, clientTotal:clientTotal, vendorNet:vendorNet}
}

function openVendorById(id) {
  var v = S.vendors.find(function(x) { return x.id === id })
  if (v) openVendor(v)
}

function vendorItemsHtml(v) {
  if (!v.items || !v.items.length) return '<p class="muted center" style="padding:24px">No items listed</p>'
  var bk = S.basket[v.id] || {items:[]}
  return v.items.map(function(item) {
    var found = bk.items.find(function(i) { return i.id === item.id })
    var qty = found ? found.qty : 0
    return '<div class="item-row">' +
      '<span class="ie">' + esc(item.emoji || '') + '</span>' +
      '<div class="ii"><div class="iname">' + esc(item.name) + '</div>' +
      '<div class="iprice">' + money(item.price) + '</div></div>' +
      '<div class="qc">' +
      '<button class="qb" onclick="setQty(' + JSON.stringify(v.id) + ',' + JSON.stringify(item.id) + ',' + (qty - 1) + ')">&#8722;</button>' +
      '<span class="qn" id="qn-' + esc(v.id) + '-' + esc(item.id) + '">' + qty + '</span>' +
      '<button class="qb" onclick="setQty(' + JSON.stringify(v.id) + ',' + JSON.stringify(item.id) + ',' + (qty + 1) + ')">+</button>' +
      '</div></div>'
  }).join('')
}

function openVendor(v) {
  openPanel('vendor',
    '<div class="ptitle">' + esc(v.emoji || '') + ' ' + esc(v.name) + '</div>' +
    '<div id="vitems-' + esc(v.id) + '">' + vendorItemsHtml(v) + '</div>' +
    '<div class="bbar" id="bbar-' + esc(v.id) + '">' + renderBasketBar(v) + '</div>'
  )
}

function setQty(vId, itemId, qty) {
  qty = Math.max(0, qty)
  var vendor = S.vendors.find(function(v) { return v.id === vId })
  if (!vendor) return
  if (!S.basket[vId]) S.basket[vId] = {vendor:vendor, items:[]}
  var bk = S.basket[vId]
  var item = vendor.items.find(function(i) { return i.id === itemId })
  if (!item) return
  var idx = bk.items.findIndex(function(i) { return i.id === itemId })
  if (qty === 0) {
    if (idx >= 0) bk.items.splice(idx, 1)
  } else {
    if (idx >= 0) bk.items[idx].qty = qty
    else bk.items.push(Object.assign({}, item, {qty:qty}))
  }
  var vitemsEl = document.getElementById('vitems-' + vId)
  if (vitemsEl) vitemsEl.innerHTML = vendorItemsHtml(vendor)
  var barEl = document.getElementById('bbar-' + vId)
  if (barEl) barEl.innerHTML = renderBasketBar(vendor)
}

function renderBasketBar(vendor) {
  var bk = S.basket[vendor.id]
  var items = bk ? bk.items.filter(function(i) { return i.qty > 0 }) : []
  if (!items.length) return '<p class="muted center" style="padding:8px 0">Add items to order</p>'
  var c = calcOrder(vendor, items)
  return '<div class="bline"><span>Subtotal</span><span>' + money(c.subtotal) + '</span></div>' +
    '<div class="bline"><span>App fee (3%)</span><span>' + money(c.clientFee) + '</span></div>' +
    '<div class="btotal"><span>Total</span><span>' + money(c.clientTotal) + '</span></div>' +
    '<div class="brow" style="padding:10px 0 0">' +
    '<button class="btn bp bblk" onclick="confirmOrder(' + JSON.stringify(vendor.id) + ')">Order · ' + money(c.clientTotal) + '</button></div>'
}

// ── ORDER LIFECYCLE ────────────────────────────────
function confirmOrder(vId) {
  if (!S.session) { toast('Sign in to place orders'); openLogin(); return }
  var bk = S.basket[vId]
  if (!bk || !bk.items.length) { toast('Basket is empty'); return }
  var vendor = bk.vendor
  var items = bk.items.filter(function(i) { return i.qty > 0 })
  if (!items.length) { toast('Add items first'); return }
  var c = calcOrder(vendor, items)
  var oId = 'ORD-' + uid().toUpperCase()
  var driver = DEMO_DRIVERS[Math.floor(Math.random() * DEMO_DRIVERS.length)]
  var order = {
    id: oId, vendor: vendor, items: items, calc: c,
    status: 'pending', clientDone: false, driverDone: false, driver: driver,
    lat: S.city ? S.city.lat : vendor.lat,
    lng: S.city ? S.city.lng : vendor.lng,
    createdAt: nowMs()
  }
  S.orders[oId] = order
  S.msgs[oId] = [{who:'System', text:'Order placed. Finding driver…', ts:nowMs()}]
  vendor.reserveBalance = (vendor.reserveBalance || 0) + c.reserve30
  S.ledger.push({ts:nowMs(), type:'RESERVE', label:'Reserve allocated',
    amount:c.reserve30, id:oId, from:'Basket', to:'Reserve Pool'})
  if (S.profile) {
    S.profile.balance = Math.max(0, (S.profile.balance || 0) - c.clientTotal)
    S.ledger.push({ts:nowMs(), type:'PAYMENT', label:'Order payment',
      amount:-c.clientTotal, id:oId, from:'Wallet', to:vendor.name})
    sbFetch('/rest/v1/balance_ledger?user_id=eq.' + S.profile.id, {
      method:'PATCH', body:JSON.stringify({balance:S.profile.balance}),
      headers:{'Prefer':'return=minimal'}
    }).catch(function() {})
  }
  delete S.basket[vId]
  closeAll()
  setTimeout(function() {
    order.status = 'active'
    S.msgs[oId].push({who:'System', text:driver.name + ' is on the way ' + driver.emoji, ts:nowMs()})
    updateRadar()
    toast(driver.name + ' assigned!')
  }, 2000)
  openOrder(oId)
  trackEvent('place_order', {vendor:vendor.name, total:c.clientTotal})
}

function orderMsgsHtml(oId) {
  var msgs = S.msgs[oId] || []
  return msgs.map(function(m) {
    if (m.who === 'System') return '<div class="csys">' + esc(m.text) + '</div>'
    if (m.who === 'You') return '<div class="cmsg cme">' + esc(m.text) + '</div>'
    return '<div class="cmsg cai">' + esc(m.who) + ': ' + esc(m.text) + '</div>'
  }).join('')
}

function openOrder(oId) {
  var o = S.orders[oId]
  if (!o) return
  var statusCls = o.status === 'closed' ? 'bg' : o.status === 'active' ? 'bb' : 'by'
  var oidJ = JSON.stringify(oId)
  var btns = o.status === 'closed'
    ? '<span class="badge bg">Order closed</span>'
    : ('<button class="btn bs bsm" onclick="sendOrderMsg(' + oidJ + ')">&#128172; Message</button>' +
       (!o.clientDone
         ? '<button class="btn bp bsm" onclick="confirmDelivery(' + oidJ + ')">&#10003; Received</button>'
         : '<span class="badge bg">You confirmed</span>'))
  openPanel('order-' + oId,
    '<div class="ptitle">Order ' + esc(o.id) + '</div>' +
    '<div class="psect">' +
    '<div class="row" style="padding:8px 0">' +
    '<span class="ri">' + esc(o.vendor ? o.vendor.emoji || '' : '') + '</span>' +
    '<div class="rm"><div class="rt">' + esc(o.vendor ? o.vendor.name : '') + '</div>' +
    '<div class="rs">' + esc(o.items.map(function(i){return i.name}).join(', ')) + '</div></div>' +
    '<span class="badge ' + statusCls + '">' + o.status + '</span></div>' +
    '<div style="display:flex;gap:8px;margin-bottom:12px">' +
    '<div style="flex:1;background:rgba(255,255,255,.05);border-radius:12px;padding:12px;text-align:center">' +
    '<div class="muted" style="font-size:11px;margin-bottom:4px">Total</div>' +
    '<div style="font-size:16px;font-weight:600">' + money(o.calc ? o.calc.clientTotal : 0) + '</div></div>' +
    '<div style="flex:1;background:rgba(255,255,255,.05);border-radius:12px;padding:12px;text-align:center">' +
    '<div class="muted" style="font-size:11px;margin-bottom:4px">Driver</div>' +
    '<div style="font-size:14px;font-weight:500">' + esc(o.driver ? o.driver.name : '—') + '</div></div>' +
    '</div></div>' +
    '<div class="cwrap" id="ochat-' + esc(oId) + '">' + orderMsgsHtml(oId) + '</div>' +
    '<div class="brow">' + btns + '</div>'
  )
  var chatEl = document.getElementById('ochat-' + oId)
  if (chatEl) chatEl.scrollTop = chatEl.scrollHeight
}

function confirmDelivery(oId) {
  var o = S.orders[oId]
  if (!o || o.clientDone) return
  o.clientDone = true
  S.msgs[oId].push({who:'System', text:'You confirmed delivery.', ts:nowMs()})
  toast('Delivery confirmed')
  closePanel('order-' + oId)
  openOrder(oId)
  setTimeout(function() {
    o.driverDone = true
    S.msgs[oId].push({who:'System', text:'Driver confirmed delivery.', ts:nowMs()})
    closeOrder(o)
    closePanel('order-' + oId)
    openOrder(oId)
  }, 3000)
}

function closeOrder(o) {
  if (o.status === 'closed') return
  o.status = 'closed'
  var dc = +((o.calc && o.calc.driverCost) || 0)
  var debited = 0
  if (dc > 0 && o.vendor) {
    var cur = +(o.vendor.reserveBalance || 0)
    debited = Math.min(cur, dc)
    o.vendor.reserveBalance = +((cur - debited).toFixed(2))
    sbFetch('/rest/v1/vendors?id=eq.' + o.vendor.id, {
      method:'PATCH', body:JSON.stringify({reserve_balance:o.vendor.reserveBalance}),
      headers:{'Prefer':'return=minimal'}
    }).catch(function() {})
    S.ledger.push({ts:nowMs(), type:'PAYOUT', label:'Driver payout', amount:-debited,
      id:o.id, from:'Reserve Pool', to:o.driver ? o.driver.name : 'Driver'})
    if (debited < dc) {
      S.msgs[o.id].push({who:'System',
        text:'Reserve low by ' + money(dc - debited) + '. Vendor must top up.', ts:nowMs()})
    }
  }
  issueInvoice(o).then(function(inv) {
    S.msgs[o.id].push({who:'System',
      text:'Closed. Invoice ' + inv.mark + ' issued.' + (debited > 0 ? ' Driver paid: ' + money(debited) : ''),
      ts:nowMs()})
    toast('Order closed · Invoice issued')
  }).catch(function() {
    S.msgs[o.id].push({who:'System', text:'Order closed. Invoice pending.', ts:nowMs()})
    toast('Order closed')
  })
  updateRadar()
}

function sendOrderMsg(oId) {
  var o = S.orders[oId]
  if (!o) return
  var text = window.prompt('Message to driver:')
  if (!text || !text.trim()) return
  S.msgs[oId].push({who:'You', text:text.trim(), ts:nowMs()})
  closePanel('order-' + oId)
  openOrder(oId)
}

// ── INVOICE ────────────────────────────────────────
function issueInvoice(o) {
  var d = new Date()
  var month = d.toISOString().slice(0, 7)
  S.invoiceSeq++
  var mark = 'INV-' + d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2,'0') + '-' + String(S.invoiceSeq).padStart(6,'0')
  var inv = {
    id: mark, mark: mark, order_id: o.id, vendor_name: o.vendor.name,
    buyer_id: S.profile ? S.profile.id : null,
    items: o.items, subtotal: o.calc.subtotal,
    delivery_fee: o.calc.driverCost, platform_fee: o.calc.clientFee,
    total: o.calc.clientTotal, currency: 'AVC', period_month: month, status: 'issued'
  }
  return sbFetch('/rest/v1/invoices', {
    method:'POST', body:JSON.stringify(inv), headers:{'Prefer':'return=minimal'}
  }).then(function() { return inv }).catch(function() { return inv })
}

function doLogin() {
  var email = (document.getElementById('li-email') || {}).value || ''
  var password = (document.getElementById('li-pass') || {}).value || ''
  if (!email.trim() || !password) { toast('Fill in all fields'); return }
  sbAuth('token?grant_type=password', email.trim(), password)
    .then(function(data) {
      if (data.error) { toast((data.error && data.error.message) || 'Login failed'); return }
      applySession(data)
      closePanel('login')
      toast('Welcome back!')
    }).catch(function() { toast('Login error') })
}

function doRegister() {
  var name = ((document.getElementById('rg-name') || {}).value || '').trim()
  var email = ((document.getElementById('rg-email') || {}).value || '').trim()
  var password = (document.getElementById('rg-pass') || {}).value || ''
  if (!name || !email || !password) { toast('Fill in all fields'); return }
  if (password.length < 8) { toast('Password too short (min 8)'); return }
  sbAuth('signup', email, password, {display_name: name})
    .then(function(data) {
      if (data.error) { toast((data.error && data.error.message) || 'Registration failed'); return }
      if (data.session) applySession(data.session)
      closePanel('register')
      toast('Account created! Check email to confirm.')
    }).catch(function() { toast('Registration error') })
}

function updateWalletWidget() {
  var bal = document.getElementById('wallet-bal')
  if (!bal) return
  var b = (S.profile && S.profile.balance) ? S.profile.balance : 0
  bal.textContent = b > 0 ? money(b) : 'Wallet'
}

function applySession(session) {
  S.session = session
  try { localStorage.setItem('av_session', JSON.stringify(session)) } catch(e) {}
  sbFetch('/rest/v1/profiles?id=eq.' + session.user.id + '&select=*')
    .then(function(r) { return r.json() })
    .then(function(rows) {
      if (rows && rows[0]) {
        S.profile = rows[0]
        updateWalletWidget()
        if (S.profile.is_owner) activateKrypteia()
      }
    }).catch(function() {})
}

function doLogout() {
  S.session = null; S.profile = null; S.krypActive = false
  clearInterval(S.selfCheckTimer)
  try { localStorage.removeItem('av_session') } catch(e) {}
  toast('Signed out'); closeAll()
}

function doRecharge() {
  var el = document.getElementById('rch-amt')
  var amt = parseFloat((el && el.value) || '0')
  if (!amt || isNaN(amt) || amt <= 0) { toast('Enter a valid amount'); return }
  if (!S.profile) { toast('Not signed in'); return }
  S.profile.balance = (S.profile.balance || 0) + amt
  S.ledger.push({ts:nowMs(), type:'RECHARGE', label:'Wallet recharge', amount:amt, id:uid(), from:'Bank', to:'Wallet'})
  sbFn('astranov-api', {action:'recharge', userId:S.profile.id, amount:amt}).catch(function() {})
  toast('Added ' + money(amt) + ' to wallet')
  closePanel('recharge')
}

  var name = ((document.getElementById('nv-name') || {}).value || '').trim()

  if (!name) { toast('Enter vendor name'); return }

function loadAIMemory() {
  if (!S.session) return
  // Only load public memory — private entries are never shown in chat
  sbFetch('/rest/v1/ai_memory?user_id=eq.' + S.session.user.id + '&is_private=eq.false&order=created_at.desc&limit=20&select=role,content')
    .then(function(r) { return r.json() })
    .then(function(rows) {
      if (!Array.isArray(rows)) return
      S.aiHistory = rows.slice().reverse().map(function(r) { return {role:r.role, content:r.content} })
      var el = document.getElementById('ai-msgs')
      if (el && S.aiHistory.length) {
        el.innerHTML = S.aiHistory.map(function(m) {
          return '<div class="cmsg ' + (m.role==='user'?'cme':'cai') + '">' + esc(m.content) + '</div>'
        }).join('')
        el.scrollTop = el.scrollHeight
      }
    }).catch(function() {})

function sendAI(text) {
  var inp = document.getElementById('ai-inp')
  text = text || (inp ? inp.value.trim() : '')
  if (!text) return
  if (inp) inp.value = ''
  S.aiHistory.push({role:'user', content:text})
  var el = document.getElementById('ai-msgs')
  if (el) {
    var pEl = el.querySelector('p')
    if (pEl) el.innerHTML = ''
    el.innerHTML += '<div class="cmsg cme">' + esc(text) + '</div>'
    el.innerHTML += '<div class="cmsg cai" id="ai-typing">…</div>'
    el.scrollTop = el.scrollHeight
  }
  cicStartThinking()
  sbFn('ai-router', {
    text: text, level: S.level,
    country: S.country ? S.country.name : null,
    city: S.city ? S.city.name : null,
    owner: !!(S.profile && S.profile.is_owner),
    preferred_provider: S.cicManual || null
  }).then(function(resp) {
    var reply = (resp && resp.text) ? resp.text : 'I could not process that.'
    S.aiHistory.push({role:'assistant', content:reply})
    var typing = document.getElementById('ai-typing')
    if (typing) typing.outerHTML = '<div class="cmsg cai">' + esc(reply) + '</div>'
    if (el) el.scrollTop = el.scrollHeight
    if (resp && resp.action) execAction(resp.action)
    cicStopThinking(resp && resp.provider ? resp.provider : null, resp && resp.via ? resp.via : '')
  }).catch(function() {
    var reply = localAI(text)
    S.aiHistory.push({role:'assistant', content:reply})
    var typing = document.getElementById('ai-typing')
    if (typing) typing.outerHTML = '<div class="cmsg cai">' + esc(reply) + '</div>'
    if (el) el.scrollTop = el.scrollHeight
    cicStopThinking(null, '')
  })
}

function localAI(text) {
  var lo = text.toLowerCase()
  if (/hello|hi|hey/.test(lo)) return 'Hello! How can I help you with AstranoV?'
  if (/order/.test(lo)) return 'Navigate to a city and tap any vendor to place an order.'
  if (/balance|wallet|money|avc/.test(lo)) return 'Go to You → Recharge Wallet. 1 AVC = 1 EUR.'
  if (/vendor|shop|restaurant/.test(lo)) return 'Browse vendors on the city map. Tap any pin to open a vendor.'
  if (/driver|delivery/.test(lo)) return 'Drivers are assigned automatically. Track them via Radar.'
  if (/circle|chat/.test(lo)) return 'Open Radar → Global Chat, or You → Circles.'
  if (/globe|map|navigate|country|city/.test(lo)) return 'Tap a country on the globe, then tap a city to see vendors.'
  return 'I can help you navigate AstranoV, find vendors, and manage orders. What do you need?'
}

function execAction(action) {
  if (!action || !action.type) return
  if (action.type === 'navigate' && action.country) {
    var c = COUNTRIES.find(function(x) { return x.name.toLowerCase().indexOf(action.country.toLowerCase()) >= 0 })
    if (c) {
      if (action.city) {
        var city = c.cities.find(function(x) { return x.name.toLowerCase().indexOf(action.city.toLowerCase()) >= 0 })
        openNational(c)
        if (city) setTimeout(function() { openCity(city) }, 900)
      } else openNational(c)
    }
  }
  if (action.type === 'open_channel') openChannel(action.channel || 'global')
  if (action.type === 'accounting') openAccounting()
  if (action.type === 'back') goBack()
  if (action.type === 'krypteia' && S.krypActive) openKrypteia()
  if (action.type === 'krypteia_brief' && S.krypActive) krypBrief()
  if (action.type === 'krypteia_inspect' && S.krypActive) krypInspect()
  if (action.type === 'propose_change' && S.krypActive && action.prompt) {
    proposeChange(String(action.prompt))
  }
}

      }
      el.innerHTML = rows.map(function(p) {

        return '<div style="background:rgba(255,255,255,.04);border-radius:12px;padding:12px;margin-bottom:8px">' +
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">' +

          '<span class="muted" style="font-size:11px">' + new Date(p.created_at).toLocaleString() + '</span></div>' +
          '<div style="font-size:13px;line-height:1.4;margin-bottom:8px">' + esc(p.prompt) + '</div>' +
          (p.status === 'pending'
            ? '<div style="display:flex;gap:8px">' +
              '<button class="btn bp bsm" onclick="decideProposal(' + p.id + ',\'approved\')">Approve &amp; build</button>' +
              '<button class="btn bs bsm" onclick="decideProposal(' + p.id + ',\'rejected\')">Reject</button></div>'
            : '') +
          (p.commit_sha ? '<div class="muted" style="font-size:11px;margin-top:6px">commit ' + esc(p.commit_sha.slice(0,7)) + '</div>' : '') +
          '</div>'
      }).join('')
    }).catch(function() {
      var el = document.getElementById('prop-list')
      if (el) el.innerHTML = '<p class="muted center" style="padding:24px">Could not load</p>'
    })
}

function decideProposal(id, decision) {
  if (!S.krypActive) return
  if (decision === 'approved') {
    if (!confirm('Approve and let Astranov AI build this change? It will commit to the repo.')) return
    sbFetch('/rest/v1/ai_proposals?id=eq.' + id, {
      method:'PATCH', body:JSON.stringify({status:'approved', decided_at:new Date().toISOString()}),
      headers:{'Prefer':'return=minimal'}
    }).then(function() {
      sbFetch('/rest/v1/ai_proposals?id=eq.' + id + '&select=prompt').then(function(r){return r.json()}).then(function(rows) {
        if (!rows || !rows[0]) return
        toast('Building…')
        sbFn('astranov-api', {
          path: '/ai/krypteia/develop',
          prompt: rows[0].prompt,
          current_html: document.documentElement.outerHTML
        }).then(function(resp) {
          if (resp && resp.commit) {
            sbFetch('/rest/v1/ai_proposals?id=eq.' + id, {
              method:'PATCH', body:JSON.stringify({status:'applied', commit_sha:resp.commit}),
              headers:{'Prefer':'return=minimal'}
            }).catch(function() {})
            toast('Applied! Commit ' + resp.commit.slice(0,7))
          } else {
            toast('Build returned no commit')
          }
          closePanel('proposals'); openProposals()
        }).catch(function(e) { toast('Build failed: ' + (e.message || e)) })
      })
    }).catch(function() { toast('Could not update proposal') })
  } else {
    sbFetch('/rest/v1/ai_proposals?id=eq.' + id, {
      method:'PATCH', body:JSON.stringify({status:'rejected', decided_at:new Date().toISOString()}),
      headers:{'Prefer':'return=minimal'}
    }).then(function() { closePanel('proposals'); openProposals() })
      .catch(function() { toast('Could not reject') })
  }
}

function initCICWidget() {
  var chipsEl = document.getElementById('cic-node-chips')

  chipsEl.innerHTML = ''
  getCICNodes().forEach(function(n) {
    var chip = document.createElement('button')
    chip.className = 'cic-chip'
    chip.id = 'cic-chip-' + n.id
    chip.textContent = CIC_SHORT[n.id] || n.id
    chip.title = CIC_LABELS[n.id] || n.id
    chip.style.setProperty('--cc', CIC_COLORS[n.id] || '#fff')
    chip.addEventListener('click', function(e) { e.stopPropagation(); cicNodeClick(n.id) })
    chipsEl.appendChild(chip)
  })
  updateCICWidget(S.cicProvider, S.cicThinking)
}

function cicNodeClick(providerId) {
  if (S.cicManual === providerId) {
    S.cicManual = null
    toast('C.I. — Auto cycle')
  } else {
    S.cicManual = providerId
    toast('C.I. locked: ' + (CIC_LABELS[providerId] || providerId))
  }
  updateCICWidget(S.cicProvider, S.cicThinking)
}

function updateCICWidget(provider, thinking, via) {
  if (provider) S.cicProvider = provider
  if (via !== undefined) S.cicVia = via
  S.cicThinking = !!thinking
  var chipsEl = document.getElementById('cic-node-chips')
  if (chipsEl) {
    if (thinking) chipsEl.classList.add('cic-thinking')
    else chipsEl.classList.remove('cic-thinking')
  }
  getCICNodes().forEach(function(n) {
    var chip = document.getElementById('cic-chip-' + n.id)
    if (!chip) return
    chip.classList.remove('cic-chip-active', 'cic-chip-locked')
    if (n.id === S.cicManual) chip.classList.add('cic-chip-locked')
    if (!thinking && n.id === S.cicProvider) chip.classList.add('cic-chip-active')
  })
  // Arc: fill while thinking, empty when done
  var arc = document.getElementById('cic-arc')
  if (arc) {
    if (thinking) { arc.style.opacity = '1'; arc.setAttribute('stroke-dasharray', '66 132') }
    else { arc.style.opacity = '0'; arc.setAttribute('stroke-dasharray', '0 132') }
  }
  // Mode text in bar
  var modeEl = document.getElementById('cic-mode-txt')
  if (modeEl) modeEl.textContent = S.cicManual ? (CIC_SHORT[S.cicManual] || S.cicManual) : 'Auto'
  // Floating label above widget — shows orchestration with "via" when in Astranov mode
  var lbl = document.getElementById('cic-model-label')
  if (lbl) {
    var text = null
    if (thinking) text = 'Thinking…'
    else if (provider) {
      text = CIC_LABELS[provider] || provider
      if (provider === 'astranov' && S.cicVia) text += ' · via ' + (CIC_SHORT[S.cicVia] || S.cicVia)
    } else if (S.cicManual) {
      text = (CIC_LABELS[S.cicManual] || S.cicManual) + ' ⬡'
    }
    if (text) { lbl.textContent = '◉ ' + text; lbl.classList.add('cic-show') }
    else { lbl.classList.remove('cic-show') }
  }
  // Live badge inside chat panel
  var badge = document.getElementById('ai-provider-badge')
  if (badge && provider) {
    var t = CIC_LABELS[provider] || provider
    if (provider === 'astranov' && S.cicVia) t += ' · via ' + (CIC_SHORT[S.cicVia] || S.cicVia)
    badge.innerHTML = '&#9679; ' + esc(t)
  }
}

function cicStartThinking() {
  updateCICWidget(null, true)
}

function cicStopThinking(provider, via) {
  updateCICWidget(provider || null, false, via)
  if (provider) {
    var chip = document.getElementById('cic-chip-' + provider)
    if (chip) {
      chip.style.transform = 'scale(1.25)'
      setTimeout(function() { chip.style.transform = '' }, 300)
    }
  }
}

// ── DRAGGABLE WIDGETS ──────────────────────────────
function makeDraggable(elId, handleSel, storageKey) {
  var el = document.getElementById(elId)
  if (!el) return
  var handle = handleSel ? el.querySelector(handleSel) : el
  if (!handle) return

  // Restore saved position
  try {
    var saved = JSON.parse(localStorage.getItem(storageKey) || 'null')
    if (saved && saved.top != null && saved.left != null) {
      el.style.top = saved.top + 'px'
      el.style.left = saved.left + 'px'
      el.style.right = 'auto'
      el.style.bottom = 'auto'
    }
  } catch(e) {}

  var sx = 0, sy = 0, sl = 0, st = 0, active = false

  function start(x, y) {
    var r = el.getBoundingClientRect()
    sx = x; sy = y; sl = r.left; st = r.top; active = true
  }
  function move(x, y) {
    if (!active) return
    var nl = Math.max(0, Math.min(window.innerWidth - 50, sl + x - sx))
    var nt = Math.max(0, Math.min(window.innerHeight - 50, st + y - sy))
    el.style.left = nl + 'px'; el.style.top = nt + 'px'
    el.style.right = 'auto'; el.style.bottom = 'auto'
  }
  function end() {
    if (!active) return
    active = false
    var r = el.getBoundingClientRect()
    try { localStorage.setItem(storageKey, JSON.stringify({top: Math.round(r.top), left: Math.round(r.left)})) } catch(e) {}
  }

  handle.addEventListener('mousedown', function(e) {
    start(e.clientX, e.clientY)
    e.preventDefault()
    function mm(ev) { move(ev.clientX, ev.clientY) }
    function mu() { end(); document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu) }
    document.addEventListener('mousemove', mm)
    document.addEventListener('mouseup', mu)
  })
  handle.addEventListener('touchstart', function(e) { if (e.touches.length === 1) start(e.touches[0].clientX, e.touches[0].clientY) }, {passive:true})
  handle.addEventListener('touchmove', function(e) { if (e.touches.length === 1) move(e.touches[0].clientX, e.touches[0].clientY) }, {passive:true})
  handle.addEventListener('touchend', function() { end() }, {passive:true})
}

// ── INIT ───────────────────────────────────────────
function init() {
  window._dbg && _dbg('init', { ua: navigator.userAgent.slice(0,80), w: window.innerWidth, h: window.innerHeight, Globe_defined: typeof Globe })
  var h = new Date().getHours()
  if (h >= 22 || h < 6) S.conditions.night = true

  try {
    var raw = localStorage.getItem('av_session')
    if (raw) {
      var sess = JSON.parse(raw)
      if (sess && sess.access_token && sess.expires_at && sess.expires_at * 1000 > Date.now()) {
        applySession(sess)
      } else {
        localStorage.removeItem('av_session')
      }
    }
  } catch(e) {}

  initMultiResize()
  initCICWidget()
  makeDraggable('wallet-widget', '.wdh', 'av_pos_wallet')
  makeDraggable('radar-widget', '.wdh', 'av_pos_radar')
  makeDraggable('cic-float', '#cic-drag', 'av_pos_cic')
  initGlobe()
}

init()
</script>
