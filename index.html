<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none}
#globe-el{width:100%;height:100%;position:absolute;top:0;left:0;background:radial-gradient(ellipse at 50% 60%,#0a1a3a 0%,#000510 100%)}
#map-el{width:100%;height:100%;position:absolute;top:0;left:0;display:none}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.12);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:9999;white-space:nowrap}
#back-btn{position:fixed;top:16px;left:80px;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.55);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:20px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:200}
/* Splash screen */
#splash{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:18px;transition:opacity .35s ease}
#splash.fade{opacity:0;pointer-events:none}
#splash.done{display:none}
#splash-name{font-size:24px;font-weight:200;letter-spacing:8px;color:rgba(255,255,255,.88);text-transform:uppercase}
#splash-bar{width:110px;height:1px;background:rgba(255,255,255,.1);border-radius:1px;overflow:hidden}
#splash-prog{height:100%;width:5%;background:#0a84ff;border-radius:1px;transition:width .25s ease;animation:splashload 1.1s ease-out forwards}
@keyframes splashload{0%{width:5%}100%{width:100%}}
/* Drag handle shared */
.wdh{font-size:10px;color:rgba(255,255,255,.18);cursor:move;touch-action:none;user-select:none;-webkit-user-select:none;line-height:1;display:flex;align-items:center;justify-content:center;padding:0 1px;border-radius:3px;opacity:0;transition:opacity .25s,color .15s}
#wallet-widget:hover .wdh,#radar-widget:hover .wdh,#cic-float:hover .wdh,.wdh:active{opacity:1}
.wdh:hover{color:rgba(255,255,255,.55)}
/* Wallet widget — top left */
#wallet-widget{position:fixed;top:14px;left:14px;z-index:200;display:none;align-items:center;gap:4px;background:rgba(10,15,25,.4);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.08);border-radius:999px;padding:6px 12px 6px 8px;transition:opacity .4s,background .2s,border-color .2s,transform .25s cubic-bezier(.34,1.56,.64,1);transform-origin:left center;font-family:-apple-system,'SF Pro Text',inherit}
#wallet-widget.shown{display:flex}
#wallet-widget.idle{opacity:.32}
#wallet-widget:hover,#wallet-widget:active{opacity:1;background:rgba(20,25,40,.55);border-color:rgba(255,255,255,.18)}
#wallet-widget.pulse{animation:gadgetPulse .9s ease-out}
@keyframes gadgetPulse{0%{transform:scale(1)}30%{transform:scale(1.06);background:rgba(40,55,90,.6)}100%{transform:scale(1)}}
#wallet-bal{font-size:12px;font-weight:500;color:rgba(255,255,255,.92);white-space:nowrap;letter-spacing:.3px;cursor:pointer;font-variant-numeric:tabular-nums}
#wallet-bal::before{content:'AVC ';font-size:9px;font-weight:400;color:rgba(255,255,255,.45);letter-spacing:1.2px;margin-right:2px}
/* Radar widget — top right */
#radar-widget{position:fixed;top:14px;right:14px;z-index:200;display:none;align-items:center;gap:6px;background:rgba(10,15,25,.4);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.08);border-radius:999px;padding:6px 12px;transition:opacity .4s,background .2s,border-color .2s,transform .25s cubic-bezier(.34,1.56,.64,1);transform-origin:right center;font-family:-apple-system,'SF Pro Text',inherit}
#radar-widget.shown{display:flex}
#radar-widget.idle{opacity:.32}
#radar-widget:hover,#radar-widget:active{opacity:1;background:rgba(20,25,40,.55);border-color:rgba(255,255,255,.18)}
#radar-widget.radar-active{border-color:rgba(255,159,10,.45);background:rgba(40,30,15,.5)}
#radar-widget.radar-active #radar-dot{background:#ff9f0a;box-shadow:0 0 8px rgba(255,159,10,.7);animation:radarPulse 1.6s ease-in-out infinite}
#radar-widget.pulse{animation:gadgetPulse .9s ease-out}
#radar-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.35);flex-shrink:0;transition:all .25s}
@keyframes radarPulse{0%,100%{box-shadow:0 0 8px rgba(255,159,10,.7)}50%{box-shadow:0 0 14px rgba(255,159,10,1)}}
#radar-count{font-size:12px;font-weight:500;color:rgba(255,255,255,.92);white-space:nowrap;letter-spacing:.3px;cursor:pointer;font-variant-numeric:tabular-nums}
/* Unified multi-window panel */
#multi{position:fixed;bottom:0;left:0;right:0;height:55vh;background:rgba(10,10,18,.96);backdrop-filter:blur(30px);border-top:1px solid rgba(255,255,255,.08);z-index:300;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1);display:flex;flex-direction:column;overflow:hidden}
#multi.open{transform:translateY(0)}
#multi-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:10px auto 4px;flex-shrink:0;cursor:ns-resize;touch-action:none}
#multi-order-ribbon{flex-shrink:0;background:rgba(255,200,0,.07);border-bottom:1px solid rgba(255,200,0,.15);padding:7px 14px;font-size:11px;color:rgba(255,200,0,.9);display:none;white-space:nowrap;overflow-x:auto}
#multi-order-ribbon.visible{display:block}
#multi-zoom-bar{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:6px 14px 6px;border-bottom:1px solid rgba(255,255,255,.04)}
.multi-zoom-btn{background:transparent;border:none;color:rgba(255,255,255,.38);width:24px;height:24px;border-radius:50%;font-size:15px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;padding:0;transition:color .15s,background .15s,transform .15s;line-height:1}
.multi-zoom-btn:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.06)}
.multi-zoom-btn:active{transform:scale(.92);background:rgba(255,255,255,.1)}
.multi-zoom-btn.close-btn{margin-left:auto;font-size:13px}
.multi-zoom-btn.close-btn:hover{color:#ff453a;background:rgba(255,69,58,.1)}
#multi-zoom-txt{font-size:10px;color:rgba(255,255,255,.32);letter-spacing:1px;font-variant-numeric:tabular-nums;min-width:34px;text-align:center}
#multi-content{flex:1;overflow-y:auto;transform-origin:top left}
#lvl-label{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.85);padding:6px 16px;border-radius:20px;font-size:13px;pointer-events:none;z-index:200;display:none;white-space:nowrap}
.panel{position:fixed;bottom:0;left:0;right:0;max-height:100vh;overflow-y:auto;background:rgba(10,10,18,.96);backdrop-filter:blur(30px);border-top:1px solid rgba(255,255,255,.08);z-index:300;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1)}
.panel.open{transform:translateY(0)}
.ph{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:12px auto 0}
.ptitle{font-size:17px;font-weight:600;padding:14px 20px 8px;letter-spacing:-.3px}
.psect{padding:0 20px 16px}
.row{display:flex;align-items:center;padding:13px 20px;border-bottom:1px solid rgba(255,255,255,.05);gap:12px;cursor:pointer}
.row:active{background:rgba(255,255,255,.04)}
.ri{font-size:22px;min-width:30px;text-align:center}
.rm{flex:1;min-width:0}
.rt{font-size:15px;font-weight:500}
.rs{font-size:12px;color:rgba(255,255,255,.45);margin-top:2px}
.rr{font-size:13px;color:rgba(255,255,255,.45);white-space:nowrap}
.chev{color:rgba(255,255,255,.25);font-size:15px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 18px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.bp{background:#0a84ff;color:#fff}.bp:active{background:#0070d8}
.bs{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.12)}.bs:active{background:rgba(255,255,255,.15)}
.bd{background:#ff3b30;color:#fff}.bd:active{background:#d42f25}
.bsm{padding:7px 14px;font-size:13px;border-radius:9px}
.bblk{width:100%}
.brow{display:flex;gap:10px;padding:12px 20px 20px}
.inp{width:100%;padding:12px 14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:15px;outline:none;font-family:inherit}
.inp:focus{border-color:rgba(10,132,255,.5);background:rgba(10,132,255,.06)}
.inp::placeholder{color:rgba(255,255,255,.3)}
textarea.inp{resize:none;line-height:1.5}
select.inp option{background:#1a1a2e;color:#fff}
.ilabel{font-size:11px;color:rgba(255,255,255,.45);padding:8px 20px 4px;text-transform:uppercase;letter-spacing:.6px}
.igrp{padding:0 20px 12px}
.map-pin{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid rgba(255,255,255,.25);cursor:pointer;transition:transform .15s}
.map-pin:active{transform:scale(1.2)}
.pin-shop{background:rgba(10,132,255,.65)}
.pin-city{background:rgba(255,200,0,.12);border-color:rgba(255,200,0,.35)}
.item-row{display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.04)}
.ie{font-size:20px;width:30px;text-align:center}
.ii{flex:1;margin-left:10px}
.iname{font-size:14px;font-weight:500}
.iprice{font-size:12px;color:rgba(255,255,255,.45);margin-top:2px}
.qc{display:flex;align-items:center;gap:8px}
.qb{width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.qb:active{background:rgba(255,255,255,.2)}
.qn{width:20px;text-align:center;font-size:14px;font-weight:600}
.bbar{position:sticky;bottom:0;background:rgba(8,8,16,.97);padding:12px 20px 16px;border-top:1px solid rgba(255,255,255,.07)}
.bline{display:flex;justify-content:space-between;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:4px}
.btotal{display:flex;justify-content:space-between;font-size:15px;font-weight:600;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.08)}
.cmsg{padding:8px 12px;border-radius:14px;max-width:82%;margin:3px 16px;font-size:14px;line-height:1.4}

.cwrap{display:flex;flex-direction:column;padding:8px 0;min-height:180px;max-height:320px;overflow-y:auto;gap:2px}

.kb{padding:15px;border-radius:13px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;cursor:pointer;text-align:left;font-size:13px;line-height:1.3;font-family:inherit}
.ki{font-size:22px;display:block;margin-bottom:5px}
.kb:active{background:rgba(255,255,255,.09)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.bg{background:rgba(52,199,89,.2);color:#34c759}
.br{background:rgba(255,59,48,.2);color:#ff3b30}
.bb{background:rgba(10,132,255,.2);color:#0a84ff}
.by{background:rgba(255,200,0,.15);color:#ffc800}
.sep{height:1px;background:rgba(255,255,255,.05);margin:4px 0}
.muted{color:rgba(255,255,255,.38);font-size:13px}
.center{text-align:center}
pre.mono{font-family:monospace;font-size:12px;color:rgba(255,255,255,.65);white-space:pre-wrap;word-break:break-all;background:rgba(255,255,255,.04);padding:12px;border-radius:8px;margin:0}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px 16px}
.stat-box{background:rgba(255,255,255,.05);border-radius:12px;padding:14px}
.stat-label{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.stat-val{font-size:16px;font-weight:600}
.leaflet-container{background:#08080f}
.leaflet-tile-pane{filter:brightness(.75) saturate(1.1)}
.cleanTip{background:rgba(0,0,0,.75)!important;border:1px solid rgba(255,255,255,.12)!important;color:#fff!important;border-radius:8px!important;padding:4px 9px!important;font-size:12px!important;box-shadow:none!important}
.leaflet-popup-content-wrapper{background:rgba(10,10,20,.97)!important;border:1px solid rgba(255,255,255,.1)!important;color:#fff!important;border-radius:14px!important;box-shadow:0 8px 30px rgba(0,0,0,.6)!important}
.leaflet-popup-tip{background:rgba(10,10,20,.97)!important}
/* ── COLLECTIVE INTELLIGENCE CYCLE ──────────────── */
#cic-float{position:fixed;bottom:28px;right:16px;z-index:200;display:flex;flex-direction:column;align-items:flex-end}
#cic-drag{position:absolute;top:-12px;right:0;font-size:11px;color:rgba(255,255,255,.18);cursor:move;touch-action:none;user-select:none;-webkit-user-select:none;padding:2px 4px}
#cic-drag:hover{color:rgba(255,255,255,.5)}
#cic-orders-dot{position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:#ff3b30;color:#fff;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center;z-index:3;border:2px solid #000}
#cic-model-label{position:absolute;bottom:calc(100% + 4px);right:0;background:rgba(0,0,0,.82);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.13);color:rgba(255,255,255,.92);padding:4px 10px;border-radius:9px;font-size:10px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .35s,transform .35s;transform:translateY(4px);z-index:500}
#cic-model-label.cic-show{opacity:1;transform:translateY(0)}
.cic-ring{position:relative;width:60px;height:60px;flex-shrink:0;cursor:pointer}
.cic-svg{position:absolute;top:0;left:0;pointer-events:none}
.cic-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.1);color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:all .2s;padding:0}
.cic-center.hf-on{background:rgba(255,200,0,.3)!important;border-color:rgba(255,200,0,.7)!important;box-shadow:0 0 10px rgba(255,200,0,.4)}
@keyframes cic-ring-pulse{0%,100%{stroke:rgba(255,200,0,.12)}50%{stroke:rgba(255,200,0,.4)}}
#cic-ring-base{animation:cic-ring-pulse 2.6s ease-in-out infinite}
/* CIC provider chips — always visible below ring */
#cic-node-chips{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap;justify-content:flex-end;max-width:170px}
.cic-chip{font-size:9px;padding:3px 7px;border-radius:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit}
.cic-chip:active{transform:scale(.92)}
.cic-chip.cic-chip-active{color:var(--cc,#fff);border-color:var(--cc,#fff);background:rgba(255,255,255,.1);font-weight:600}
.cic-chip.cic-chip-locked{outline:1px solid #ffc800;outline-offset:1px}
.cic-lbl-wrap{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:.4px;margin-top:3px;line-height:1;white-space:nowrap;text-align:right}
.cic-lbl-wrap span{color:rgba(255,255,255,.5)}
@keyframes cic-think{0%,100%{opacity:.3}50%{opacity:1}}
.cic-thinking .cic-chip{animation:cic-think .75s ease-in-out infinite}
@keyframes cic-spin{from{stroke-dashoffset:145}to{stroke-dashoffset:0}}

/* ═══════════════════════════════════════════════════════════════════════
   CELESTIAL CIRCLES — universal floating-gadget primitive
   See CLAUDE.md "CELESTIAL CIRCLES UI LAW" for the contract.
   ═══════════════════════════════════════════════════════════════════════ */
.cc{position:fixed;z-index:250;border-radius:50%;overflow:visible;touch-action:none;-webkit-tap-highlight-color:transparent;
  background:radial-gradient(circle at 32% 28%,rgba(255,255,255,.06) 0%,transparent 55%),rgba(10,15,25,.55);
  backdrop-filter:blur(28px) saturate(1.4);-webkit-backdrop-filter:blur(28px) saturate(1.4);
  border:1px solid rgba(255,255,255,.10);
  box-shadow:0 10px 44px rgba(0,0,0,.55),inset 0 0 30px rgba(255,255,255,.04),0 0 var(--cc-glow-r,22px) var(--cc-glow-c,rgba(255,255,255,.12));
  color:rgba(255,255,255,.92);font-family:-apple-system,'SF Pro Text',inherit;font-size:13px;line-height:1.45;
  opacity:0;transform:scale(.6);
  transition:opacity .35s ease,transform .45s cubic-bezier(.34,1.56,.64,1),filter .2s,box-shadow .3s,width .25s ease,height .25s ease}
.cc.cc-shown{opacity:1;transform:scale(1)}
.cc.cc-collapsing{opacity:0;transform:scale(.12);pointer-events:none;transition:opacity .3s,transform .3s ease-in}
.cc.cc-dragging{transition:none;cursor:grabbing}
.cc.cc-pinching{filter:brightness(1.06)}
.cc.cc-link-near{box-shadow:0 0 0 1px rgba(255,255,255,.35),0 10px 44px rgba(0,0,0,.55),0 0 32px var(--cc-glow-c,rgba(255,255,255,.25))}
.cc-rim{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(255,255,255,.06);pointer-events:none}
.cc-scroll{position:absolute;inset:0;border-radius:50%;overflow:hidden;
  -webkit-mask-image:radial-gradient(circle,#000 0%,#000 76%,transparent 100%);
          mask-image:radial-gradient(circle,#000 0%,#000 76%,transparent 100%)}
.cc-content{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:18% 16%;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;transform-origin:center center}
.cc-content::-webkit-scrollbar{display:none}
.cc-content > *{transform-origin:top center}
.cc-content h1,.cc-content h2,.cc-content h3{font-weight:500;letter-spacing:.3px}
.cc-arc{position:absolute;inset:-1px;pointer-events:none;width:calc(100% + 2px);height:calc(100% + 2px)}
.cc-arc circle{fill:none;stroke-width:1.8;stroke-linecap:round;transform-origin:center;transform:rotate(-90deg)}
.cc-arc .cc-arc-track{stroke:rgba(255,255,255,.04)}
.cc-arc .cc-arc-prog{stroke:var(--cc-glow-c,rgba(255,255,255,.35));transition:stroke-dasharray .15s ease}
.cc-label{position:absolute;left:50%;bottom:-20px;transform:translateX(-50%);
  font-size:9px;letter-spacing:2.4px;color:rgba(255,255,255,.34);text-transform:uppercase;
  pointer-events:none;white-space:nowrap;font-weight:500}
.cc-data{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.cc-data .v{font-size:28px;font-weight:300;letter-spacing:.5px;color:rgba(255,255,255,.95);font-variant-numeric:tabular-nums;line-height:1}
.cc-data .u{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-top:4px;display:block}
.cc-data .delta{font-size:10px;font-weight:500;margin-top:6px;display:block}
.cc-data .delta.up{color:#32d74b}.cc-data .delta.dn{color:#ff453a}
.cc-sparkline{position:absolute;left:18%;right:18%;bottom:28%;height:32px;pointer-events:none;opacity:.85}
.cc-sparkline path{fill:none;stroke:var(--cc-glow-c,rgba(255,255,255,.35));stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
.cc-sparkline .fill{stroke:none;fill:var(--cc-glow-c,rgba(255,255,255,.18));opacity:.35}

/* Type-specific glow & accent */
.cc-economics{--cc-glow-c:rgba(50,215,75,.22);--cc-glow-r:20px}
.cc-economics .cc-arc-prog{stroke:rgba(50,215,75,.6)}
.cc-radar{--cc-glow-c:rgba(255,159,10,.22);--cc-glow-r:20px}
.cc-radar.active{--cc-glow-r:32px;--cc-glow-c:rgba(255,159,10,.4)}
.cc-radar .cc-arc-prog{stroke:rgba(255,159,10,.65)}
.cc-ai{--cc-glow-c:rgba(191,90,242,.25);--cc-glow-r:24px}
.cc-ai .cc-arc-prog{stroke:rgba(191,90,242,.7)}
.cc-view{--cc-glow-c:rgba(100,180,255,.18);--cc-glow-r:22px}
.cc-view .cc-arc-prog{stroke:rgba(100,180,255,.55)}
.cc-krypteia{--cc-glow-c:rgba(255,200,0,.26);--cc-glow-r:26px}

/* Tiny pulsing dot (for radar active) */
.cc-pulse-dot{position:absolute;width:8px;height:8px;border-radius:50%;background:#ff9f0a;
  top:24%;left:50%;transform:translateX(-50%);box-shadow:0 0 10px rgba(255,159,10,.8);
  animation:ccPulse 1.6s ease-in-out infinite}
@keyframes ccPulse{0%,100%{transform:translateX(-50%) scale(1);opacity:1}50%{transform:translateX(-50%) scale(1.4);opacity:.55}}

/* Long-press pin indicator */
.cc.cc-pinned::after{content:'';position:absolute;top:8%;right:18%;width:6px;height:6px;
  border-radius:50%;background:var(--cc-glow-c,#fff);box-shadow:0 0 6px var(--cc-glow-c,#fff)}

/* Constellation link line — drawn by JS as svg between two circles */
#cc-links-svg{position:fixed;inset:0;pointer-events:none;z-index:240}
#cc-links-svg line{stroke:rgba(255,255,255,.18);stroke-width:1;stroke-dasharray:2 4}

/* Hide retired chrome (kept in DOM for now; will be removed in follow-up) */
#multi{display:none!important}
#wallet-widget,#radar-widget{display:none!important}
</style>
</head>

<div id="globe-el"></div>
<div id="map-el"></div>
<div id="toast"></div>
<div id="back-btn" onclick="goBack()">&#8592;</div>
<div id="lvl-label"></div>
<div id="splash"><div id="splash-name">ASTRANOV</div><div id="splash-bar"><div id="splash-prog"></div></div></div>
<!-- Top-left wallet — appears when authenticated -->
<div id="wallet-widget" onclick="openAccounting()">
  <div class="wdh" title="Drag" onclick="event.stopPropagation()">&#8942;</div>
  <div id="wallet-bal">0</div>
</div>
<!-- Top-right radar — appears when active orders or nearby vendors -->
<div id="radar-widget" onclick="openRadar()">
  <div class="wdh" title="Drag" onclick="event.stopPropagation()">&#8942;</div>
  <div id="radar-dot"></div>
  <span id="radar-count">0</span>
</div>
<!-- CIC ring — always floating bottom-right, the OS heartbeat -->
<div id="cic-float">
  <div id="cic-drag" title="Drag to move">&#8942;</div>
  <div id="cic-model-label"></div>
  <div class="cic-ring" id="cic-ring" onclick="openAIChat()">
    <svg class="cic-svg" width="60" height="60" viewBox="0 0 60 60">
      <circle id="cic-ring-base" cx="30" cy="30" r="21" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="1.5"/>
      <circle id="cic-arc" cx="30" cy="30" r="21" fill="none" stroke="rgba(255,200,0,.6)" stroke-width="2"
        stroke-dasharray="0 132" stroke-linecap="round" transform="rotate(-90 30 30)" opacity="0"
        style="transition:stroke-dasharray .4s"/>
    </svg>
    <button class="cic-center" id="cic-mic" onclick="event.stopPropagation();toggleHF()">&#127908;</button>
    <div id="cic-orders-dot"></div>
  </div>
  <div id="cic-node-chips"></div>
  <div class="cic-lbl-wrap">C.I. <span id="cic-mode-txt">Auto</span></div>
</div>
<!-- Unified multi-window panel — the only bottom panel in the OS -->
<div id="multi">
  <div id="multi-handle"></div>
  <div id="multi-order-ribbon"></div>
  <div id="multi-zoom-bar">
    <button class="multi-zoom-btn" onclick="multiZoom(-1)" aria-label="Zoom out">&#8722;</button>
    <span id="multi-zoom-txt">100%</span>
    <button class="multi-zoom-btn" onclick="multiZoom(1)" aria-label="Zoom in">&#43;</button>
    <button class="multi-zoom-btn close-btn" onclick="closeMulti()" aria-label="Close">&#10005;</button>
  </div>
  <div id="multi-content"></div>
</div>
<div id="ui"></div>

<script>
'use strict'

    dbg('promise', { msg: String(e.reason && e.reason.message ? e.reason.message : e.reason) })

  var _oc = console.error.bind(console)
  console.error = function() {
    _oc.apply(console, arguments)
    dbg('console_error', { msg: Array.from(arguments).map(function(a){ return typeof a === 'object' ? JSON.stringify(a) : String(a) }).join(' ').slice(0,300) })
  }
  window._dbg = dbg
  window._dbgFlush = flush

// ═══════════════════════════════════════════════════════════════════════
// CELESTIAL CIRCLES — universal floating-gadget primitive.
// Spec: CLAUDE.md "CELESTIAL CIRCLES UI LAW".
// API: Circles.spawn({id,type,title,content,glow,x,y,diameter,persistent,onClose,spawnFrom})
//      Circles.get(id) · Circles.close(id) · Circles.closeAll() · Circles.update(id,patch)
// Gestures: 1-finger interior=scroll · 1-finger rim(≥86%R)=drag · 2-finger=pinch
//           pinch < .6 shrinks the circle itself · pinch > 1.6 grows the circle itself
// ═══════════════════════════════════════════════════════════════════════
var Circles = (function() {
  var instances = {}
  var nextZ = 251
  var linksSvg = null

  function $el(tag, cls, html) {
    var n = document.createElement(tag)
    if (cls) n.className = cls
    if (html != null) n.innerHTML = html
    return n
  }

  function loadPos(id) {
    try { return JSON.parse(localStorage.getItem('av_cc_pos_' + id) || 'null') } catch(e) { return null }
  }
  function savePos(c) {
    try { localStorage.setItem('av_cc_pos_' + c.id, JSON.stringify({x:Math.round(c.x),y:Math.round(c.y),d:Math.round(c.diameter)})) } catch(e) {}
  }

  // Auto-place in the largest empty quadrant
  function autoPlace(d) {
    var W = window.innerWidth, H = window.innerHeight
    var quads = [
      {x: W*0.18, y: H*0.22}, {x: W*0.82, y: H*0.22},
      {x: W*0.18, y: H*0.78}, {x: W*0.82, y: H*0.78},
      {x: W*0.5,  y: H*0.5}
    ]
    var best = quads[0], bestScore = -1
    quads.forEach(function(q) {
      var min = 1e9
      Object.keys(instances).forEach(function(k) {
        var ci = instances[k]
        var dx = q.x - ci.x, dy = q.y - ci.y
        var dist = Math.sqrt(dx*dx + dy*dy)
        if (dist < min) min = dist
      })
      if (min > bestScore) { bestScore = min; best = q }
    })
    // Clamp inside viewport with margin
    var r = d / 2
    return {
      x: Math.max(r + 12, Math.min(W - r - 12, best.x)),
      y: Math.max(r + 12, Math.min(H - r - 12, best.y))
    }
  }

  function applyTransform(c) {
    c.element.style.left   = (c.x - c.diameter/2) + 'px'
    c.element.style.top    = (c.y - c.diameter/2) + 'px'
    c.element.style.width  = c.diameter + 'px'
    c.element.style.height = c.diameter + 'px'
    var content = c.element.querySelector('.cc-content')
    if (content) content.style.transform = 'scale(' + c.contentScale + ')'
    updateArc(c)
  }

  function updateArc(c) {
    var arc = c.element.querySelector('.cc-arc-prog')
    if (!arc) return
    var content = c.element.querySelector('.cc-content')
    if (!content) return
    var max = content.scrollHeight - content.clientHeight
    var pct = max > 4 ? Math.max(0, Math.min(1, content.scrollTop / max)) : 0
    // SVG arc is sized to viewBox 0 0 100 100. Circumference 2πr where r=49.
    var circ = 2 * Math.PI * 49
    arc.setAttribute('stroke-dasharray', (pct * circ) + ' ' + circ)
  }

  function buildElement(c) {
    var el = $el('div', 'cc cc-' + c.type)
    el.dataset.ccId = c.id
    el.style.zIndex = nextZ++
    el.innerHTML =
      '<div class="cc-scroll"><div class="cc-content"></div></div>' +
      '<svg class="cc-arc" viewBox="0 0 100 100">' +
        '<circle class="cc-arc-track" cx="50" cy="50" r="49"/>' +
        '<circle class="cc-arc-prog"  cx="50" cy="50" r="49" stroke-dasharray="0 308"/>' +
      '</svg>' +
      '<div class="cc-rim"></div>' +
      (c.title ? '<div class="cc-label">' + c.title + '</div>' : '')
    var content = el.querySelector('.cc-content')
    if (typeof c.content === 'string') content.innerHTML = c.content
    else if (c.content instanceof Node) content.appendChild(c.content)
    content.addEventListener('scroll', function(){ updateArc(c) }, {passive:true})
    return el
  }

  // ─── GESTURE HANDLING ──────────────────────────────
  function attachGestures(c) {
    var el = c.element
    var pointers = {}
    var drag = null, pinch = null
    var pressTimer = null

    function center() {
      var r = el.getBoundingClientRect()
      return { cx: r.left + r.width/2, cy: r.top + r.height/2, R: r.width/2 }
    }
    function roleAt(x, y) {
      var c0 = center()
      var dx = x - c0.cx, dy = y - c0.cy
      var d = Math.sqrt(dx*dx + dy*dy)
      return d / c0.R > 0.86 ? 'drag' : 'scroll'
    }

    el.addEventListener('pointerdown', function(e) {
      if (e.pointerType === 'mouse' && e.button !== 0) return
      try { el.setPointerCapture(e.pointerId) } catch(_) {}
      el.style.zIndex = nextZ++
      pointers[e.pointerId] = { x:e.clientX, y:e.clientY, lastX:e.clientX, lastY:e.clientY, role: roleAt(e.clientX, e.clientY) }
      var n = Object.keys(pointers).length
      if (n === 1) {
        var p = pointers[e.pointerId]
        if (p.role === 'drag') {
          drag = { sx:e.clientX, sy:e.clientY, cx:c.x, cy:c.y }
          el.classList.add('cc-dragging')
          // Long-press on rim → toggle pin
          pressTimer = setTimeout(function() {
            c.persistent = !c.persistent
            el.classList.toggle('cc-pinned', c.persistent)
            haptic()
            drag = null
          }, 650)
        }
      } else if (n === 2) {
        var ids = Object.keys(pointers)
        var p1 = pointers[ids[0]], p2 = pointers[ids[1]]
        var dx = p1.x - p2.x, dy = p1.y - p2.y
        pinch = { dist: Math.sqrt(dx*dx + dy*dy), d0: c.diameter, s0: c.contentScale }
        drag = null
        el.classList.remove('cc-dragging')
        el.classList.add('cc-pinching')
      }
    })

    el.addEventListener('pointermove', function(e) {
      var p = pointers[e.pointerId]
      if (!p) return
      var ldx = e.clientX - p.lastX, ldy = e.clientY - p.lastY
      p.lastX = e.clientX; p.lastY = e.clientY; p.x = e.clientX; p.y = e.clientY
      var n = Object.keys(pointers).length

      if (n === 2 && pinch) {
        var ids = Object.keys(pointers)
        var p1 = pointers[ids[0]], p2 = pointers[ids[1]]
        var dx = p1.x - p2.x, dy = p1.y - p2.y
        var d = Math.sqrt(dx*dx + dy*dy)
        var ratio = d / Math.max(1, pinch.dist)
        var s = pinch.s0 * ratio
        if (s < 0.6) {
          c.contentScale = 0.6
          c.diameter = Math.max(c.minD, pinch.d0 * (s / 0.6))
        } else if (s > 1.6) {
          c.contentScale = 1.6
          c.diameter = Math.min(c.maxD, pinch.d0 * (s / 1.6))
        } else {
          c.contentScale = s
        }
        applyTransform(c)
      } else if (n === 1) {
        if (p.role === 'drag' && drag) {
          if (pressTimer && (Math.abs(e.clientX - drag.sx) > 6 || Math.abs(e.clientY - drag.sy) > 6)) {
            clearTimeout(pressTimer); pressTimer = null
          }
          c.x = drag.cx + (e.clientX - drag.sx)
          c.y = drag.cy + (e.clientY - drag.sy)
          // Soft-clamp inside viewport
          var r = c.diameter / 2
          c.x = Math.max(r * 0.4, Math.min(window.innerWidth  - r * 0.4, c.x))
          c.y = Math.max(r * 0.4, Math.min(window.innerHeight - r * 0.4, c.y))
          applyTransform(c)
          checkConstellation(c)
        } else if (p.role === 'scroll') {
          var content = el.querySelector('.cc-content')
          if (content) content.scrollTop -= ldy
          updateArc(c)
        }
      }
    })

    function endPointer(e) {
      if (!pointers[e.pointerId]) return
      delete pointers[e.pointerId]
      var n = Object.keys(pointers).length
      if (n < 2 && pinch) {
        pinch = null
        el.classList.remove('cc-pinching')
        // If user pinched almost to nothing → close
        if (c.diameter <= c.minD + 6 && c.contentScale <= 0.62 && !c.persistent) {
          close(c)
          return
        }
      }
      if (n === 0) {
        if (drag) {
          var moved = Math.abs(e.clientX - drag.sx) + Math.abs(e.clientY - drag.sy)
          // Treat as tap if no significant movement and on rim → toggle pin handled by long-press
          if (moved < 6 && !c.persistent && c.onTapRim) c.onTapRim()
          drag = null
        }
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null }
        el.classList.remove('cc-dragging')
        savePos(c)
      }
    }
    el.addEventListener('pointerup', endPointer)
    el.addEventListener('pointercancel', endPointer)
    el.addEventListener('lostpointercapture', endPointer)

    // Double-tap to close (when not persistent)
    var lastTap = 0
    el.addEventListener('click', function(e) {
      var now = Date.now()
      if (now - lastTap < 320 && !c.persistent) {
        e.stopPropagation()
        close(c); return
      }
      lastTap = now
    })
  }

  function haptic() { try { navigator.vibrate && navigator.vibrate(8) } catch(_) {} }

  // ─── CONSTELLATION LINKS ───────────────────────────
  function checkConstellation(c) {
    var nearAny = false
    Object.keys(instances).forEach(function(k) {
      if (k === c.id) return
      var o = instances[k]
      var dx = c.x - o.x, dy = c.y - o.y
      var dist = Math.sqrt(dx*dx + dy*dy)
      var threshold = (c.diameter + o.diameter) / 2 + 24
      var near = dist < threshold * 1.25 && dist > threshold * 0.55
      o.element.classList.toggle('cc-link-near', near && o._linkedTo === c.id || false)
      if (near) { o._linkedTo = c.id; c._linkedTo = o.id; nearAny = true }
    })
    if (!nearAny) c._linkedTo = null
    drawLinks()
  }

  function drawLinks() {
    if (!linksSvg) {
      linksSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg')
      linksSvg.id = 'cc-links-svg'
      linksSvg.setAttribute('width', '100%')
      linksSvg.setAttribute('height', '100%')
      document.body.appendChild(linksSvg)
    }
    linksSvg.innerHTML = ''
    var seen = {}
    Object.keys(instances).forEach(function(k) {
      var c = instances[k]
      if (!c._linkedTo) return
      var pair = [k, c._linkedTo].sort().join('|')
      if (seen[pair]) return
      seen[pair] = true
      var o = instances[c._linkedTo]
      if (!o) return
      var l = document.createElementNS('http://www.w3.org/2000/svg', 'line')
      l.setAttribute('x1', c.x); l.setAttribute('y1', c.y)
      l.setAttribute('x2', o.x); l.setAttribute('y2', o.y)
      linksSvg.appendChild(l)
    })
  }

  // ─── SPAWN / UPDATE / CLOSE ────────────────────────
  function spawn(opts) {
    opts = opts || {}
    var id = opts.id || ('cc_' + Math.random().toString(36).slice(2, 8))
    if (instances[id]) {
      var existing = instances[id]
      if (opts.content != null) setContent(existing, opts.content)
      if (opts.title != null) {
        var lbl = existing.element.querySelector('.cc-label')
        if (lbl) lbl.textContent = opts.title
        existing.title = opts.title
      }
      existing.element.style.zIndex = nextZ++
      return existing
    }
    var minD = opts.minD || 96
    var maxD = opts.maxD || Math.min(window.innerWidth, window.innerHeight) - 32
    var d = opts.diameter || (opts.type === 'view' ? Math.round(Math.min(window.innerWidth, window.innerHeight) * 0.62) : 168)
    d = Math.max(minD, Math.min(maxD, d))
    var saved = loadPos(id)
    var c = {
      id: id,
      type: opts.type || 'view',
      title: opts.title || '',
      content: opts.content || '',
      diameter: saved && saved.d ? saved.d : d,
      minD: minD, maxD: maxD,
      contentScale: 1,
      persistent: opts.persistent === true,
      onClose: opts.onClose,
      spawnFrom: opts.spawnFrom || null,
      _linkedTo: null
    }
    if (saved) { c.x = saved.x; c.y = saved.y }
    else if (opts.x != null && opts.y != null) { c.x = opts.x; c.y = opts.y }
    else { var p = autoPlace(c.diameter); c.x = p.x; c.y = p.y }

    c.element = buildElement(c)
    if (c.persistent) c.element.classList.add('cc-pinned')
    document.body.appendChild(c.element)
    applyTransform(c)
    attachGestures(c)
    instances[id] = c
    // Animate in from spawn origin if provided
    if (c.spawnFrom) {
      c.element.style.transformOrigin = (c.spawnFrom.x - (c.x - c.diameter/2)) + 'px ' + (c.spawnFrom.y - (c.y - c.diameter/2)) + 'px'
    }
    requestAnimationFrame(function() { c.element.classList.add('cc-shown') })
    requestAnimationFrame(function() { updateArc(c) })
    return c
  }

  function setContent(c, html) {
    var content = c.element.querySelector('.cc-content')
    if (!content) return
    if (typeof html === 'string') content.innerHTML = html
    else if (html instanceof Node) { content.innerHTML = ''; content.appendChild(html) }
    requestAnimationFrame(function() { updateArc(c) })
  }

  function close(c) {
    if (!c || !instances[c.id]) return
    delete instances[c.id]
    if (c.onClose) try { c.onClose() } catch(_){}
    c.element.classList.add('cc-collapsing')
    if (c.spawnFrom) {
      var fx = c.spawnFrom.x - c.x, fy = c.spawnFrom.y - c.y
      c.element.style.transform = 'translate(' + fx + 'px,' + fy + 'px) scale(.08)'
    }
    setTimeout(function() {
      if (c.element.parentNode) c.element.parentNode.removeChild(c.element)
      drawLinks()
    }, 340)
  }

  function update(id, patch) {
    var c = instances[id]; if (!c) return null
    if (patch.content != null) setContent(c, patch.content)
    if (patch.title != null) {
      c.title = patch.title
      var lbl = c.element.querySelector('.cc-label')
      if (lbl) lbl.textContent = patch.title
    }
    if (patch.diameter != null) { c.diameter = patch.diameter; applyTransform(c) }
    if (patch.glow != null) c.element.style.setProperty('--cc-glow-c', patch.glow)
    if (patch.active != null) c.element.classList.toggle('active', !!patch.active)
    if (patch.pulse) {
      c.element.classList.remove('cc-shown')
      void c.element.offsetWidth
      c.element.classList.add('cc-shown')
    }
    return c
  }

  function get(id) { return instances[id] || null }
  function closeById(id) { close(instances[id]) }
  function closeAll(includePersistent) {
    Object.keys(instances).forEach(function(k) {
      if (includePersistent || !instances[k].persistent) close(instances[k])
    })
  }
  function closeOthers(keepId) {
    Object.keys(instances).forEach(function(k) {
      if (k !== keepId && !instances[k].persistent && instances[k].type === 'view') close(instances[k])
    })
  }
  function all() { return instances }

  // Reposition on viewport resize so circles stay on-screen
  window.addEventListener('resize', function() {
    Object.keys(instances).forEach(function(k) {
      var c = instances[k]
      var r = c.diameter / 2
      c.x = Math.max(r * 0.4, Math.min(window.innerWidth  - r * 0.4, c.x))
      c.y = Math.max(r * 0.4, Math.min(window.innerHeight - r * 0.4, c.y))
      applyTransform(c)
    })
    drawLinks()
  })

  return {

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function money(n) { return (+(n||0)).toFixed(2) + ' AVC' }
function uid() { return Math.random().toString(36).slice(2,10) }
function nowMs() { return Date.now() }

function km(a, b) {
  var R = 6371
  var dLat = (b.lat - a.lat) * Math.PI / 180
  var dLng = (b.lng - a.lng) * Math.PI / 180
  var x = Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(a.lat * Math.PI/180) * Math.cos(b.lat * Math.PI/180) *
    Math.sin(dLng/2) * Math.sin(dLng/2)
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x))
}

function openPanel(id, html, opts) {
  _panelJustOpened = true
  setTimeout(function() { _panelJustOpened = false }, 0)
  opts = opts || {}
  var circleId = 'view_' + (id || 'panel')
  var type = opts.type || (id === 'krypteia' ? 'krypteia' : 'view')
  var title = opts.title || _panelTitles[id] || id || ''
  // Close other transient view circles when opening a new one — avoids stacking
  // unless caller asks to keep them (e.g. constellation-link a vendor + payment)
  if (!opts.keepOthers) Circles.closeOthers(circleId)
  var c = Circles.spawn({
    id: circleId,

    content: html,
    diameter: opts.diameter,
    spawnFrom: opts.spawnFrom,
    persistent: opts.persistent
  })
  // Always re-render in case spawn returned an existing instance
  Circles.update(circleId, { content: html, title: title })
  return c && c.element
}

function initMultiResize() {

  if (!handle) return
  var startY = 0, startH = 0
  function onStart(y) {
    startY = y
    startH = parseInt(document.getElementById('multi').style.height) || Math.round(window.innerHeight * 0.55)
  }
  function onMove(y) {
    var newH = Math.max(100, Math.min(window.innerHeight - 60, startH + (startY - y)))
    _multiH = newH
    document.getElementById('multi').style.height = newH + 'px'
  }
  function onEnd(y) {
    if (startY - y < -80) closeMulti()
  }
  handle.addEventListener('touchstart', function(e) { onStart(e.touches[0].clientY) }, {passive:true})
  handle.addEventListener('touchmove', function(e) { onMove(e.touches[0].clientY) }, {passive:true})
  handle.addEventListener('touchend', function(e) { onEnd(e.changedTouches[0].clientY) }, {passive:true})
  handle.addEventListener('mousedown', function(e) {
    onStart(e.clientY)
    function mm(ev) { onMove(ev.clientY) }
    function mu(ev) { onEnd(ev.clientY); document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu) }
    document.addEventListener('mousemove', mm)
    document.addEventListener('mouseup', mu)
    e.preventDefault()
  })
}

// ── GLOBE ──────────────────────────────────────────
function initGlobe() {
  if (typeof Globe === 'undefined') {
    _globeCdnWait++
    if (_globeCdnWait === 1) window._dbg && _dbg('globe', { step: 'waiting_for_cdn', attempt: _globeCdnWait })
    if (_globeCdnWait > 60) {
      window._dbg && _dbg('globe', { step: 'cdn_timeout', attempts: _globeCdnWait })
      showGlobeFallback(); return
    }
    setTimeout(initGlobe, 250)
    return
  }
  window._dbg && _dbg('globe', { step: 'cdn_loaded', Globe_type: typeof Globe })
  var el = document.getElementById('globe-el')

  function nearestCountry(lat, lng) {
    var best = null, bestD = Infinity
    COUNTRIES.forEach(function(c) {
      var d = km({lat:lat,lng:lng}, {lat:c.lat,lng:c.lng})
      if (d < bestD) { bestD = d; best = c }
    })
    return bestD < 2500 ? best : null
  }

  var g
  try {
    window._dbg && _dbg('globe', { step: 'constructor_start' })
    g = Globe()(el)
      .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-night.jpg')
      .bumpImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png')
      .backgroundImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/night-sky.png')
      .width(window.innerWidth)
      .height(window.innerHeight)
      .onGlobeReady(function() {
        window._dbg && _dbg('globe', { step: 'onGlobeReady_fired' })
        setTimeout(splashDone, 300)
      })
      .onGlobeClick(function(ev) {
        var c = nearestCountry(ev.lat, ev.lng)
        if (c) openNational(c)
      })
    window._dbg && _dbg('globe', { step: 'constructor_done', has_onGlobeReady: typeof g.onGlobeReady })
  } catch(e) {
    console.error('Globe init error:', e)
    window._dbg && _dbg('globe', { step: 'constructor_threw', error: e.message, stack: (e.stack||'').slice(0,300) })
    _globeInitTries++
    if (_globeInitTries < 4) { setTimeout(initGlobe, 1200); return }
    showGlobeFallback()
    return
  }

  var arcs = []
  for (var i = 0; i < COUNTRIES.length; i++) {
    var a = COUNTRIES[i]
    var b = COUNTRIES[(i + 4) % COUNTRIES.length]
    arcs.push({sLat:a.lat, sLng:a.lng, eLat:b.lat, eLng:b.lng,
      col:['rgba(10,132,255,.5)', 'rgba(52,199,89,.5)']})
  }

  g.arcsData(arcs)
    .arcStartLat('sLat').arcStartLng('sLng')
    .arcEndLat('eLat').arcEndLng('eLng')
    .arcColor('col')
    .arcAltitude(.2)
    .arcStroke(.5)
    .arcDashLength(.4)
    .arcDashGap(.4)
    .arcDashAnimateTime(3500)

  g.labelsData(COUNTRIES)
    .labelLat('lat').labelLng('lng')
    .labelText('name')
    .labelSize(1.1)
    .labelColor(function() { return 'rgba(255,255,255,.8)' })
    .labelDotRadius(.35)
    .onLabelClick(function(c) { openNational(c) })

  g.atmosphereColor('#1a6aff').atmosphereAltitude(.14)
  g.controls().autoRotate = true
  g.controls().autoRotateSpeed = .35

  S.globe = g
  window.addEventListener('resize', function() {
    g.width(window.innerWidth).height(window.innerHeight)
  })
}

function openNational(country) {
  if (typeof country === 'string') {
    var name = country

  if (!country) return
  S.country = country
  setLevel('national')

  el.innerHTML = ''
  var map = L.map(el, {zoomControl:false, attributionControl:false}).setView([country.lat, country.lng], 6)
  L.tileLayer(TILE, {attribution:TILE_ATTR, maxZoom:18}).addTo(map)

  country.cities.forEach(function(city) {
    var pin = mkIcon('<div class="map-pin pin-city">🏙️</div>')
    var m = L.marker([city.lat, city.lng], {icon:pin})
      .addTo(map)
      .bindTooltip(city.name, {className:'cleanTip'})
      .on('click', (function(c) { return function() { openCity(c) } })(city))
    S.markers.push(m)
  })

  trackEvent('navigate', {level:'national', country:country.name})
}

// ── CITY MAP ───────────────────────────────────────
function openCity(city) {
  S.city = city
  setLevel('city')
  S.vendors = []
  var el = document.getElementById('map-el')
  el.innerHTML = ''
  var map = L.map(el, {zoomControl:false, attributionControl:false}).setView([city.lat, city.lng], 13)
  L.tileLayer(TILE, {attribution:TILE_ATTR, maxZoom:18}).addTo(map)
  S.cityMap = map

  // Demo vendors seeded near city centre
  DEMO_VENDORS.forEach(function(dv, i) {
    var v = {
      id: dv.id, name: dv.name, emoji: dv.emoji, items: dv.items,
      lat: city.lat + (i * .005 - .007),
      lng: city.lng + (i * .007 - .01),
      reserveBalance: 100, owner_id: null
    }
    addVendorMarker(v)
  })

  // Load real vendors from Supabase
  var dlat = .3, dlng = .4
  sbFetch('/rest/v1/vendors?lat=gte.' + (city.lat - dlat) + '&lat=lte.' + (city.lat + dlat) +
    '&lng=gte.' + (city.lng - dlng) + '&lng=lte.' + (city.lng + dlng) + '&select=*&limit=50')
    .then(function(r) { return r.json() })
    .then(function(rows) {
      if (!Array.isArray(rows)) return
      rows.forEach(function(row) {
        addVendorMarker({
          id: row.id, name: row.name || '(vendor)', emoji: row.emoji || '🎪',
          lat: +row.lat, lng: +row.lng,
          items: Array.isArray(row.items) ? row.items : [],
          reserveBalance: +(row.reserve_balance || 0), owner_id: row.owner_id
        })
      })
    }).catch(function() {})

  map.on('click', function(e) {
    if (e.originalEvent && e.originalEvent._av) return
    showPlaceInfo(e.latlng.lat, e.latlng.lng)
  })

  trackEvent('navigate', {level:'city', city:city.name, country: S.country ? S.country.name : null})
}

function addVendorMarker(v) {
  if (S.vendors.some(function(x) { return x.id === v.id })) return
  S.vendors.push(v)
  if (!S.cityMap) return
  var pin = mkIcon('<div class="map-pin pin-shop">' + (v.emoji || '🎪') + '</div>')
  var m = L.marker([v.lat, v.lng], {icon:pin})
    .addTo(S.cityMap)
    .bindTooltip(v.name, {className:'cleanTip'})
    .on('click', (function(vendor) {
      return function(e) {
        if (e.originalEvent) e.originalEvent._av = true
        openVendorById(vendor.id)
      }
    })(v))
  S.markers.push(m)

// ── DELIVERY CALC ──────────────────────────────────
function calcDelivery(distKm, weightUnits, cond) {
  var base = distKm <= 3 ? 3 : 3 + (distKm - 3)
  var extra = Math.max(0, Math.ceil(weightUnits / 13) - 1)
  var condCount = Object.values(cond).filter(Boolean).length
  return +((base + extra * base) * (1 + condCount * 0.13)).toFixed(2)
}

function calcOrder(vendor, items) {
  var subtotal = items.reduce(function(s, it) { return s + it.price * (it.qty || 1) }, 0)
  var origin = S.city ? {lat:S.city.lat,lng:S.city.lng} : {lat:vendor.lat,lng:vendor.lng}
  var dist = Math.max(.5, km(origin, {lat:vendor.lat,lng:vendor.lng}))
  var weight = items.reduce(function(s, it) { return s + (it.qty || 1) }, 0)
  var h = new Date().getHours()
  if (h >= 22 || h < 6) S.conditions.night = true
  var driverCost = calcDelivery(dist, weight, S.conditions)
  var reserve30 = +(subtotal * 0.30).toFixed(2)
  var clientFee = +(subtotal * 0.03).toFixed(2)
  var vendorFee = +(subtotal * 0.03).toFixed(2)
  var clientTotal = +(subtotal + clientFee).toFixed(2)
  var vendorNet = +(subtotal - reserve30 - vendorFee).toFixed(2)
  return {subtotal:+subtotal.toFixed(2), dist:+dist.toFixed(2),
    driverCost:driverCost, reserve30:reserve30, clientFee:clientFee,
    vendorFee:vendorFee, clientTotal:clientTotal, vendorNet:vendorNet}
}

function setQty(vId, itemId, qty) {
  qty = Math.max(0, qty)
  var vendor = S.vendors.find(function(v) { return v.id === vId })
  if (!vendor) return
  if (!S.basket[vId]) S.basket[vId] = {vendor:vendor, items:[]}
  var bk = S.basket[vId]
  var item = vendor.items.find(function(i) { return i.id === itemId })
  if (!item) return
  var idx = bk.items.findIndex(function(i) { return i.id === itemId })
  if (qty === 0) {
    if (idx >= 0) bk.items.splice(idx, 1)
  } else {
    if (idx >= 0) bk.items[idx].qty = qty
    else bk.items.push(Object.assign({}, item, {qty:qty}))
  }
  var vitemsEl = document.getElementById('vitems-' + vId)
  if (vitemsEl) vitemsEl.innerHTML = vendorItemsHtml(vendor)
  var barEl = document.getElementById('bbar-' + vId)
  if (barEl) barEl.innerHTML = renderBasketBar(vendor)
}

function confirmOrder(vId) {
  if (!S.session) { toast('Sign in to place orders'); openLogin(); return }
  var bk = S.basket[vId]
  if (!bk || !bk.items.length) { toast('Basket is empty'); return }
  var vendor = bk.vendor
  var items = bk.items.filter(function(i) { return i.qty > 0 })
  if (!items.length) { toast('Add items first'); return }
  var c = calcOrder(vendor, items)
  var oId = 'ORD-' + uid().toUpperCase()
  var driver = DEMO_DRIVERS[Math.floor(Math.random() * DEMO_DRIVERS.length)]
  var order = {
    id: oId, vendor: vendor, items: items, calc: c,
    status: 'pending', clientDone: false, driverDone: false, driver: driver,
    lat: S.city ? S.city.lat : vendor.lat,
    lng: S.city ? S.city.lng : vendor.lng,
    createdAt: nowMs()
  }
  S.orders[oId] = order
  S.msgs[oId] = [{who:'System', text:'Order placed. Finding driver…', ts:nowMs()}]
  vendor.reserveBalance = (vendor.reserveBalance || 0) + c.reserve30
  S.ledger.push({ts:nowMs(), type:'RESERVE', label:'Reserve allocated',
    amount:c.reserve30, id:oId, from:'Basket', to:'Reserve Pool'})
  if (S.profile) {
    S.profile.balance = Math.max(0, (S.profile.balance || 0) - c.clientTotal)
    S.ledger.push({ts:nowMs(), type:'PAYMENT', label:'Order payment',
      amount:-c.clientTotal, id:oId, from:'Wallet', to:vendor.name})
    sbFetch('/rest/v1/balance_ledger?user_id=eq.' + S.profile.id, {
      method:'PATCH', body:JSON.stringify({balance:S.profile.balance}),
      headers:{'Prefer':'return=minimal'}
    }).catch(function() {})
  }
  delete S.basket[vId]
  closeAll()
  setTimeout(function() {
    order.status = 'active'
    S.msgs[oId].push({who:'System', text:driver.name + ' is on the way ' + driver.emoji, ts:nowMs()})
    updateRadar()
    toast(driver.name + ' assigned!')
  }, 2000)
  openOrder(oId)
  trackEvent('place_order', {vendor:vendor.name, total:c.clientTotal})
}

    closeOrder(o)

  }, 3000)

function closeOrder(o) {
  if (o.status === 'closed') return
  o.status = 'closed'
  var dc = +((o.calc && o.calc.driverCost) || 0)
  var debited = 0
  if (dc > 0 && o.vendor) {
    var cur = +(o.vendor.reserveBalance || 0)
    debited = Math.min(cur, dc)
    o.vendor.reserveBalance = +((cur - debited).toFixed(2))
    sbFetch('/rest/v1/vendors?id=eq.' + o.vendor.id, {
      method:'PATCH', body:JSON.stringify({reserve_balance:o.vendor.reserveBalance}),
      headers:{'Prefer':'return=minimal'}
    }).catch(function() {})
    S.ledger.push({ts:nowMs(), type:'PAYOUT', label:'Driver payout', amount:-debited,
      id:o.id, from:'Reserve Pool', to:o.driver ? o.driver.name : 'Driver'})
    if (debited < dc) {
      S.msgs[o.id].push({who:'System',
        text:'Reserve low by ' + money(dc - debited) + '. Vendor must top up.', ts:nowMs()})
    }
  }
  issueInvoice(o).then(function(inv) {
    S.msgs[o.id].push({who:'System',
      text:'Closed. Invoice ' + inv.mark + ' issued.' + (debited > 0 ? ' Driver paid: ' + money(debited) : ''),
      ts:nowMs()})
    toast('Order closed · Invoice issued')
  }).catch(function() {
    S.msgs[o.id].push({who:'System', text:'Order closed. Invoice pending.', ts:nowMs()})
    toast('Order closed')
  })
  updateRadar()
}

function sendOrderMsg(oId) {

  var text = window.prompt('Message to driver:')
  if (!text || !text.trim()) return
  S.msgs[oId].push({who:'You', text:text.trim(), ts:nowMs()})
  closePanel('order-' + oId)

function issueInvoice(o) {

  var mark = 'INV-' + d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2,'0') + '-' + String(S.invoiceSeq).padStart(6,'0')
  var inv = {
    id: mark, mark: mark, order_id: o.id, vendor_name: o.vendor.name,
    buyer_id: S.profile ? S.profile.id : null,
    items: o.items, subtotal: o.calc.subtotal,
    delivery_fee: o.calc.driverCost, platform_fee: o.calc.clientFee,
    total: o.calc.clientTotal, currency: 'AVC', period_month: month, status: 'issued'
  }
  return sbFetch('/rest/v1/invoices', {
    method:'POST', body:JSON.stringify(inv), headers:{'Prefer':'return=minimal'}
  }).then(function() { return inv }).catch(function() { return inv })
}

// ── ECONOMICS PRIMORDIAL CIRCLE ───────────────────
var _ecoHistory = []
function updateWalletWidget() {
  // Hide entirely when unauthenticated
  if (!S.session || !S.profile) {
    if (Circles.get('eco')) Circles.close('eco')
    return
  }
  var b = +S.profile.balance || 0
  // Track balance points for the sparkline (max 24 samples)
  var last = _ecoHistory[_ecoHistory.length - 1]
  if (!last || last !== b) {
    _ecoHistory.push(b)
    if (_ecoHistory.length > 24) _ecoHistory.shift()
  }
  var prevTotal = (last != null) ? last : b
  var delta = b - prevTotal
  var fmt = b >= 1000 ? b.toLocaleString('en-US',{maximumFractionDigits:0}) : b.toFixed(2).replace(/\.?0+$/,'')
  var deltaHtml = ''
  if (Math.abs(delta) > 0.001) {
    deltaHtml = '<span class="delta ' + (delta > 0 ? 'up' : 'dn') + '">' +
      (delta > 0 ? '▲ +' : '▼ ') + Math.abs(delta).toFixed(2).replace(/\.?0+$/,'') + '</span>'
  }
  // Sparkline (last 24 balance snapshots)
  var spark = sparklinePath(_ecoHistory, 100, 32)
  var inner =
    '<div class="cc-sparkline"><svg viewBox="0 0 100 32" preserveAspectRatio="none">' +
      '<path class="fill" d="' + spark + ' L100,32 L0,32 Z"/>' +
      '<path d="' + spark + '"/>' +
    '</svg></div>' +
    '<div class="cc-data">' +
      '<div class="v">' + fmt + '</div>' +
      '<div class="u">AVC</div>' +
      deltaHtml +
    '</div>'
  var existing = Circles.get('eco')
  if (existing) {
    Circles.update('eco', { content: inner })
    if (delta !== 0) Circles.update('eco', { pulse: true })
  } else {
    Circles.spawn({
      id: 'eco', type: 'economics', title: 'Economics',
      diameter: 152, minD: 96, content: inner,
      persistent: true,
      x: 90, y: 100,
      onTapRim: function() { openAccounting() }
    })
    // Make tap on interior open accounting view (since content here is read-only)
    var el = Circles.get('eco').element
    el.addEventListener('click', function(e) {
      // Ignore clicks that are part of pinch/drag end (handled internally)
      if (el.classList.contains('cc-dragging') || el.classList.contains('cc-pinching')) return
      // Only when tap is on interior (i.e., not a drag end on the rim)
      var r = el.getBoundingClientRect()
      var dx = e.clientX - (r.left + r.width/2), dy = e.clientY - (r.top + r.height/2)
      var dist = Math.sqrt(dx*dx + dy*dy)
      if (dist / (r.width/2) < 0.7) openAccounting()
    })
  }
}

function sparklinePath(arr, w, h) {
  if (!arr || arr.length < 2) return 'M0,' + (h-1) + ' L' + w + ',' + (h-1)
  var min = Math.min.apply(null, arr), max = Math.max.apply(null, arr)
  var span = Math.max(0.01, max - min)
  var step = w / Math.max(1, arr.length - 1)
  var pts = arr.map(function(v, i) {
    var x = (i * step).toFixed(2)
    var y = (h - 2 - ((v - min) / span) * (h - 4)).toFixed(2)
    return (i === 0 ? 'M' : 'L') + x + ',' + y
  })
  return pts.join(' ')
}

function applySession(session) {

// ── RADAR PRIMORDIAL CIRCLE ────────────────────────
function updateRadar() {
  var orders = Object.values(S.orders || {})
  var active = orders.filter(function(o) { return o.status === 'active' })
  var pending = orders.filter(function(o) { return o.status === 'pending' })
  var nearbyVendors = (S.vendors && S.vendors.length) || 0
  var showRadar = active.length > 0 || pending.length > 0 || S.level !== 'global'
  if (!showRadar) {
    if (Circles.get('radar')) Circles.close('radar')
    var dot0 = document.getElementById('cic-orders-dot')
    if (dot0) { dot0.textContent = ''; dot0.style.display = 'none' }
    return
  }
  // Compact summary inside the radar circle: count + status breakdown + first vendor
  var inner =
    (active.length > 0 ? '<div class="cc-pulse-dot"></div>' : '') +
    '<div class="cc-data">' +
      '<div class="v">' + active.length + '</div>' +
      '<div class="u">' + (active.length === 1 ? 'order' : 'orders') + '</div>' +
      (pending.length > 0 ? '<span class="delta up">+' + pending.length + ' pending</span>' :
       nearbyVendors > 0  ? '<span class="delta up" style="color:rgba(255,255,255,.5)">' + nearbyVendors + ' nearby</span>' : '') +
    '</div>'
  var existing = Circles.get('radar')
  if (existing) {
    Circles.update('radar', { content: inner, active: active.length > 0 })
  } else {
    var x = window.innerWidth - 90, y = 100
    Circles.spawn({
      id: 'radar', type: 'radar', title: 'Radar',
      diameter: 152, minD: 96, content: inner,
      persistent: true, x: x, y: y,
      active: active.length > 0
    })
    Circles.update('radar', { active: active.length > 0 })
    var el = Circles.get('radar').element
    if (active.length > 0) el.classList.add('active')
    el.addEventListener('click', function(e) {
      if (el.classList.contains('cc-dragging') || el.classList.contains('cc-pinching')) return
      var r = el.getBoundingClientRect()
      var dx = e.clientX - (r.left + r.width/2), dy = e.clientY - (r.top + r.height/2)
      if (Math.sqrt(dx*dx + dy*dy) / (r.width/2) < 0.7) openRadar()
    })
  }
  // CIC heartbeat still shows active count as a small dot
  var dot = document.getElementById('cic-orders-dot')
  if (dot) { dot.textContent = active.length || ''; dot.style.display = active.length > 0 ? 'flex' : 'none' }
}

function openRadar() {
  var orders = Object.values(S.orders).filter(function(o) { return o.status !== 'closed' })

    .then(function(r) { return r.json() })

        }).join('')

function sendAI(text) {
  var inp = document.getElementById('ai-inp')
  text = text || (inp ? inp.value.trim() : '')
  if (!text) return
  if (inp) inp.value = ''
  S.aiHistory.push({role:'user', content:text})
  var el = document.getElementById('ai-msgs')
  if (el) {
    var pEl = el.querySelector('p')
    if (pEl) el.innerHTML = ''
    el.innerHTML += '<div class="cmsg cme">' + esc(text) + '</div>'
    el.innerHTML += '<div class="cmsg cai" id="ai-typing">…</div>'
    el.scrollTop = el.scrollHeight
  }
  cicStartThinking()
  sbFn('ai-router', {
    text: text, level: S.level,
    country: S.country ? S.country.name : null,
    city: S.city ? S.city.name : null,
    owner: !!(S.profile && S.profile.is_owner),
    preferred_provider: S.cicManual || null
  }).then(function(resp) {
    var reply = (resp && resp.text) ? resp.text : 'I could not process that.'
    S.aiHistory.push({role:'assistant', content:reply})
    var typing = document.getElementById('ai-typing')
    if (typing) typing.outerHTML = '<div class="cmsg cai">' + esc(reply) + '</div>'
    if (el) el.scrollTop = el.scrollHeight
    if (resp && resp.action) execAction(resp.action)
    cicStopThinking(resp && resp.provider ? resp.provider : null, resp && resp.via ? resp.via : '')
  }).catch(function() {
    var reply = localAI(text)
    S.aiHistory.push({role:'assistant', content:reply})
    var typing = document.getElementById('ai-typing')
    if (typing) typing.outerHTML = '<div class="cmsg cai">' + esc(reply) + '</div>'
    if (el) el.scrollTop = el.scrollHeight
    cicStopThinking(null, '')
  })
}

function localAI(text) {
  var lo = text.toLowerCase()
  if (/hello|hi|hey/.test(lo)) return 'Hello! How can I help you with AstranoV?'
  if (/order/.test(lo)) return 'Navigate to a city and tap any vendor to place an order.'
  if (/balance|wallet|money|avc/.test(lo)) return 'Go to You → Recharge Wallet. 1 AVC = 1 EUR.'
  if (/vendor|shop|restaurant/.test(lo)) return 'Browse vendors on the city map. Tap any pin to open a vendor.'
  if (/driver|delivery/.test(lo)) return 'Drivers are assigned automatically. Track them via Radar.'
  if (/circle|chat/.test(lo)) return 'Open Radar → Global Chat, or You → Circles.'
  if (/globe|map|navigate|country|city/.test(lo)) return 'Tap a country on the globe, then tap a city to see vendors.'
  return 'I can help you navigate AstranoV, find vendors, and manage orders. What do you need?'
}

function execAction(action) {
  if (!action || !action.type) return
  if (action.type === 'navigate' && action.country) {
    var c = COUNTRIES.find(function(x) { return x.name.toLowerCase().indexOf(action.country.toLowerCase()) >= 0 })
    if (c) {
      if (action.city) {
        var city = c.cities.find(function(x) { return x.name.toLowerCase().indexOf(action.city.toLowerCase()) >= 0 })
        openNational(c)
        if (city) setTimeout(function() { openCity(city) }, 900)
      } else openNational(c)
    }
  }
  if (action.type === 'open_channel') openChannel(action.channel || 'global')
  if (action.type === 'accounting') openAccounting()
  if (action.type === 'back') goBack()
  if (action.type === 'krypteia' && S.krypActive) openKrypteia()
  if (action.type === 'krypteia_brief' && S.krypActive) krypBrief()
  if (action.type === 'krypteia_inspect' && S.krypActive) krypInspect()
  if (action.type === 'propose_change' && S.krypActive && action.prompt) {
    proposeChange(String(action.prompt))
  }
}

function openProposals() {
  if (!S.krypActive) return
  openPanel('proposals',
    '<div class="ptitle">&#129516; Pending Proposals</div>' +
    '<div id="prop-list" style="padding:0 16px"><p class="muted center" style="padding:24px">Loading…</p></div>'
  )
  sbFetch('/rest/v1/ai_proposals?order=created_at.desc&limit=30')
    .then(function(r) { return r.json() })
    .then(function(rows) {
      var el = document.getElementById('prop-list')
      if (!el) return
      if (!Array.isArray(rows) || !rows.length) {
        el.innerHTML = '<p class="muted center" style="padding:24px">No proposals yet</p>'
        return
      }
      el.innerHTML = rows.map(function(p) {
        var cls = p.status === 'applied' ? 'bg' : p.status === 'rejected' ? 'br' : p.status === 'approved' ? 'bb' : 'by'
        return '<div style="background:rgba(255,255,255,.04);border-radius:12px;padding:12px;margin-bottom:8px">' +
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">' +
          '<span class="badge ' + cls + '">' + esc(p.status) + '</span>' +
          '<span class="muted" style="font-size:11px">' + new Date(p.created_at).toLocaleString() + '</span></div>' +
          '<div style="font-size:13px;line-height:1.4;margin-bottom:8px">' + esc(p.prompt) + '</div>' +
          (p.status === 'pending'
            ? '<div style="display:flex;gap:8px">' +
              '<button class="btn bp bsm" onclick="decideProposal(' + p.id + ',\'approved\')">Approve &amp; build</button>' +
              '<button class="btn bs bsm" onclick="decideProposal(' + p.id + ',\'rejected\')">Reject</button></div>'
            : '') +
          (p.commit_sha ? '<div class="muted" style="font-size:11px;margin-top:6px">commit ' + esc(p.commit_sha.slice(0,7)) + '</div>' : '') +
          '</div>'
      }).join('')
    }).catch(function() {
      var el = document.getElementById('prop-list')
      if (el) el.innerHTML = '<p class="muted center" style="padding:24px">Could not load</p>'
    })
}

function decideProposal(id, decision) {
  if (!S.krypActive) return
  if (decision === 'approved') {
    if (!confirm('Approve and let Astranov AI build this change? It will commit to the repo.')) return
    sbFetch('/rest/v1/ai_proposals?id=eq.' + id, {
      method:'PATCH', body:JSON.stringify({status:'approved', decided_at:new Date().toISOString()}),
      headers:{'Prefer':'return=minimal'}
    }).then(function() {
      sbFetch('/rest/v1/ai_proposals?id=eq.' + id + '&select=prompt').then(function(r){return r.json()}).then(function(rows) {
        if (!rows || !rows[0]) return
        toast('Building…')
        sbFn('astranov-api', {
          path: '/ai/krypteia/develop',
          prompt: rows[0].prompt,
          current_html: document.documentElement.outerHTML
        }).then(function(resp) {
          if (resp && resp.commit) {
            sbFetch('/rest/v1/ai_proposals?id=eq.' + id, {
              method:'PATCH', body:JSON.stringify({status:'applied', commit_sha:resp.commit}),
              headers:{'Prefer':'return=minimal'}
            }).catch(function() {})
            toast('Applied! Commit ' + resp.commit.slice(0,7))
          } else {
            toast('Build returned no commit')
          }
          closePanel('proposals'); openProposals()
        }).catch(function(e) { toast('Build failed: ' + (e.message || e)) })
      })
    }).catch(function() { toast('Could not update proposal') })
  } else {
    sbFetch('/rest/v1/ai_proposals?id=eq.' + id, {
      method:'PATCH', body:JSON.stringify({status:'rejected', decided_at:new Date().toISOString()}),
      headers:{'Prefer':'return=minimal'}
    }).then(function() { closePanel('proposals'); openProposals() })
      .catch(function() { toast('Could not reject') })
  }
}

var CIC_COLORS = {
  astranov: '#ffffff',
  claude: '#ffc800',
  groq: '#00d4aa',
  gemini: '#4285f4',
  'openai-mini': '#10a37f'
}
var CIC_LABELS = {
  astranov: 'Astranov C.I.',
  claude: 'Claude Opus',
  groq: 'Groq llama',
  gemini: 'Gemini 2.0',
  'openai-mini': 'GPT-4o mini'
}
var CIC_SHORT = {
  astranov: 'Astranov',
  claude: 'Claude',
  groq: 'Groq',
  gemini: 'Gemini',
  'openai-mini': 'GPT'
}

function getCICNodes() {
  // Astranov C.I. is always first — the collective itself, never absent.
  // Free APIs follow. Claude appears only after Krypteia is active (owner).
  var nodes = [{id:'astranov'}, {id:'groq'}, {id:'gemini'}, {id:'openai-mini'}]
  if (S.krypActive) nodes.push({id:'claude'})
  return nodes
}

function initCICWidget() {
  var chipsEl = document.getElementById('cic-node-chips')
  if (!chipsEl) return
  chipsEl.innerHTML = ''
  getCICNodes().forEach(function(n) {
    var chip = document.createElement('button')
    chip.className = 'cic-chip'
    chip.id = 'cic-chip-' + n.id
    chip.textContent = CIC_SHORT[n.id] || n.id
    chip.title = CIC_LABELS[n.id] || n.id
    chip.style.setProperty('--cc', CIC_COLORS[n.id] || '#fff')
    chip.addEventListener('click', function(e) { e.stopPropagation(); cicNodeClick(n.id) })
    chipsEl.appendChild(chip)
  })
  updateCICWidget(S.cicProvider, S.cicThinking)
}

function cicNodeClick(providerId) {
  if (S.cicManual === providerId) {
    S.cicManual = null
    toast('C.I. — Auto cycle')
  } else {
    S.cicManual = providerId
    toast('C.I. locked: ' + (CIC_LABELS[providerId] || providerId))
  }
  updateCICWidget(S.cicProvider, S.cicThinking)
}

function updateCICWidget(provider, thinking, via) {
  if (provider) S.cicProvider = provider
  if (via !== undefined) S.cicVia = via
  S.cicThinking = !!thinking
  var chipsEl = document.getElementById('cic-node-chips')
  if (chipsEl) {
    if (thinking) chipsEl.classList.add('cic-thinking')
    else chipsEl.classList.remove('cic-thinking')
  }
  getCICNodes().forEach(function(n) {
    var chip = document.getElementById('cic-chip-' + n.id)
    if (!chip) return
    chip.classList.remove('cic-chip-active', 'cic-chip-locked')
    if (n.id === S.cicManual) chip.classList.add('cic-chip-locked')
    if (!thinking && n.id === S.cicProvider) chip.classList.add('cic-chip-active')
  })
  // Arc: fill while thinking, empty when done
  var arc = document.getElementById('cic-arc')
  if (arc) {
    if (thinking) { arc.style.opacity = '1'; arc.setAttribute('stroke-dasharray', '66 132') }
    else { arc.style.opacity = '0'; arc.setAttribute('stroke-dasharray', '0 132') }
  }
  // Mode text in bar
  var modeEl = document.getElementById('cic-mode-txt')
  if (modeEl) modeEl.textContent = S.cicManual ? (CIC_SHORT[S.cicManual] || S.cicManual) : 'Auto'
  // Floating label above widget — shows orchestration with "via" when in Astranov mode
  var lbl = document.getElementById('cic-model-label')
  if (lbl) {
    var text = null
    if (thinking) text = 'Thinking…'
    else if (provider) {
      text = CIC_LABELS[provider] || provider
      if (provider === 'astranov' && S.cicVia) text += ' · via ' + (CIC_SHORT[S.cicVia] || S.cicVia)
    } else if (S.cicManual) {
      text = (CIC_LABELS[S.cicManual] || S.cicManual) + ' ⬡'
    }
    if (text) { lbl.textContent = '◉ ' + text; lbl.classList.add('cic-show') }
    else { lbl.classList.remove('cic-show') }
  }
  // Live badge inside chat panel
  var badge = document.getElementById('ai-provider-badge')
  if (badge && provider) {
    var t = CIC_LABELS[provider] || provider
    if (provider === 'astranov' && S.cicVia) t += ' · via ' + (CIC_SHORT[S.cicVia] || S.cicVia)
    badge.innerHTML = '&#9679; ' + esc(t)
  }
}

function cicStartThinking() {
  updateCICWidget(null, true)
}

function cicStopThinking(provider, via) {
  updateCICWidget(provider || null, false, via)
  if (provider) {
    var chip = document.getElementById('cic-chip-' + provider)
    if (chip) {
      chip.style.transform = 'scale(1.25)'
      setTimeout(function() { chip.style.transform = '' }, 300)
    }
  }
}

var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition

function toggleHF() { S.handsFree ? stopHF() : startHF() }

function startHF() {
  if (!SpeechRec) { toast('Voice not supported in this browser'); return }
  var rec = new SpeechRec()
  rec.continuous = false; rec.lang = 'en-US'
  rec.onresult = function(e) { sendAI(e.results[0][0].transcript) }
  rec.onend = function() { if (S.handsFree) rec.start() }
  rec.start()
  S.hfRec = rec; S.handsFree = true
  var btn = document.getElementById('hf-btn')
  if (btn) btn.textContent = '🌈 On'
  var mic = document.getElementById('cic-mic')
  if (mic) mic.classList.add('hf-on')
  toast('Listening…')
}

function stopHF() {
  if (S.hfRec) { try { S.hfRec.stop() } catch(e) {} }
  S.hfRec = null; S.handsFree = false
  var btn = document.getElementById('hf-btn')
  if (btn) btn.innerHTML = '&#127908;'
  var mic = document.getElementById('cic-mic')
  if (mic) mic.classList.remove('hf-on')
  toast('Voice stopped')
}

        return
      }
      el.innerHTML = rows.map(function(q) {
        var badge = q.for_owner ? '<span class="badge by">architect</span>' : '<span class="badge bb">collective</span>'
        return '<div style="background:rgba(255,255,255,.04);border-radius:12px;padding:12px;margin-bottom:8px">' +
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">' + badge +
          '<span class="muted" style="font-size:11px">' + new Date(q.created_at).toLocaleString() + '</span></div>' +
          '<div style="font-size:14px;margin-bottom:8px">' + esc(q.question) + '</div>' +
          (q.reason ? '<div class="muted" style="font-size:11px;margin-bottom:8px">reason: ' + esc(q.reason) + '</div>' : '') +
          '<textarea class="inp" id="cq-a-' + q.id + '" rows="2" placeholder="Your answer to the C.I.…" style="margin-bottom:6px"></textarea>' +
          '<div style="display:flex;gap:8px;justify-content:flex-end">' +
          '<button class="btn bs bsm" onclick="dismissQueue(' + q.id + ')">Dismiss</button>' +
          '<button class="btn bp bsm" onclick="answerQueue(' + q.id + ')">Answer</button></div></div>'
      }).join('')
    }).catch(function() {
      var el = document.getElementById('cq-list')
      if (el) el.innerHTML = '<p class="muted center" style="padding:24px">Could not load queue</p>'
    })
}

function answerQueue(id) {
  var ta = document.getElementById('cq-a-' + id)
  var answer = ta ? ta.value.trim() : ''
  if (!answer) { toast('Write an answer first'); return }
  sbFetch('/rest/v1/cic_queue?id=eq.' + id, {
    method:'PATCH',
    body: JSON.stringify({
      status:'answered', answer:answer,
      answered_by: S.session && S.session.user ? S.session.user.id : null,
      answered_at: new Date().toISOString()
    }),
    headers:{'Prefer':'return=minimal'}
  }).then(function() {
    toast('Answer recorded — C.I. learned')
    krypQueue()
  }).catch(function() { toast('Could not save answer') })
}

function dismissQueue(id) {
  sbFetch('/rest/v1/cic_queue?id=eq.' + id, {
    method:'PATCH',
    body: JSON.stringify({ status:'dismissed', answered_at: new Date().toISOString() }),
    headers:{'Prefer':'return=minimal'}
  }).then(function() { krypQueue() }).catch(function() {})
}

function askLastToCollective() {
  var last = null
  for (var i = S.aiHistory.length - 1; i >= 0; i--) {
    if (S.aiHistory[i].role === 'user') { last = S.aiHistory[i].content; break }
  }
  if (!last) { toast('Ask Astranov C.I. something first'); return }
  askCollective(last, 'user escalation from C.I. chat', false)
}

function askCollective(question, reason, forOwner) {
  if (!S.session) { toast('Sign in to ask the collective'); return }
  sbFetch('/rest/v1/cic_queue', {
    method:'POST',
    body: JSON.stringify({
      user_id: S.session.user.id,
      question: question,
      reason: reason || 'user request',
      for_owner: !!forOwner,
      context: { level:S.level, country:S.country?S.country.name:null, city:S.city?S.city.name:null }
    }),
    headers:{'Prefer':'return=minimal'}
  }).then(function() { toast(forOwner ? 'Sent to the architect' : 'Sent to the collective') })
    .catch(function() { toast('Could not reach the collective') })
}

function krypSelfCheck() {
  if (!S.krypActive) return
  var data = {
    vendors: S.vendors.length, orders: Object.keys(S.orders).length,
    session: !!S.session, level: S.level, ts: nowMs()
  }
  sbFetch('/rest/v1/krypteia_log', {
    method:'POST', body:JSON.stringify({ts:data.ts, type:'self_check', data:data}),
    headers:{'Prefer':'return=minimal'}
  }).catch(function() {})
}

function krypLog(type, text) {
  sbFetch('/rest/v1/krypteia_log', {
    method:'POST', body:JSON.stringify({ts:nowMs(), type:type, data:{text:text}}),
    headers:{'Prefer':'return=minimal'}
  }).catch(function() {})
}

// ── ANALYTICS ──────────────────────────────────────
function trackEvent(type, data) {
  sbFetch('/rest/v1/analytics_events', {
    method:'POST',
    body: JSON.stringify({
      type:type, data:data||{}, ts:nowMs(),
      session_id: S.session && S.session.user ? S.session.user.id : null
    }),
    headers:{'Prefer':'return=minimal'}
  }).catch(function() {})
}

// ── PLACE INFO ─────────────────────────────────────
function showPlaceInfo(lat, lng) {
  openPanel('place-info',
    '<div class="ptitle">&#128205; Location</div>' +
    '<div class="psect" id="place-body">' +
    '<p class="mono">' + lat.toFixed(5) + ', ' + lng.toFixed(5) + '</p>' +
    '<p class="muted" style="margin-top:8px">Looking up…</p></div>'
  )
  fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lng + '&format=json')
    .then(function(r) { return r.json() })
    .then(function(d) {
      var el = document.getElementById('place-body')
      if (!el) return
      el.innerHTML = '<p style="font-size:14px;margin-bottom:8px">' + esc(d.display_name || 'Unknown') + '</p>' +
        '<p class="mono">' + lat.toFixed(5) + ', ' + lng.toFixed(5) + '</p>'
    }).catch(function() {})
}

// ── DRAGGABLE WIDGETS ──────────────────────────────
function makeDraggable(elId, handleSel, storageKey) {
  var el = document.getElementById(elId)
  if (!el) return
  var handle = handleSel ? el.querySelector(handleSel) : el
  if (!handle) return

  // Restore saved position
  try {
    var saved = JSON.parse(localStorage.getItem(storageKey) || 'null')
    if (saved && saved.top != null && saved.left != null) {
      el.style.top = saved.top + 'px'
      el.style.left = saved.left + 'px'
      el.style.right = 'auto'
      el.style.bottom = 'auto'
    }
  } catch(e) {}

  var sx = 0, sy = 0, sl = 0, st = 0, active = false

  function start(x, y) {
    var r = el.getBoundingClientRect()
    sx = x; sy = y; sl = r.left; st = r.top; active = true
  }
  function move(x, y) {
    if (!active) return
    var nl = Math.max(0, Math.min(window.innerWidth - 50, sl + x - sx))
    var nt = Math.max(0, Math.min(window.innerHeight - 50, st + y - sy))
    el.style.left = nl + 'px'; el.style.top = nt + 'px'
    el.style.right = 'auto'; el.style.bottom = 'auto'
  }
  function end() {
    if (!active) return
    active = false
    var r = el.getBoundingClientRect()
    try { localStorage.setItem(storageKey, JSON.stringify({top: Math.round(r.top), left: Math.round(r.left)})) } catch(e) {}
  }

  handle.addEventListener('mousedown', function(e) {
    start(e.clientX, e.clientY)
    e.preventDefault()
    function mm(ev) { move(ev.clientX, ev.clientY) }
    function mu() { end(); document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu) }
    document.addEventListener('mousemove', mm)
    document.addEventListener('mouseup', mu)
  })
  handle.addEventListener('touchstart', function(e) { if (e.touches.length === 1) start(e.touches[0].clientX, e.touches[0].clientY) }, {passive:true})
  handle.addEventListener('touchmove', function(e) { if (e.touches.length === 1) move(e.touches[0].clientX, e.touches[0].clientY) }, {passive:true})
  handle.addEventListener('touchend', function() { end() }, {passive:true})
}

// ── INIT ───────────────────────────────────────────
function init() {
  window._dbg && _dbg('init', { ua: navigator.userAgent.slice(0,80), w: window.innerWidth, h: window.innerHeight, Globe_defined: typeof Globe })
  var h = new Date().getHours()
  if (h >= 22 || h < 6) S.conditions.night = true

  try {
    var raw = localStorage.getItem('av_session')
    if (raw) {
      var sess = JSON.parse(raw)
      if (sess && sess.access_token && sess.expires_at && sess.expires_at * 1000 > Date.now()) {
        applySession(sess)
      } else {
        localStorage.removeItem('av_session')
      }
    }
  } catch(e) {}

  initCICWidget()
  // CIC (AI) primordial stays as the legacy floating ring for now — it has its
  // own provider-chip orbital system and will be folded into the Circles
  // primitive in a follow-up pass. All other gadgets are celestial circles.
  makeDraggable('cic-float', '#cic-drag', 'av_pos_cic')
  // Spawn radar circle on demand (it'll early-return when nothing to show)
  updateRadar()
  // Wallet (Economics) circle is spawned by applySession when the user logs in
  initGlobe()
}

init()
</script>
