name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  edge-functions:
    runs-on: ubuntu-latest
    name: Deploy edge functions
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: lkoatrkhuigdolnjsbie
        run: |
          set +e
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          CRITICAL="aci aicycle coders-bridge"
          OPTIONAL="vendor-crawler order-intake debug-write debug-reader ai-router astranov-api brain council voice"
          FAILED=""
          deploy_one() {
            local fn="$1"
            echo ""
            echo "=== Deploying $fn ==="
            if [ ! -d "supabase/functions/$fn" ]; then
              echo "skipped (no source dir)"
              return 0
            fi
            supabase functions deploy "$fn" --no-verify-jwt
            return $?
          }
          for fn in $CRITICAL; do
            deploy_one "$fn" || FAILED="$FAILED $fn"
          done
          for fn in $OPTIONAL; do
            deploy_one "$fn" || echo "optional deploy failed: $fn"
          done
          if [ -n "$FAILED" ]; then
            echo "Critical function deploy failed:$FAILED"
            exit 1
          fi

  cloudflare:
    runs-on: ubuntu-latest
    name: Purge Cloudflare cache
    needs: edge-functions
    if: always()
    steps:
      - name: Purge cache
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set — skipping"
            exit 0
          fi
          ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=astranov.eu" \
            -H "Authorization: Bearer $CF_TOKEN" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',[{}])[0].get('id','') if d.get('result') else '')")
          if [ -z "$ZONE_ID" ]; then
            echo "Could not resolve zone id for astranov.eu"
            exit 0
          fi
          echo "Zone: $ZONE_ID"
          RESP=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$RESP"
