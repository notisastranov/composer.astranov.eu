name: Supabase Deploy

on:
  push:
    branches: [main, claude/build-astranov-app-DHkQw]
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-deploy.yml'
  workflow_dispatch:

concurrency:
  group: supabase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: lkoatrkhuigdolnjsbie
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push database migrations
        continue-on-error: true
        run: |
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "SUPABASE_DB_PASSWORD not set — skipping db push (schema managed via dashboard/query)"
            exit 0
          fi
          supabase db push --include-all || {
            echo "db push skipped — remote migration history diverged; apply SQL manually if needed"
            exit 0
          }

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy ai-router      --no-verify-jwt
          supabase functions deploy astranov-api   --no-verify-jwt
          supabase functions deploy debug-write    --no-verify-jwt
          supabase functions deploy debug-reader   --no-verify-jwt
          supabase functions deploy aci            --no-verify-jwt
          supabase functions deploy aicycle        --no-verify-jwt
          supabase functions deploy coders-bridge  --no-verify-jwt
          supabase functions deploy order-intake   --no-verify-jwt
          supabase functions deploy menu-request   --no-verify-jwt
          supabase functions deploy brain          --no-verify-jwt
          supabase functions deploy council        --no-verify-jwt
          supabase functions deploy voice          --no-verify-jwt

      - name: Set Edge Function secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          CODERS_BRIDGE_SECRET: ${{ secrets.CODERS_BRIDGE_SECRET }}
          GH_PUSH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
        run: |
          ARGS=()
          [ -n "$ANTHROPIC_API_KEY" ] && ARGS+=("ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY")
          [ -n "$OPENAI_API_KEY" ] && ARGS+=("OPENAI_API_KEY=$OPENAI_API_KEY")
          [ -n "$GROQ_API_KEY" ] && ARGS+=("GROQ_API_KEY=$GROQ_API_KEY")
          [ -n "$XAI_API_KEY" ] && ARGS+=("XAI_API_KEY=$XAI_API_KEY")
          [ -n "$CODERS_BRIDGE_SECRET" ] && ARGS+=("CODERS_BRIDGE_SECRET=$CODERS_BRIDGE_SECRET")
          [ -n "$GH_PUSH_TOKEN" ] && ARGS+=("GITHUB_TOKEN=$GH_PUSH_TOKEN")
          ARGS+=("GITHUB_REPO=notisastranov/astranov.eu" "GITHUB_BRANCH=main")
          if [ ${#ARGS[@]} -gt 2 ]; then
            supabase secrets set "${ARGS[@]}"
          else
            echo "No API secrets to update — skipping"
          fi
